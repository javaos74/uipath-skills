2014 return value comes from `interrupt()`\n\n---\n\n## RAG Agent\n\nRetrieval-Augmented Generation using UiPath Context Grounding as a vector store with an LLM for answer synthesis.\n\n**When to use:** Knowledge base Q&A, document search, grounded answers with source citations.\n\n```python\nfrom pydantic import BaseModel\nfrom uipath_langchain.chat.models import UiPathAzureChatOpenAI\nfrom uipath_langchain.vectorstores.context_grounding_vectorstore import (\n    ContextGroundingVectorStore,\n)\nfrom langchain_core.prompts import ChatPromptTemplate\nfrom langchain_core.output_parsers import StrOutputParser\nfrom langchain_core.runnables import RunnablePassthrough\n\nclass Input(BaseModel):\n    query: str\n    index_name: str\n    k: int = 3\n\nclass Output(BaseModel):\n    answer: str\n    sources: list[str]\n\nasync def main(input: Input) -> Output:\n    vectorstore = ContextGroundingVectorStore(index_name=input.index_name)\n    retriever = vectorstore.as_retriever(search_kwargs={\"k\": input.k})\n\n    prompt = ChatPromptTemplate.from_template(\n        \"Answer based on this context:\\n{context}\\n\\nQuestion: {question}\"\n    )\n    llm = UiPathAzureChatOpenAI(max_retries=3)\n\n    chain = (\n        {\"context\": retriever, \"question\": RunnablePassthrough()}\n        | prompt\n        | llm\n        | StrOutputParser()\n    )\n\n    docs = await vectorstore.asimilarity_search_with_score(\n        query=input.query, k=input.k\n    )\n    answer = await chain.ainvoke(input.query)\n\n    return Output(\n        answer=answer,\n        sources=[doc.metadata.get(\"source\", \"\") for doc, _ in docs],\n    )\n```\n\n**Key points:**\n- `ContextGroundingVectorStore` connects to UiPath Context Grounding indexes\n- Use `.as_retriever()` to integrate with LangChain's LCEL chains\n- `UiPathAzureChatOpenAI` routes through UiPath's LLM Gateway\n- Supports both sync (`invoke`) and async (`ainvoke`) retrieval\n\n---\n\n## Chat Agent\n\nConversational agent with tool access, built using LangGraph's `create_agent()` helper. Minimal boilerplate for tool-using chat agents.\n\n**When to use:** Conversational assistants, tool-augmented chat, agents that need web search or API access.\n\n```python\nfrom pydantic import BaseModel\nfrom uipath_langchain.chat.models import UiPathAzureChatOpenAI\nfrom langchain_tavily import TavilySearch\nfrom langgraph.prebuilt import create_react_agent\n\nclass GraphInput(BaseModel):\n    question: str\n\nclass GraphOutput(BaseModel):\n    answer: str\n\nsystem_prompt = \"\"\"You are a helpful assistant that answers questions.\nUse the search tool to find current information when needed.\"\"\"\n\n# NOTE: LLM and graph are created inside a node to comply with lazy-init rules.\n# create_react_agent is used here as a sub-graph called from the outer node.\nasync def agent_node(state: GraphState) -> dict:\n    llm = UiPathAzureChatOpenAI()\n    tools = [TavilySearch(max_results=3)]\n    react_graph = create_react_agent(llm, tools=tools, prompt=system_prompt)\n    result = await react_graph.ainvoke({\"messages\": state[\"messages\"]})\n    return {\"messages\": result[\"messages\"], \"answer\": result[\"messages\"][-1].content}\n\nbuilder = StateGraph(GraphState, input=GraphInput, output=GraphOutput)\nbuilder.add_node(\"agent\", agent_node)\nbuilder.add_edge(START, \"agent\")\nbuilder.add_edge(\"agent\", END)\ngraph = builder.compile()\n```\n\n**Key points:**\n- `create_react_agent()` handles the agent loop (reason \u2192 act \u2192 observe) automatically\n- Pass any LangChain-compatible tools in the `tools` list\n- The `prompt` parameter guides agent behavior and tool usage\n- Supports any LangChain chat model (OpenAI, Anthropic, Azure, etc.)\n\n---\n\n## Multi-Agent Supervisor\n\nA supervisor agent routes tasks to specialized worker agents, then synthesizes results. Each worker is an independent agent with its own tools and prompt.\n\n**When to use:** Complex tasks requiring different expertise, divide-and-conquer workflows, research + code generation.\n\n```python\nfrom typing import Literal\nfrom pydantic import BaseModel\nfrom typing_extensions import TypedDict\nfrom langgraph.graph import START, END, StateGraph, MessagesState\nfrom uipath_langchain.chat.models import UiPathAzureChatOpenAI\nfrom langgraph.prebuilt import create_react_agent\nfrom langchain_core.messages import HumanMessage\n\nmembers = [\"researcher\", \"coder\"]\noptions = members + [\"FINISH\"]\n\nclass Router(TypedDict):\n    next: str  # One of: \"researcher\", \"coder\", \"FINISH\"\n\nclass State(MessagesState):\n    next: str\n    answer: str\n\nclass GraphInput(BaseModel):\n    question: str\n\nclass GraphOutput(BaseModel):\n    answer: str\n\ndef make_supervisor(_ignored):\n    # LLM is instantiated inside the closure so it is never created at module level.\n    async def supervisor(state: State) -> dict:\n        llm = UiPathAzureChatOpenAI()\n        router_llm = llm.with_structured_output(Router)\n        response = await router_llm.ainvoke(state[\"messages\"])\n        return {\"next\": response[\"next\"]}\n    return supervisor\n\n# Workers and supervisor instantiate LLM inside their functions \u2014 never at module level.\n\nasync def research_node(state: State):\n    llm = UiPathAzureChatOpenAI()\n    research_agent = create_react_agent(llm, tools=[search_tool], prompt=\"You research.\")\n    result = await research_agent.ainvoke(state)\n    return {\"messages\": [HumanMessage(content=result[\"messages\"][-1].content, name=\"researcher\")]}\n\nasync def code_node(state: State):\n    llm = UiPathAzureChatOpenAI()\n    code_agent = create_react_agent(llm, tools=[repl_tool], prompt=\"You write code.\")\n    result = await code_agent.ainvoke(state)\n    return {\"messages\": [HumanMessage(content=result[\"messages\"][-1].content, name=\"coder\")]}\n\ndef route_supervisor(state: State) -> str:\n    match state.get(\"next\", \"FINISH\"):\n        case \"researcher\": return \"researcher\"\n        case \"coder\": return \"coder\"\n        case _: return END\n\nbuilder = StateGraph(State, input=GraphInput, output=GraphOutput)\nbuilder.add_node(\"supervisor\", make_supervisor(None))  # LLM created inside supervisor closure\nbuilder.add_node(\"researcher\", research_node)\nbuilder.add_node(\"coder\", code_node)\nbuilder.add_edge(START, \"supervisor\")\nbuilder.add_conditional_edges(\"supervisor\", route_supervisor)\nbuilder.add_edge(\"researcher\", \"supervisor\")\nbuilder.add_edge(\"coder\", \"supervisor\")\ngraph = builder.compile()\n```\n\n**Key points:**\n- The supervisor uses `with_structured_output(Router)` to decide which worker to call\n- Workers return results as `HumanMessage` with a `name` so the supervisor can track who responded\n- Workers loop back to the supervisor, which decides the next step or finishes\n- Each worker is a full `create_react_agent()` with its own tools and prompt\n\n---\n\n## Common Building Blocks\n\n- **Pydantic models** \u2014 Every agent defines `Input`/`Output` (or `GraphInput`/`GraphOutput`) as `BaseModel` subclasses. Run `uip codedagent init` after changing them.\n- **`@traced()`** \u2014 Apply to `main` and key helpers. LangGraph agents get tracing automatically.\n- **`@mockable()`** \u2014 Wrap functions calling external services to enable evaluation mocking:\n  ```python\n  from uipath.testing import mockable\n\n  @mockable()\n  async def fetch_customer_data(customer_id: str) -> dict:\n      \"\"\"Call the real CRM API \u2014 replaced with mock data during evaluations.\"\"\"\n      return await crm_client.get_customer(customer_id)\n  ```\n  During evaluations, if the eval set provides a `mockingStrategy: mockito` entry matching the function name and arguments, the mock value is returned instead of calling the real API. During normal execution the real function runs.\n- **Async** \u2014 All patterns support `async def main(...)`. SDK methods have `_async` variants.\n", "references/frameworks/langgraph-integration.md": "# LangGraph Integration Guide\n\n> **Agent type: Coded agents only.** Low-code agents use the built-in ReAct engine (`basic-v2`) configured declaratively via `agent.json` \u2014 no framework or Python code needed. See the [low-code setup guide](../lowcode/setup.md).\n\nHow to build LangGraph agents that work with the UiPath platform. This guide covers project structure, entrypoint detection, LLM models, and common pitfalls.\n\n## Scaffolding a New Project\n\nIf there is **no existing agent code**, scaffold a LangGraph project with:\n\n```bash\nmkdir my-agent && cd my-agent\nuip codedagent new my-agent\n```\n\nThis generates `main.py` (with a StateGraph template), `langgraph.json`, and `pyproject.toml`. Then modify `main.py` to implement your actual agent logic.\n\n> **Prerequisite:** `uipath-langchain` must be installed for the LangGraph template to be used. If you get a base template instead, install `uipath-langchain` first.\n\n## Project Structure\n\nLangGraph agents use a **different structure** from simple function-based agents. There are two supported patterns:\n\n### Pattern A: `langgraph.json` (Recommended for LangGraph)\n\n```\nmy-agent/\n\u251c\u2500\u2500 main.py               # LangGraph definition \u2014 exports `graph` variable\n\u251c\u2500\u2500 langgraph.json        # Graph configuration \u2014 maps names to graph variables\n\u251c\u2500\u2500 pyproject.toml        # Dependencies (must include uipath-langchain)\n\u251c\u2500\u2500 .env                  # Environment variables\n\u2514\u2500\u2500 ...                   # Generated by uip codedagent init\n```\n\n**`langgraph.json`** tells the runtime where to find your graph:\n\n```json\n{\n  \"graphs\": {\n    \"agent\": \"./main.py:graph\"\n  }\n}\n```\n\n- `\"agent\"` \u2014 the entrypoint name (used with `uip codedagent run agent`)\n- `\"./main.py:graph\"` \u2014 path to the Python file and the variable name (`file:variable`)\n- The file can be named `main.py` or `graph.py` \u2014 just ensure the path matches\n\n### Pattern B: `uipath.json` with `functions`\n\nFor agents that use `main.py` instead of `graph.py`:\n\n```\nmy-agent/\n\u251c\u2500\u2500 main.py               # LangGraph definition \u2014 exports `graph` variable\n\u251c\u2500\u2500 uipath.json           # UiPath config with functions mapping\n\u251c\u2500\u2500 pyproject.toml        # Dependencies\n\u2514\u2500\u2500 ...\n```\n\n**`uipath.json`** maps the graph entrypoint:\n\n```json\n{\n  \"$schema\": \"https://cloud.uipath.com/draft/2024-12/uipath\",\n  \"runtimeOptions\": {\n    \"isConversational\": false\n  },\n  \"packOptions\": {\n    \"includeUvLock\": true\n  },\n  \"functions\": {\n    \"graph\": \"main.py:graph\"\n  }\n}\n```\n\n### Which Pattern to Use?\n\n| Pattern | When to Use |\n|---------|-------------|\n| `langgraph.json` | New LangGraph projects, multi-graph setups |\n| `uipath.json` functions | Existing UiPath projects adding a LangGraph graph |\n\nBoth patterns require the `graph` variable to be a compiled `StateGraph` or `CompiledStateGraph`.\n\n---\n\n## Required Dependencies\n\nEvery LangGraph agent needs these in `pyproject.toml`:\n\n```toml\n[project]\nname = \"my-agent\"\nversion = \"0.0.1\"\ndescription = \"My LangGraph agent\"\nrequires-python = \">=3.11\"\ndependencies = [\n    \"uipath\",\n    \"uipath-langchain\",\n]\n\n[dependency-groups]\ndev = [\n    \"uipath-dev\",\n]\n```\n\n**Key point:** `uipath-langchain` is required \u2014 it registers the LangGraph runtime factory that enables `uip codedagent run`, `uip codedagent init`, and deployment to detect and execute your graph.\n\nFor agents that use LLM calls, add the appropriate model dependency:\n\n```toml\ndependencies = [\n    \"uipath\",\n    \"uipath-langchain\",\n    \"langgraph>=1.0.4\",          # If using StateGraph directly\n    \"langchain-community\",        # If using community tools (DuckDuckGo, etc.)\n]\n```\n\n---\n\n## LLM Models\n\nUse UiPath's LLM libraries instead of raw `langchain_openai.ChatOpenAI`. These route through UiPath's LLM Gateway for centralized model management and billing.\n\n### UiPathAzureChatOpenAI (Passthrough)\n\nDrop-in replacement for LangChain's `ChatOpenAI` that routes through UiPath's passthrough endpoint (Azure OpenAI API format). No API keys needed \u2014 usage consumes Agent Units from your UiPath account.\n\n> **CRITICAL: Never instantiate LLM clients at module level.** `uip codedagent init` imports your file \u2014 module-level LLM clients will fail because auth may not have happened yet. Always create LLM instances inside graph nodes or functions.\n\n```python\nfrom uipath_langchain.chat.models import UiPathAzureChatOpenAI\n\n# INSIDE a graph node or function, not at module level:\nllm = UiPathAzureChatOpenAI(\n    model=\"gpt-4.1-mini-2025-04-14\",\n    temperature=0.7,\n    max_tokens=4000,\n    timeout=30,\n    max_retries=2\n)\n```\n\n**Supported Models:**\n- `gpt-4`, `gpt-4-turbo-2024-04-09`\n- `gpt-4o-2024-05-13`, `gpt-4o-mini-2024-07-18`\n- `gpt-4.1-mini-2025-04-14` (recommended)\n- And others available in your UiPath instance\n\n**Features:**\n- No API key needed \u2014 uses UiPath authentication\n- Supports streaming, structured output, and tool calling\n- Integrates seamlessly with LangChain agents and RAG\n\n### UiPathChat (Normalized)\n\nVersatile model class supporting multiple vendors through UiPath's normalized LLM Gateway API. Ideal for multi-vendor strategies.\n\n```python\nfrom uipath_langchain.chat.models import UiPathChat\n\nllm = UiPathChat(\n    model=\"gpt-4o-2024-11-20\",\n    temperature=0.5,\n    max_tokens=2000\n)\n```\n\n**Supported Models Include:**\n- **OpenAI**: `gpt-4o-2024-11-20`, `o3-mini-2025-01-31`\n- **Anthropic**: `anthropic.claude-3-5-sonnet-20240620-v1:0`\n- **Google**: `gemini-2.0-flash-001`\n- **AWS & Others**: Additional models based on your region and account\n\n**Features:**\n- Supports multiple model providers\n- Custom streaming headers for compatibility\n- Flexible model switching for cost/quality optimization\n- Regional availability may vary by data residency requirements\n\n### Configuration Parameters\n\nBoth models support these configuration options:\n\n- `temperature` (0-1): Controls randomness vs. determinism (default: 0.7)\n- `max_tokens`: Maximum response length (default varies by model)\n- `timeout`: API request timeout in seconds\n- `max_retries`: Number of retries on transient failures (default: 2)\n- `top_p`: Nucleus sampling parameter for diversity\n- `frequency_penalty`: Reduce token repetition\n- `presence_penalty`: Encourage new topics\n\n### Structured Output\n\nBoth models support `with_structured_output()` for Pydantic schema validation:\n\n```python\nfrom pydantic import BaseModel\n\nclass Analysis(BaseModel):\n    sentiment: str\n    confidence: float\n\nllm = UiPathAzureChatOpenAI()\nstructured_llm = llm.with_structured_output(Analysis)\nresult = await structured_llm.ainvoke(\"Analyze: I love this product!\")\n# result is an Analysis instance\n```\n\n### Model Selection Guide\n\n| Use Case | Recommended Model | Class |\n|----------|-------------------|-------|\n| Cost-conscious, general tasks | `gpt-4o-mini` or `gpt-4.1-mini-2025-04-14` | UiPathAzureChatOpenAI |\n| Complex reasoning, state-of-the-art | `gpt-4o` or `o3-mini` | UiPathChat or UiPathAzureChatOpenAI |\n| Multi-vendor flexibility | Any vendor model | UiPathChat |\n| Specialized domains (e.g., code) | Claude variants | UiPathChat |\n\n---\n\n## Graph Definition\n\n### Input/Output Schemas\n\nDefine `GraphInput` and `GraphOutput` as Pydantic models. These become the agent's schema for `uip codedagent init` and deployment:\n\n```python\nfrom pydantic import BaseModel, Field\n\nclass GraphInput(BaseModel):\n    query: str = Field(description=\"The user's question\")\n    max_results: int = Field(default=5, description=\"Max results to return\")\n\nclass GraphOutput(BaseModel):\n    answer: str = Field(description=\"The answer\")\n    sources: list[str] = Field(default_factory=list, description=\"Sources used\")\n```\n\n### State Definition\n\nUse `MessagesState` for agents that need conversation history, or a plain `TypedDict`/`BaseModel` for simpler workflows:\n\n```python\nfrom langgraph.graph import MessagesState\n\nclass GraphState(MessagesState):\n    query: str\n    answer: str | None = None\n    sources: list[str] | None = None\n```\n\n### Building the Graph\n\n```python\nfrom langgraph.graph import START, END, StateGraph\nfrom langgraph.types import Command\n\nasync def search(state: GraphState) -> Command:\n    # ... your logic ...\n    return Command(update={\"answer\": \"result\", \"sources\": [\"url1\"]})\n\nbuilder = StateGraph(GraphState, input=GraphInput, output=GraphOutput)\nbuilder.add_node(\"search\", search)\nbuilder.add_edge(START, \"search\")\nbuilder.add_edge(\"search\", END)\n\ngraph = builder.compile()\n```\n\n**Important:** The variable MUST be named `graph` and be a `CompiledStateGraph`. This is what the runtime factory looks for.\n\n---\n\n## Tracing\n\nLangGraph agents get **automatic tracing** \u2014 you do NOT need `@traced()` on graph nodes. The UiPath LangGraph runtime instruments all node executions, LLM calls, and tool invocations automatically.\n\nUse `@traced()` only on helper functions **outside** the graph that you want to monitor:\n\n```python\nfrom uipath.tracing import traced\n\n@traced(name=\"postprocess\", span_type=\"tool\")\nasync def postprocess(text: str) -> str:\n    \"\"\"This gets its own trace span because it's not a graph node.\"\"\"\n    return text.strip().lower()\n```\n\n---\n\n## Running `uip codedagent init`\n\nAfter creating your graph, generate project configuration:\n\n```bash\nuv sync\nuip codedagent init\n```\n\n### How Entrypoint Detection Works\n\n1. `uip codedagent init` loads all registered middleware via Python entry points\n2. The `uipath-langchain` package registers a LangGraph middleware\n3. The middleware checks for `langgraph.json` \u2014 if found, it handles init\n4. If no `langgraph.json`, the standard init checks `uipath.json` `\"functions\"` field\n5. The runtime imports your Python file and validates the `graph` variable\n6. Input/Output schemas are extracted from the graph's `input`/`output` type annotations\n\n### Troubleshooting `uip codedagent init`\n\n**\"No function entrypoints found\"**\n- Ensure `langgraph.json` exists with the correct `\"graphs\"` mapping, OR\n- Ensure `uipath.json` has a `\"functions\"` entry pointing to your graph\n- The file path and variable name must match exactly (e.g., `\"./main.py:graph\"`)\n\n**Import errors during init / authentication failures**\n- `uip codedagent init` imports your Python file to introspect the graph\n- Module-level `UiPathAzureChatOpenAI()` or `UiPathChat()` will try to authenticate on import and fail\n- **Fix: Move LLM instantiation inside functions/nodes, never at module level:**\n  ```python\n  # BAD \u2014 fails during uip codedagent init:\n  llm = UiPathAzureChatOpenAI()\n\n  # GOOD \u2014 lazy initialization inside a node:\n  async def my_node(state):\n      llm = UiPathAzureChatOpenAI()\n      return await llm.ainvoke(state[\"messages\"])\n  ```\n\n**Schema not detected**\n- Ensure your `StateGraph` specifies `input=GraphInput, output=GraphOutput`\n- The Input/Output classes must be Pydantic `BaseModel` subclasses\n\n---\n\n## Running Your Agent\n\n```bash\n# With langgraph.json\nuip codedagent run agent '{\"query\": \"What is Python?\"}'\n\n# With uipath.json functions (using the function name)\nuip codedagent run graph '{\"query\": \"What is Python?\"}'\n```\n\nThe entrypoint name comes from the key in `langgraph.json` `\"graphs\"` or `uipath.json` `\"functions\"`.\n\n---\n\n## Conversational Agents\n\nFor chat-style agents that maintain conversation history, set `isConversational` in `uipath.json`:\n\n```json\n{\n  \"runtimeOptions\": {\n    \"isConversational\": true\n  }\n}\n```\n\nThis enables the UiPath runtime to manage message history and thread state across turns.\n\n---\n\n## Available Tools\n\nThe `uipath-langchain` package provides UiPath-specific LangChain tools:\n\n| Tool | Import | Purpose |\n|------|--------|---------|\n| Process invocation | `uipath_langchain.agent.tools` | Trigger UiPath processes |\n| Escalation (HITL) | `uipath_langchain.agent.tools` | Send to human reviewer |\n| Context search | `uipath_langchain.agent.tools` | Search Context Grounding indexes |\n| MCP tools | `uipath_langchain.agent.tools.mcp` | Connect to MCP servers |\n\n---\n\n", "references/frameworks/llamaindex-integration.md": "# LlamaIndex Integration Guide\n\n> **Agent type: Coded agents only.** Low-code agents use the built-in ReAct engine (`basic-v2`) configured declaratively via `agent.json` \u2014 no framework or Python code needed. See the [low-code setup guide](../lowcode/setup.md).\n\nHow to build LlamaIndex agents that work with the UiPath platform. This guide covers project structure, entrypoint detection, LLM models, and common pitfalls.\n\n## Scaffolding a New Project\n\nIf there is **no existing agent code**, scaffold a LlamaIndex project with:\n\n```bash\nmkdir my-agent && cd my-agent\nuip codedagent new my-agent\n```\n\nThis generates `main.py` (with a Workflow template), `llama_index.json`, and `pyproject.toml`. Then modify `main.py` to implement your actual agent logic.\n\n> **Prerequisite:** `uipath-llamaindex` must be installed for the LlamaIndex template to be used.\n\n## Project Structure\n\nLlamaIndex agents use the `Workflow` class from `llama_index.core.workflow` and a `llama_index.json` configuration file.\n\n```\nmy-agent/\n\u251c\u2500\u2500 main.py               # Workflow definition \u2014 exports `agent` variable\n\u251c\u2500\u2500 llama_index.json       # Workflow configuration \u2014 maps names to workflow variables\n\u251c\u2500\u2500 pyproject.toml         # Dependencies (must include uipath-llamaindex)\n\u251c\u2500\u2500 .env                   # Environment variables\n\u2514\u2500\u2500 ...                    # Generated by uip codedagent init\n```\n\n**`llama_index.json`** tells the runtime where to find your workflow:\n\n```json\n{\n  \"workflows\": {\n    \"agent\": \"main.py:workflow\"\n  }\n}\n```\n\n- `\"agent\"` \u2014 the entrypoint name (used with `uip codedagent run agent`)\n- `\"main.py:workflow\"` \u2014 path to the Python file and the variable name (`file:variable`)\n- The variable can be named anything \u2014 just ensure it matches the config\n\n---\n\n## Required Dependencies\n\nEvery LlamaIndex agent needs these in `pyproject.toml`:\n\n```toml\n[project]\nname = \"my-agent\"\nversion = \"0.1.0\"\ndescription = \"My LlamaIndex agent\"\nrequires-python = \">=3.11\"\n\ndependencies = [\n    \"uipath\",\n    \"uipath-llamaindex\",\n]\n\n[dependency-groups]\ndev = [\n    \"uipath-dev\",\n]\n```\n\n**Key point:** `uipath-llamaindex` is required \u2014 it registers the LlamaIndex runtime factory that enables `uip codedagent run`, `uip codedagent init`, and deployment to detect and execute your workflow.\n\nFor agents that use specific LLM providers, add the appropriate model dependency:\n\n```toml\ndependencies = [\n    \"uipath-llamaindex\",\n    \"llama-index-llms-openai>=0.6.10\",    # If using OpenAI models\n    \"llama-index-llms-bedrock>=0.3.0\",     # If using AWS Bedrock\n    \"llama-index-llms-google-genai>=0.8.0\", # If using Google Gemini\n]\n```\n\n---\n\n## LLM Models\n\nUse UiPath's LLM wrapper instead of raw `OpenAI()` from llama-index. This routes through UiPath's LLM Gateway for centralized model management and billing.\n\n### UiPathOpenAI\n\n> **CRITICAL: Never instantiate LLM clients at module level.** `uip codedagent init` imports your file \u2014 module-level LLM clients will fail because auth may not have happened yet. Always create LLM instances inside workflow steps or functions.\n\n```python\nfrom uipath_llamaindex.llms import UiPathOpenAI\n\n# INSIDE a workflow step or function, not at module level:\nllm = UiPathOpenAI()\n```\n\n- Routes through UiPath's passthrough endpoint (Azure OpenAI API format)\n- No API key needed \u2014 uses UiPath authentication\n- Default model: `gpt-4.1-2025-04-14`\n\n### Supported Models\n\n```python\nfrom uipath_llamaindex.llms import UiPathOpenAI, OpenAIModels\n\nllm = UiPathOpenAI(model=OpenAIModels.GPT_4O_2024_11_20)\n```\n\nAvailable models include: `GPT_4O_2024_05_13`, `GPT_4O_2024_08_06`, `GPT_4O_2024_11_20`, `GPT_4O_MINI_2024_07_18`, `GPT_4_1_2025_04_14` (default), `GPT_4_1_MINI_2025_04_14`, `GPT_4_1_NANO_2025_04_14`, `O3_MINI_2025_01_31`.\n\n---\n\n## Workflow Definition\n\n### Input/Output Events\n\nLlamaIndex agents use `StartEvent` and `StopEvent` subclasses for input and output schemas:\n\n```python\nfrom llama_index.core.workflow import StartEvent, StopEvent, Event, Workflow, step\n\nclass MyStartEvent(StartEvent):\n    query: str\n    max_results: int = 5\n\nclass MyStopEvent(StopEvent):\n    answer: str\n    sources: list[str] = []\n```\n\n- `StartEvent` subclass \u2192 becomes the agent's **input schema**\n- `StopEvent` subclass \u2192 becomes the agent's **output schema**\n- `Event` subclass \u2192 intermediate events passed between steps\n\n### Building a Workflow\n\n```python\nfrom llama_index.core.workflow import StartEvent, StopEvent, Event, Workflow, step\nfrom uipath_llamaindex.llms import UiPathOpenAI\n\nclass QueryEvent(StartEvent):\n    query: str\n\nclass AnswerEvent(StopEvent):\n    answer: str\n\nclass IntermediateEvent(Event):\n    processed_query: str\n\nclass MyAgent(Workflow):\n    # UiPathOpenAI is instantiated inside each step to comply with lazy-init rules.\n    # Do NOT use class-level attributes for LLM clients.\n\n    @step\n    async def process_query(self, ev: QueryEvent) -> IntermediateEvent:\n        return IntermediateEvent(processed_query=ev.query.strip().lower())\n\n    @step\n    async def generate_answer(self, ev: IntermediateEvent) -> AnswerEvent:\n        llm = UiPathOpenAI()  # instantiated inside step, not at class level\n        response = await llm.acomplete(\n            f\"Answer this question: {ev.processed_query}\"\n        )\n        return AnswerEvent(answer=str(response))\n\nworkflow = MyAgent(timeout=60, verbose=False)\n```\n\n**Important:** The variable name MUST match what's in `llama_index.json` (e.g., `workflow` if the config says `main.py:workflow`) and be an instantiated `Workflow`.\n\n### Step Decorator\n\nUse `@step` on async methods inside a `Workflow` class:\n- Each step receives an event and returns another event\n- Steps are automatically connected by their event types\n- The workflow starts when a `StartEvent` (or subclass) is emitted\n- The workflow ends when a `StopEvent` (or subclass) is returned\n\n---\n\n## Tracing\n\nLlamaIndex agents get **automatic tracing** via the `openinference-instrumentation-llama-index` package (included with `uipath-llamaindex`). You do NOT need `@traced()` on workflow steps.\n\nUse `@traced()` only on helper functions **outside** the workflow:\n\n```python\nfrom uipath.tracing import traced\n\n@traced(name=\"postprocess\", span_type=\"tool\")\nasync def postprocess(text: str) -> str:\n    return text.strip().lower()\n```\n\n---\n\n## Running `uip codedagent init`\n\nAfter creating your workflow, generate project configuration:\n\n```bash\nuv sync\nuip codedagent init\n```\n\n### How Entrypoint Detection Works\n\n1. `uip codedagent init` loads all registered middleware via Python entry points\n2. The `uipath-llamaindex` package registers a LlamaIndex middleware\n3. The middleware checks for `llama_index.json` \u2014 if found, it handles init\n4. The runtime imports your Python file and validates the workflow variable\n5. Input/Output schemas are extracted from your `StartEvent`/`StopEvent` subclasses\n\n### Troubleshooting `uip codedagent init`\n\n**\"No function entrypoints found\"**\n- Ensure `llama_index.json` exists with the correct `\"workflows\"` mapping\n- The file path and variable name must match exactly: `\"main.py:agent\"`\n- Ensure `uipath-llamaindex` is installed (`uv sync`)\n\n**Import errors during init**\n- `uip codedagent init` imports your Python file to introspect the workflow\n- Avoid side effects at module level (API calls, heavy initialization)\n- Instantiate the LLM as a class attribute inside the Workflow class\n\n**Schema not detected**\n- Ensure you use custom `StartEvent` and `StopEvent` subclasses with typed fields\n- Plain `StartEvent` / `StopEvent` without fields will use default schemas\n\n---\n\n## Running Your Agent\n\n```bash\nuip codedagent run agent '{\"query\": \"What is Python?\"}'\n```\n\nThe entrypoint name comes from the key in `llama_index.json` `\"workflows\"`.\n\n---\n\n## UiPath Platform Integration\n\n### Context Grounding (RAG)\n\n```python\nfrom uipath_llamaindex.query_engines import ContextGroundingQueryEngine\nfrom llama_index.core.tools import QueryEngineTool, ToolMetadata\n\nquery_engine = ContextGroundingQueryEngine(\n    index_name=\"my_knowledge_base\",\n    folder_path=\"Shared\",\n    response_synthesizer=response_synthesizer,\n)\n\ntools = [\n    QueryEngineTool(\n        query_engine=query_engine,\n        metadata=ToolMetadata(\n            name=\"knowledge_base\",\n            description=\"Search the knowledge base for information\"\n        ),\n    )\n]\n```\n\n### Human-in-the-Loop\n\n```python\nfrom llama_index.core.workflow import Context, HumanResponseEvent, InputRequiredEvent\n\n@step\nasync def human_review(self, ctx: Context, ev: ReviewEvent) -> ApprovedEvent:\n    response = await ctx.wait_for_event(\n        HumanResponseEvent,\n        waiter_id=\"review_request\",\n        waiter_event=InputRequiredEvent(\n            prefix=\"Please review this result. Approve? (yes/no)\"\n        ),\n    )\n    approved = response.response.strip().lower() == \"yes\"\n    return ApprovedEvent(approved=approved)\n```\n\n### Process Invocation\n\n```python\nfrom uipath_llamaindex.models import InvokeProcessEvent, WaitJobEvent\n\n@step\nasync def invoke_process(self, ev: TriggerEvent) -> WaitJobEvent:\n    return InvokeProcessEvent(\n        process_name=\"MyProcess\",\n        input_arguments={\"data\": ev.data},\n    )\n```\n\n---\n\n## Complete Examples\n\n### Simple Workflow Agent\n\n```python\n# main.py\nfrom llama_index.core.workflow import StartEvent, StopEvent, Event, Workflow, step\nfrom uipath_llamaindex.llms import UiPathOpenAI\n\nclass QueryEvent(StartEvent):\n    query: str\n\nclass ResultEvent(StopEvent):\n    answer: str\n    confidence: float\n\nclass AnalysisEvent(Event):\n    analysis: str\n\nclass AnalysisAgent(Workflow):\n    # UiPathOpenAI is instantiated inside each step to comply with lazy-init rules.\n    # Do NOT use class-level attributes for LLM clients.\n\n    @step\n    async def analyze(self, ev: QueryEvent) -> AnalysisEvent:\n        llm = UiPathOpenAI()  # instantiated inside step, not at class level\n        response = await llm.acomplete(\n            f\"Analyze this question and identify the key topic: {ev.query}\"\n        )\n        return AnalysisEvent(analysis=str(response))\n\n    @step\n    async def answer(self, ev: AnalysisEvent) -> ResultEvent:\n        llm = UiPathOpenAI()  # instantiated inside step, not at class level\n        response = await llm.acomplete(\n            f\"Based on this analysis: {ev.analysis}\\nProvide a concise answer.\"\n        )\n        return ResultEvent(answer=str(response), confidence=0.85)\n\nworkflow = AnalysisAgent(timeout=60, verbose=False)\n```\n\n### FunctionAgent (Chat Agent with Tools)\n\nFor simpler agents that don't need custom workflow steps, use `FunctionAgent`:\n\n```python\n# main.py\nfrom llama_index.core.agent.workflow import FunctionAgent\nfrom llama_index.core.tools import FunctionTool\nfrom uipath_llamaindex.llms import UiPathOpenAI\n\ndef search_knowledge_base(query: str) -> str:\n    \"\"\"Search the knowledge base for information.\"\"\"\n    return f\"Results for: {query}\"\n\ntools = [FunctionTool.from_defaults(fn=search_knowledge_base)]\n\nworkflow = FunctionAgent(\n    tools=tools,\n    llm=UiPathOpenAI(),\n    system_prompt=\"You are a helpful assistant. Use tools to find information.\",\n)\n```\n\nFunctionAgent uses a default input/output schema:\n- Input: `{\"user_msg\": \"your question\"}`\n- Output: agent's response string\n\n---\n\n## Next Steps\n\n- **[Agent Patterns](agent-patterns.md)** \u2014 Architecture patterns with full code examples\n- **[SDK Services](sdk-services.md)** \u2014 Use UiPath platform services in your workflow steps\n- **[Tracing](tracing.md)** \u2014 Advanced tracing for helper functions outside the workflow\n- **[Deployment](deployment.md)** \u2014 Package and publish your LlamaIndex agent\n", "references/frameworks/openai-agents-integration.md": "# OpenAI Agents Integration Guide\n\n> **Agent type: Coded agents only.** Low-code agents use the built-in ReAct engine (`basic-v2`) configured declaratively via `agent.json` \u2014 no framework or Python code needed. See the [low-code setup guide](../lowcode/setup.md).\n\nA lightweight integration for running OpenAI Agents SDK agents on the UiPath platform. This guide covers project structure, entrypoint detection, LLM models, and common pitfalls.\n\n> **Note:** This is a streamlined integration focused on agent execution and streaming. It does **not** support Human-in-the-Loop (HITL), state persistence/checkpointing, or UiPath process invocation from within agents. For workflows that need those features, use the [LangGraph](langgraph-integration.md) or [LlamaIndex](llamaindex-integration.md) integrations instead.\n\n## Scaffolding a New Project\n\nIf there is **no existing agent code**, scaffold an OpenAI Agents project with:\n\n```bash\nmkdir my-agent && cd my-agent\nuip codedagent new my-agent\n```\n\nThis generates `main.py` (with an Agent + tool template), `openai_agents.json`, `AGENTS.md`, and `pyproject.toml`. Then modify `main.py` to implement your actual agent logic.\n\n> **Prerequisite:** `uipath-openai-agents` must be installed for the OpenAI Agents template to be used.\n\n## Project Structure\n\nOpenAI Agents use the `Agent` class from the `agents` package and an `openai_agents.json` configuration file.\n\n```\nmy-agent/\n\u251c\u2500\u2500 main.py               # Agent definition \u2014 exports `agent` variable or `main()` function\n\u251c\u2500\u2500 openai_agents.json    # Agent configuration \u2014 maps names to agent variables\n\u251c\u2500\u2500 pyproject.toml        # Dependencies (must include uipath-openai-agents)\n\u251c\u2500\u2500 .env                  # Environment variables\n\u2514\u2500\u2500 ...                   # Generated by uip codedagent init\n```\n\n**`openai_agents.json`** tells the runtime where to find your agent:\n\n```json\n{\n  \"agents\": {\n    \"agent\": \"main.py:agent\"\n  }\n}\n```\n\n- `\"agent\"` \u2014 the entrypoint name (used with `uip codedagent run agent`)\n- `\"main.py:agent\"` \u2014 path to the Python file and the variable name (`file:variable`)\n\nYou can also point to a function that returns an Agent:\n\n```json\n{\n  \"agents\": {\n    \"agent\": \"main.py:main\"\n  }\n}\n```\n\n---\n\n## Required Dependencies\n\nEvery OpenAI Agents agent needs these in `pyproject.toml`:\n\n```toml\n[project]\nname = \"my-agent\"\nversion = \"0.1.0\"\ndescription = \"My OpenAI Agents agent\"\nrequires-python = \">=3.11\"\n\ndependencies = [\n    \"uipath-openai-agents\",\n]\n\n[dependency-groups]\ndev = [\n    \"uipath-dev\",\n]\n```\n\n**Key point:** `uipath-openai-agents` is required \u2014 it registers the OpenAI Agents runtime factory that enables `uip codedagent run`, `uip codedagent init`, and deployment to detect and execute your agent.\n\n---\n\n## LLM Models\n\nUse UiPath's LLM wrapper to route through UiPath's LLM Gateway for centralized model management and billing.\n\n### UiPathChatOpenAI\n\n> **CRITICAL: Never instantiate `UiPathChatOpenAI` at module level.** `uip codedagent init` imports your file to introspect the agent \u2014 module-level LLM clients will fail because auth may not have happened yet. Always use the **factory function pattern** (see below) to defer initialization.\n\n```python\nfrom uipath_openai_agents.chat import UiPathChatOpenAI\nfrom uipath_openai_agents.chat.supported_models import OpenAIModels\nfrom agents.models import _openai_shared\n\n# INSIDE a factory function, not at module level:\nMODEL = OpenAIModels.gpt_4_1_2025_04_14\nclient = UiPathChatOpenAI(model_name=MODEL)\n_openai_shared.set_default_openai_client(client.async_client)\n```\n\n- Routes through UiPath's passthrough endpoint\n- No API key needed \u2014 uses UiPath authentication\n- Must call `set_default_openai_client()` to make all agents use UiPath's endpoint\n\n### Supported Models\n\nAvailable via `OpenAIModels` enum: `gpt_4o_2024_05_13`, `gpt_4o_2024_08_06`, `gpt_4o_2024_11_20`, `gpt_4o_mini_2024_07_18`, `gpt_4_1_2025_04_14`, `gpt_4_1_mini_2025_04_14`, `gpt_4_1_nano_2025_04_14`, `o3_mini_2025_01_31`.\n\nAlso supports Google Gemini models (`GeminiModels`) and AWS Bedrock models (`BedrockModels`).\n\n---\n\n## Agent Definition\n\n> **IMPORTANT:** Always define a Pydantic context model for your agent's input using `Agent[ContextType]`. This gives the agent typed, structured input fields beyond just `messages`. Without a context model, the agent only accepts a raw `messages` string \u2014 which means `uip codedagent init` cannot generate a proper input schema and the agent has no typed interface.\n\n### Standard Pattern: Agent with Context Model\n\nEvery agent should define a Pydantic model for its input context and use `Agent[ContextType]`:\n\n```python\nfrom pydantic import BaseModel, Field\nfrom agents import Agent\n\nclass AgentInput(BaseModel):\n    query: str = Field(description=\"The user's question or request\")\n\nagent = Agent[AgentInput](\n    name=\"my_agent\",\n    instructions=\"You are a helpful assistant. Answer the user's query.\",\n    model=\"gpt-4o\",\n)\n```\n\nInput for this agent:\n```json\n{\"messages\": \"Hello!\", \"query\": \"What is Python?\"}\n```\n\nThe runtime always extracts `messages` for the LLM conversation. Context fields (`query`, etc.) are parsed into the Pydantic model and available to tools and instructions.\n\n### Agent with Tools\n\n```python\nfrom pydantic import BaseModel, Field\nfrom agents import Agent, function_tool\n\nclass WeatherInput(BaseModel):\n    location: str = Field(description=\"City to check weather for\")\n\n@function_tool\ndef get_weather(location: str) -> str:\n    \"\"\"Get the current weather for a location.\"\"\"\n    return f\"Sunny, 72F in {location}\"\n\nagent = Agent[WeatherInput](\n    name=\"weather_agent\",\n    instructions=\"Use tools to answer weather questions about the requested location.\",\n    model=\"gpt-4o\",\n    tools=[get_weather],\n)\n```\n\n### Agent with Structured Output\n\nCombine a context model (typed input) with `output_type` (typed output):\n\n```python\nfrom pydantic import BaseModel, Field\nfrom agents import Agent\n\nclass AnalysisInput(BaseModel):\n    text: str = Field(description=\"Text to analyze\")\n\nclass AnalysisResult(BaseModel):\n    sentiment: str = Field(description=\"Overall sentiment\")\n    confidence: float = Field(description=\"Confidence score 0-1\")\n    summary: str = Field(description=\"Brief summary\")\n\nagent = Agent[AnalysisInput](\n    name=\"analyzer\",\n    instructions=\"Analyze the given text.\",\n    model=\"gpt-4o\",\n    output_type=AnalysisResult,\n)\n```\n\nInput:\n```json\n{\"messages\": \"Analyze this\", \"text\": \"I love this product, it works great!\"}\n```\n\n### Multi-Agent with Handoffs\n\nFor multi-agent systems, define the context model on the **top-level agent** (the entry point). Sub-agents inherit the context type:\n\n```python\nfrom pydantic import BaseModel, Field\nfrom agents import Agent\n\nclass CustomerInput(BaseModel):\n    customer_id: str = Field(description=\"Customer ID for lookup\")\n    issue_category: str = Field(default=\"\", description=\"Optional pre-classification\")\n\nspecialist_agent = Agent(\n    name=\"specialist\",\n    instructions=\"You handle technical questions.\",\n    model=\"gpt-4o\",\n)\n\ngeneral_agent = Agent[CustomerInput](\n    name=\"general\",\n    instructions=\"You handle general questions. Hand off technical ones.\",\n    model=\"gpt-4o\",\n    handoffs=[specialist_agent],\n)\n\nagent = general_agent\n```\n\n### Factory Function Pattern\n\nFor agents that need setup logic, use a function that returns `Agent[ContextType]`:\n\n```python\nfrom pydantic import BaseModel, Field\nfrom agents import Agent\nfrom agents.models import _openai_shared\nfrom uipath_openai_agents.chat import UiPathChatOpenAI\nfrom uipath_openai_agents.chat.supported_models import OpenAIModels\n\nclass AgentInput(BaseModel):\n    query: str = Field(description=\"The user's question\")\n\ndef main() -> Agent:\n    \"\"\"Configure UiPath client and return the agent.\"\"\"\n    MODEL = OpenAIModels.gpt_4_1_2025_04_14\n    client = UiPathChatOpenAI(model_name=MODEL)\n    _openai_shared.set_default_openai_client(client.async_client)\n\n    return Agent[AgentInput](\n        name=\"my_agent\",\n        instructions=\"You are a helpful assistant.\",\n        model=MODEL,\n    )\n```\n\nThen in `openai_agents.json`:\n```json\n{\n  \"agents\": {\n    \"agent\": \"main.py:main\"\n  }\n}\n```\n\n---\n\n## Input/Output Schemas\n\n### Input\n\nAll OpenAI Agents accept a `messages` field (for the LLM conversation) **plus** context fields from the Pydantic model:\n\n```json\n{\"messages\": \"What is the weather?\", \"location\": \"New York\"}\n```\n\n`messages` can also be a list of message objects:\n```json\n{\"messages\": [{\"role\": \"user\", \"content\": \"What is the weather?\"}], \"location\": \"New York\"}\n```\n\nThe context fields (`location`, etc.) come from the `Agent[ContextType]` Pydantic model. They are parsed separately from `messages` and available to the agent's tools and instructions.\n\n### Output\n\nWhen `output_type` is set to a Pydantic model, the agent returns structured data matching that model:\n```json\n{\"temperature\": \"72F\", \"conditions\": \"Sunny\", \"location\": \"New York\"}\n```\n\nWhen no `output_type` is set, the agent returns:\n```json\n{\"result\": \"The weather is sunny.\"}\n```\n\nAlways prefer setting `output_type` for a typed output schema.\n\n---\n\n## Tracing\n\nOpenAI Agents get **automatic tracing** via `openinference-instrumentation-openai-agents` (included with `uipath-openai-agents`). You do NOT need `@traced()` on agent definitions.\n\nUse `@traced()` only on helper functions **outside** the agent that you want to monitor:\n\n```python\nfrom uipath.tracing import traced\n\n@traced(name=\"preprocess\", span_type=\"tool\")\ndef preprocess_input(text: str) -> str:\n    return text.strip().lower()\n```\n\n---\n\n## Running `uip codedagent init`\n\nAfter creating your agent, generate project configuration:\n\n```bash\nuv sync\nuip codedagent init\n```\n\n### How Entrypoint Detection Works\n\n1. `uip codedagent init` loads all registered middleware via Python entry points\n2. The `uipath-openai-agents` package registers an OpenAI Agents middleware\n3. The middleware checks for `openai_agents.json` \u2014 if found, it handles init\n4. The runtime imports your Python file and resolves the agent (variable or function return)\n5. Input/Output schemas are extracted from the agent's `output_type` and generic type parameter\n\n### Troubleshooting `uip codedagent init`\n\n**\"No function entrypoints found\"**\n- Ensure `openai_agents.json` exists with the correct `\"agents\"` mapping\n- The file path and variable/function name must match exactly\n- Ensure `uipath-openai-agents` is installed (`uv sync`)\n\n**Import errors during init / authentication failures**\n- `uip codedagent init` imports your Python file to introspect the agent\n- Module-level `UiPathChatOpenAI()` or `set_default_openai_client()` will try to authenticate on import and fail\n- **Fix: Always use the factory function pattern** (`def main() -> Agent`) to defer LLM setup:\n  ```python\n  # BAD \u2014 fails during uip codedagent init:\n  client = UiPathChatOpenAI(model_name=MODEL)\n  _openai_shared.set_default_openai_client(client.async_client)\n  agent = Agent[MyInput](name=\"my_agent\", ...)\n\n  # GOOD \u2014 deferred inside factory function:\n  def main() -> Agent:\n      client = UiPathChatOpenAI(model_name=MODEL)\n      _openai_shared.set_default_openai_client(client.async_client)\n      return Agent[MyInput](name=\"my_agent\", ...)\n  ```\n\n**Schema not detected**\n- Set `output_type` on your Agent for custom output schemas\n- Use `Agent[ContextType]` for custom input schemas beyond `messages`\n\n---\n\n## Running Your Agent\n\n```bash\nuip codedagent run agent '{\"messages\": \"Tell me about this\", \"query\": \"What is Python?\"}'\n```\n\nThe entrypoint name comes from the key in `openai_agents.json` `\"agents\"`. The input JSON must include `messages` plus any fields defined in your context model.\n\n---\n\n", "references/frameworks/simple-agents.md": "# Creating UiPath Agents\n\n> **Agent type: Coded agents only.** Low-code agents use the built-in ReAct engine (`basic-v2`) configured declaratively via `agent.json` \u2014 no framework or Python code needed. See the [low-code setup guide](../lowcode/setup.md).\n\nGuide to creating new UiPath agents with AI-powered business logic implementation.\n\n## Initial Setup\n\nFollow the [Project Setup Guide](setup.md) to create your project directory, scaffold with `uip codedagent new`, install dependencies, and authenticate. All subsequent commands use the `uip codedagent` CLI wrapper.\n\n## Workflow\n\n### Step 1: Define Agent Schema\n\nSpecify:\n- **Agent Description**: What does this agent do?\n- **Input Fields**: Name, type, description for each input parameter\n- **Output Fields**: Name, type, description for each output\n\nThe schemas should be written as pydantic types.\n\n### Step 2: Choose Agent Type\n\n#### Simple Function Agent (no LLM framework)\n\nFor agents with deterministic logic, SDK calls, or simple processing \u2014 use `main.py` with a traced function:\n\n```python\nfrom pydantic import BaseModel, Field\nfrom uipath.tracing import traced\n\nclass Input(BaseModel):\n    # Generated fields based on your inputs\n    pass\n\nclass Output(BaseModel):\n    # Generated fields based on your outputs\n    pass\n\n@traced()\nasync def main(input: Input) -> Output:\n    \"\"\"Your agent's business logic implementation.\"\"\"\n    # AI-implemented logic will go here\n    pass\n```\n\n#### LangGraph Agent\n\nFor multi-step LLM reasoning, conditional routing, or tool-calling with LangChain \u2014 use `graph.py` + `langgraph.json`. See `langgraph-integration.md`.\n\n#### LlamaIndex Agent\n\nFor LlamaIndex-based workflows using `StartEvent`/`StopEvent` events and the `@step` decorator \u2014 use `main.py` + `llama_index.json`. See `llamaindex-integration.md`.\n\n#### OpenAI Agents Agent\n\nFor lightweight agents using the OpenAI Agents SDK with tool calling and handoffs \u2014 use `main.py` + `openai_agents.json`. See `openai-agents-integration.md`.\n\n## LLM Usage\n\n> **CRITICAL: Never instantiate LLM services at module level.** `uip codedagent init` imports your file to introspect schemas \u2014 module-level `UiPathOpenAIService()` or `UiPathLlmChatService()` will fail because auth has not run yet. Always instantiate inside your `main` function or async handler.\n\nThe **UiPath LLM Gateway** provides access to Large Language Model capabilities for conversational AI, structured data extraction, and semantic search. It supports both OpenAI-compatible and UiPath's normalized API formats.\n\n### Service Options\n\n**UiPathOpenAIService** \u2014 For direct OpenAI API compatibility:\n```python\nfrom uipath.llm_gateway import UiPathOpenAIService\n\nasync def main(input: Input) -> Output:\n    service = UiPathOpenAIService()  # instantiated inside function, not at module level\n    response = await service.chat_completions(messages=[\n        {\"role\": \"system\", \"content\": \"You are helpful.\"},\n        {\"role\": \"user\", \"content\": input.query}\n    ])\n    return Output(answer=response[\"choices\"][0][\"message\"][\"content\"])\n```\n\n**UiPathLlmChatService** \u2014 For advanced enterprise features (tool calling, function calling):\n```python\nfrom uipath.llm_gateway import UiPathLlmChatService\n\nservice = UiPathLlmChatService()\nresponse = await service.chat_completions(messages=messages)\n```\n\n### Structured Output with Pydantic\n\nExtract structured data using Pydantic models:\n\n```python\nfrom pydantic import BaseModel\n\nclass Country(BaseModel):\n    name: str\n    capital: str\n\nresponse = await service.chat_completions(\n    messages=messages,\n    response_format=Country\n)\n```\n\n### Text Embeddings\n\nGenerate embeddings for semantic search:\n\n```python\nembedding = await service.embeddings(\"Hello, world!\")\n```\n\n### Configuration\n\nControl LLM behavior with these parameters:\n- `temperature` (0-1): Controls randomness vs. determinism\n- `max_tokens`: Response length limit (default: 4096)\n- `top_p` and `top_k`: Diversity controls\n- `frequency_penalty` and `presence_penalty`: Token repetition management\n\nFor detailed information, see the [UiPath LLM Gateway documentation](https://uipath.github.io/uipath-python/core/llm_gateway/).\n\n### Step 3: Implement Business Logic\n\nDescribe your agent's functionality, then implement the main function (or graph nodes) with:\n- Proper error handling\n- UiPath SDK method calls (see [SDK Services](sdk-services.md))\n- Input validation\n- Output formatting\n\n### Step 4: Generate Entry Points\n\nRun `uip codedagent init` to generate `entry-points.json`, `uipath.json`, `bindings.json`, and documentation files. See the [Running uipath init](setup.md#running-uipath-init) section in Project Setup for details on entrypoint registration, auto-detection, and troubleshooting.\n\n### Step 5: Create Smoke Evaluation Set\n\n**Required.** Create `evaluations/eval-sets/smoke-test.json` with 2-3 basic test cases, then run `uip codedagent eval`. Use `ExactMatchEvaluator` for deterministic agents or `LLMJudgeOutputEvaluator` for LLM agents.\n\n### Step 6: Deploy\n\nWhen deploying: add author to `pyproject.toml`, bump version if re-deploying, then run `uip codedagent deploy --my-workspace`.\n\n## Generated Template Details\n\nThe created agent will include:\n- Pydantic models for Input and Output based on your schema\n- UiPath SDK initialization\n- `@traced()` decorator for monitoring\n- Function signature with type hints\n\n## Important Notes\n\n- All agents are automatically traced for monitoring and debugging\n- Input/output fields are strongly typed with Pydantic\n- The agent works globally and can call any UiPath SDK services\n- Generated `entry-points.json` enables integration with UiPath Cloud\n- If you require authentication, run `uip login --format json` then `uip login tenant set \"<TENANT>\" --format json`.\n", "references/lifecycle/authentication.md": "# UiPath Authentication\n\n> **Agent type: Both coded and low-code agents.** The same `uip login` flow applies to both. Authentication is required for any command that connects to UiPath Cloud (run, eval with `--report`, deploy, push, pull, invoke).\n\nSet up authentication with UiPath Cloud or on-premise before running cloud commands.\n\n## Quick Reference\n\n```bash\n# Interactive OAuth (recommended)\nuip login --format json\nuip login tenant set \"MY_TENANT\" --format json\n\n# Unattended (automation/CI)\nuip login --client-id ID --client-secret SECRET --base-url URL\n```\n\n## Documentation\n\n- This file covers complete authentication setup.\n  - Interactive OAuth flow (with tenant selection)\n  - Unattended client credentials flow\n  - Environment modes (--cloud, --staging, --alpha)\n  - Network and proxy settings\n  - Troubleshooting (browser issues, token expiry, tenant mismatch)\n\n## Critical Rules\n\n- **Skip auth if already authenticated.** Check if `.env` contains `UIPATH_URL` and auth tokens first. If auth is already configured, inform the user and skip.\n- **Never use `--it`/`--interactive` on `uip login` from Claude's Bash tool** \u2014 it opens an interactive terminal picker that hangs indefinitely. Use one of these instead:\n  - **One step** (tenant name known): `uip login --tenant \"MY_TENANT\" --format json`\n  - **Two step**: `uip login --format json` then `uip login tenant set \"MY_TENANT\" --format json`\n  - **Discovery** (tenant unknown): `uip login --format json` (auto-selects first tenant silently) \u2192 `uip login tenant list --format json` \u2192 present names to user \u2192 `uip login tenant set \"NAME\" --format json`\n- **Auth MUST be an interactive question (when needed).** If auth is NOT configured, your ENTIRE response must be ONLY this question \u2014 no bullet points, no \"Next Steps\" headers, no status summaries:\n\n  > What is your UiPath **environment** (cloud/staging/alpha), **organization name**, and **tenant name**?\n\n  Then STOP and wait for the user's reply. Only after they answer, run `uip login --format json` followed by `uip login tenant set \"<TENANT>\" --format json`.\n\n## Troubleshooting\n\n| Error | Cause | Solution |\n|-------|-------|----------|\n| `401 Unauthorized` from LLM Gateway | Token expired or wrong tenant | Re-run `uip login --format json` then `uip login tenant set \"<TENANT>\" --format json` |\n| `UIPATH_URL not found` | `.env` missing or not in project root | Check `.env` exists in the working directory with `UIPATH_URL` set |\n\n## Additional Instructions\n\n- If unsure about usage, read the full authentication guide below before making assumptions.\n\n---\n\n# UiPath Authentication\n\nAuthenticate with UiPath using the UiPath Python CLI. Authentication is required to run agents and access UiPath Cloud Platform.\n\n## Authentication Modes\n\nThe UiPath CLI supports two main authentication approaches: **Interactive** (OAuth) and **Unattended** (client credentials). Additionally, you can target different UiPath environments:\n\n- **`--cloud`** \u2014 Production UiPath Cloud (default)\n- **`--staging`** \u2014 Staging environment for testing\n- **`--alpha`** \u2014 Alpha/preview features environment\n\n### \ud83d\udd13 Interactive Mode (Default - Recommended)\n\nOpens a browser for OAuth authentication.\n\n**IMPORTANT \u2014 Ask upfront, don't interrupt:**\n\nBefore running auth, ask the user for **all required info in a single question**:\n- **Environment**: cloud (default), staging, or alpha\n- **Organization**: their UiPath organization name\n- **Tenant**: their tenant name\n\nExample prompt: \"To authenticate, I need your UiPath **environment** (cloud/staging/alpha), **organization**, and **tenant name**.\"\n\nNever use `--it`/`--interactive` from Claude's Bash tool \u2014 it hangs. Use `--tenant` for a single-step login or the two-step flow below.\n\n```bash\n# One-step login (sets tenant immediately):\nuip login --tenant \"MY_TENANT\" --format json\n\n# Two-step login (explicit):\nuip login --format json\nuip login tenant set \"MY_TENANT\" --format json\n\n# Staging environment (one-step):\nuip login --authority \"https://staging.uipath.com/identity_\" --tenant \"MY_TENANT\" --format json\n\n# Alpha environment (one-step):\nuip login --authority \"https://alpha.uipath.com/identity_\" --tenant \"MY_TENANT\" --format json\n```\n\n**If the user doesn't know their tenant name**, use a two-step flow:\n\n1. Log in first, then list available tenants:\n   ```bash\n   uip login --format json\n   uip login tenant list --format json\n   ```\n\n2. Present ALL tenant names to the user and ask them to pick one.\n\n3. Set the selected tenant:\n   ```bash\n   uip login tenant set \"SELECTED_TENANT\" --format json\n   ```\n\n### \ud83d\udd10 Unattended Mode (For Automation)\n\nUses client credentials flow for automated authentication without user interaction.\n\n```bash\nuip login --client-id YOUR_CLIENT_ID \\\n                   --client-secret YOUR_CLIENT_SECRET \\\n                   --base-url YOUR_BASE_URL\n```\n\n## Prerequisites Check\n\nVerify the `uip` CLI is installed:\n\n```bash\nuip --version\n```\n\nIf missing, install with `npm install -g @uipath/cli` (requires Node.js 18+). Then ensure the Python runtime is set up:\n\n```bash\nuip codedagent setup --format json\n```\n\n> **Low-code agents:** No `pyproject.toml` or `uv sync` needed \u2014 only `uip codedagent setup` is required for the runtime.\n\n## Environment Setup\n\nFor **Automation Suite** (on-premise) deployments, set your instance URL:\n\n```bash\nexport UIPATH_URL=https://your-instance-url\n```\n\nOr add to a `.env` file in your project directory.\n\n## Additional Options\n\n- **Force Re-authentication:** Use `-f` or `--force` to get a new token: `uip login --force --format json`\n- **Change tenant without re-authenticating:** `uip login tenant set \"NEW_TENANT\" --format json` \u2014 updates the active tenant using the existing token (no browser required)\n- **Check current login status:** `uip login status`\n- **List available tenants:** `uip login tenant list --format json`\n- **Custom Scopes:** Use `--scope \"SCOPE1 SCOPE2\"` (defaults to 'OR.Execution')\n\n## Network Configuration\n\nThe CLI respects proxy settings via:\n- `HTTP_PROXY`, `HTTPS_PROXY`, `NO_PROXY` environment variables\n- `REQUESTS_CA_BUNDLE` for custom CA certificates\n\n## Troubleshooting\n\n### Browser Does Not Open\n\n**Symptom:** Running `uip login --format json` does not open a browser window.\n\n**Solutions:**\n- Ensure you have a default browser configured on your system\n- Try running the command from a standard terminal (not inside a remote SSH session or container)\n- Use unattended mode with `--client-id` and `--client-secret` as an alternative\n\n### Token Expired / \"Unauthorized\" Errors\n\n**Symptom:** Commands fail with \"Unauthorized\" or \"401\" after previously working.\n\n**Solutions:**\n- Re-run `uip login --format json` then `uip login tenant set \"YOUR_TENANT\" --format json` to refresh the token\n- Force a new token: `uip login --force --format json` then `uip login tenant set \"YOUR_TENANT\" --format json`\n- Check that `UIPATH_URL` and `UIPATH_ACCESS_TOKEN` environment variables are not stale in your `.env` file\n\n### Tenant Not Found / Mismatch\n\n**Symptom:** `uip login --tenant \"MY_TENANT\"` or `uip login tenant set \"MY_TENANT\"` fails with \"tenant not found\" or commands target the wrong tenant.\n\n**Solutions:**\n- List available tenants: `uip login --format json` then `uip login tenant list --format json`\n- Verify the tenant name is spelled exactly as shown in the list (case-sensitive)\n- Re-run using the exact name: `uip login --tenant \"<CORRECT_NAME>\" --format json`\n- Or change tenant without re-authenticating: `uip login tenant set \"<CORRECT_NAME>\" --format json`\n- Ensure your UiPath account has access to the target tenant\n\n### Client Credentials Flow Fails\n\n**Symptom:** Unattended authentication with `--client-id` / `--client-secret` returns errors.\n\n**Solutions:**\n- Verify the client ID and secret are correct and not expired\n- Check that the `--base-url` points to the correct UiPath instance\n- Ensure the external application has the required scopes configured in UiPath\n", "references/lifecycle/bindings-reference.md": "# Sync Agent Code with bindings.json\n\n> **Note:** This bindings workflow applies to coded (Python) agents. Low-code agents declare resources directly in `agent.json` \u2014 see [lowcode/resources-reference.md](../lowcode/resources-reference.md).\n\nSynchronize UiPath platform resource references in agent Python code with the `bindings.json` manifest. This ensures all overridable resources (assets, queues, connections, processes, buckets, context grounding indexes, Action Center apps, and MCP servers) are correctly declared for runtime replacement in Orchestrator.\n\n## When to Use\n\n- After adding, removing, or modifying UiPath SDK resource calls in agent code\n- Before packaging/deploying an agent with the [deployment reference](deployment.md) (`uip codedagent pack` / `uip codedagent publish`)\n- When resource override configuration in Orchestrator is missing entries or shows stale resources\n- To audit existing bindings.json for correctness\n\n## Workflow\n\n### Step 1: Locate Project Files\n\nFind the project root by looking for `pyproject.toml` or `uipath.json`. Then locate:\n\n1. **All Python source files** \u2014 Glob for `**/*.py` in the project root (exclude `.venv/`, `__pycache__/`, `.uipath/`)\n2. **Existing `bindings.json`** \u2014 Should be at the project root alongside `pyproject.toml`\n3. **`entry-points.json`** \u2014 Should be at the project root. Read it to discover available entrypoints (each has a `uniqueId` and `filePath`). This is needed for entrypoint binding in Step 4.\n\nIf `bindings.json` does not exist, create it with the empty skeleton:\n\n```json\n{\n  \"version\": \"2.0\",\n  \"resources\": []\n}\n```\n\n### Step 2: Scan Code for Resource Calls\n\nSearch all Python files for UiPath SDK resource calls that produce bindings. The eight bindable resource types are:\n\n| SDK Service | Method Pattern | Resource Type | Identifier Param |\n|------------|---------------|---------------|-----------------|\n| `.assets.retrieve` / `.retrieve_async` / `.retrieve_credential` / `.retrieve_credential_async` | `(\"name\", folder_path=\"folder\")` | `asset` | `name` (positional) |\n| `.queues.create_item` / `.create_item_async` / `.create_items` / `.create_items_async` / `.create_transaction_item` / `.create_transaction_item_async` | `item={\"Name\": \"queue_name\", ...}` or `queue_name=\"queue_name\"` | `queue` | `item[\"Name\"]` or `queue_name` |\n| `.processes.invoke` / `.invoke_async` | `(name=\"name\", ..., folder_path=\"folder\")` | `process` | `name` |\n| `.buckets.*` (all methods: `retrieve`, `upload`, `download`, `delete`, `list_files`, etc.) | `(name=\"name\", folder_path=\"folder\")` | `bucket` | `name` |\n| `.tasks.create` / `.create_async` / `.retrieve` / `.retrieve_async` | `(..., app_name=\"name\", app_folder_path=\"folder\")` | `app` | `app_name` |\n| `.context_grounding.*` (all methods: `retrieve`, `search`, `add_to_index`, `create_index`, etc.) | `(name=\"name\", folder_path=\"folder\")` | `index` | `name` or `index_name` |\n| `.connections.retrieve` / `.retrieve_async` | `(\"connection_key\")` | `connection` | `key` (positional) |\n| `.mcp.retrieve` / `.retrieve_async` | `(slug=\"slug\", folder_path=\"folder\")` | `mcpServer` | `slug` |\n\nUse Grep to find calls matching these patterns. Then read the surrounding code to extract the literal string values for resource name and folder path.\n\n**Important:** Only literal string arguments can be bound. If a value is dynamic (variable, f-string, function call), flag it to the user \u2014 it requires manual handling or refactoring.\n\n### Step 3: Compare with Existing Bindings\n\nRead the current `bindings.json` and compare:\n\n1. **Missing in bindings** \u2014 Resource calls found in code but no matching entry in bindings.json\n2. **Stale in bindings** \u2014 Entries in bindings.json with no matching resource call in code\n3. **Mismatched values** \u2014 Entries where the key, name, or folder path differs from code\n\nReport the comparison results to the user before making changes.\n\n### Step 4: Resolve Entrypoint Bindings\n\nEach resource can optionally be linked to an entrypoint from `entry-points.json`. This step determines whether to add `EntryPointUniqueId` and/or `EntryPointPath` to each resource's `value` block.\n\n**Rules:**\n- Add **only one** entrypoint field per resource \u2014 prefer `EntryPointUniqueId`. Only fall back to `EntryPointPath` if `uniqueId` is not available in the entrypoint definition.\n- The field follows the standard value format: `{ \"defaultValue\": \"...\", \"isExpression\": false, \"displayName\": \"<filePath>\" }` \u2014 `displayName` is **mandatory** and must be set to the entrypoint's `filePath` value from `entry-points.json`\n- `EntryPointUniqueId` maps to the `uniqueId` field of an entrypoint in `entry-points.json`\n- `EntryPointPath` maps to the `filePath` field of an entrypoint in `entry-points.json`\n\n**Workflow:**\n1. **Single entrypoint** \u2014 If `entry-points.json` contains exactly one entrypoint, automatically bind all resources to it. Add `EntryPointUniqueId` (preferred) or `EntryPointPath` (fallback). No need to ask the user.\n2. **Multiple entrypoints** \u2014 Use `AskUserQuestion` to ask the user which entrypoint each resource should be bound to. Present the entrypoint names/filePaths as choices. Include a **\"None\"** option \u2014 if the user chooses \"None\", omit the entrypoint field from that resource's `value`.\n3. **No `entry-points.json`** \u2014 Skip entrypoint binding entirely.\n4. **Existing entrypoint fields** \u2014 If a resource already has `EntryPointUniqueId`/`EntryPointPath`, preserve them unless the referenced entrypoint no longer exists in `entry-points.json` (flag as stale).\n\n### Step 5: Update bindings.json\n\nAfter confirming with the user, update `bindings.json`:\n\n- **Add** entries for resources found in code but missing from bindings\n- **Remove** entries that are stale (no longer referenced in code), after user confirmation\n- **Update** entries where values have drifted\n- **Add/update entrypoint fields** per Step 4 resolution\n\nFor the exact JSON structure of each resource type, consult `bindings-reference.md`. Key rules:\n\n- `version` is always `\"2.0\"`\n- Each resource entry has `resource`, `key`, `value`, and `metadata` fields\n- The `key` is `<name>.<folder_path>` for most types, just `<connection_key>` for connections\n- `ActivityName` in metadata always uses the `_async` variant name\n- Connection entries use `ConnectionId` instead of `name` and have no `folderPath`\n- The `app` resource type uses the app name as `DisplayLabel`; all others use `\"FullName\"`\n- Entrypoint fields (`EntryPointUniqueId`, `EntryPointPath`) are optional in any resource's `value` block, but when present must include a `displayName` set to the entrypoint's `filePath` from `entry-points.json`\n\n### Step 6: Verify\n\nAfter writing the updated `bindings.json`:\n\n1. Read it back and validate the JSON is well-formed\n2. Confirm each code resource call has a matching binding entry\n3. Confirm no orphaned entries remain (unless the user chose to keep them)\n4. If entrypoint binding was applied, verify `EntryPointUniqueId` values match valid `uniqueId` entries in `entry-points.json`\n\n## Reference Files\n\nFor detailed bindings.json schema, all eight resource type templates, SDK method signatures, and a complete worked example, consult:\n\n- **`bindings-reference.md`** \u2014 Full bindings.json format specification and resource type mapping\n\n## Edge Cases\n\n- **Multiple entry points (code scanning)** \u2014 Scan all Python files, not just `main.py`. LangGraph agents may define tools in separate modules.\n- **Multiple entry points (entrypoint binding)** \u2014 When `entry-points.json` has multiple entrypoints, ask the user per-resource which entrypoint it belongs to. User can choose \"None\" to skip entrypoint binding for that resource.\n- **Duplicate resources** \u2014 If the same resource (same name + folder) is called multiple times, produce only one binding entry.\n- **No folder_path** \u2014 Some asset calls omit `folder_path`. In that case, use an empty string `\"\"` for `folderPath.defaultValue` and construct the key as just `<name>.` (name followed by a dot and empty string).\n- **LangGraph ContextGroundingVectorStore** \u2014 `ContextGroundingVectorStore(index_name=\"...\", folder_path=\"...\")` creates an `index` binding with the same structure as `context_grounding.retrieve_async`.\n- **Sync vs async** \u2014 Both `retrieve()` and `retrieve_async()` produce the same binding. Always use the `_async` method name in `ActivityName`.\n- **Jobs resume** \u2014 `sdk.jobs.resume(process_name=\"...\")` creates a `process` binding (identifier param is `process_name`, not `name`).\n- **Broad override coverage** \u2014 For `bucket` and `index`, ALL SDK methods (upload, download, search, add_to_index, etc.) participate in overrides, not just `retrieve`. One binding entry per unique resource suffices.\n- **Queue name extraction** \u2014 Queue names are nested inside the `item` dict (`\"Name\"` key) or `QueueItem`/`TransactionItem` model (`name=` field), not as a top-level keyword argument. For `create_items`, the queue name is the direct `queue_name` parameter. Scan for all three patterns.\n\n## Troubleshooting\n\n| Error | Cause | Solution |\n|-------|-------|----------|\n| Invalid JSON in bindings.json | Malformed file from manual edit or merge conflict | Read the file, fix syntax errors, and re-validate |\n| Dynamic value cannot be auto-bound | Resource name or folder path is a variable, f-string, or function return | Refactor to use literal strings, or add the binding entry manually |\n| Duplicate key in resources array | Same resource scanned from multiple code paths | Deduplicate \u2014 keep one entry per unique key |\n| Missing project root | No `pyproject.toml` or `uipath.json` found | Verify the working directory is a UiPath agent project |\n| Stale entries after refactor | Old resource calls removed but bindings.json not updated | Run the full sync workflow to detect and remove orphaned entries |\n\n## Additional Instructions\n\n- Read `bindings-reference.md` before generating or modifying any binding entries \u2014 do not guess the JSON structure.\n- Confirm stale entry removal with the user before deleting \u2014 stale entries may be intentionally kept for future use.\n- When in doubt about whether a value is static or dynamic, read the surrounding code context to determine if the string literal is truly constant.\n- After updating bindings.json, always re-read it to verify well-formed JSON before reporting success.\n\n---\n\n# bindings.json Reference\n\nComplete reference for the bindings.json file format, resource type mappings, and SDK method signatures.\n\n## File Format\n\n```json\n{\n  \"version\": \"2.0\",\n  \"resources\": [\n    {\n      \"resource\": \"<resource_type>\",\n      \"key\": \"<unique_key>\",\n      \"value\": { ... },\n      \"metadata\": { ... }\n    }\n  ]\n}\n```\n\n- `version` is always `\"2.0\"`.\n- `resources` is an array of resource binding entries. An empty array (`[]`) is valid when the agent uses no overridable resources.\n\n---\n\n## Resource Types\n\nEight resource types are supported. Each maps to a specific UiPath SDK service and method.\n\n### Asset\n\n**SDK call:**\n```python\nasset = await sdk.assets.retrieve_async(\"asset_name\", folder_path=\"folder_key\")\ncredential = await sdk.assets.retrieve_credential_async(\"cred_name\", folder_path=\"folder_key\")\n# or synchronous:\nasset = sdk.assets.retrieve(\"asset_name\", folder_path=\"folder_key\")\ncredential = sdk.assets.retrieve_credential(\"cred_name\", folder_path=\"folder_key\")\n```\n\n**Binding entry:**\n```json\n{\n  \"resource\": \"asset\",\n  \"key\": \"<name>.<folder_path>\",\n  \"value\": {\n    \"name\": {\n      \"defaultValue\": \"<name>\",\n      \"isExpression\": false,\n      \"displayName\": \"Name\"\n    },\n    \"folderPath\": {\n      \"defaultValue\": \"<folder_path>\",\n      \"isExpression\": false,\n      \"displayName\": \"Folder Path\"\n    }\n  },\n  \"metadata\": {\n    \"ActivityName\": \"retrieve_async\",\n    \"BindingsVersion\": \"2.2\",\n    \"DisplayLabel\": \"FullName\"\n  }\n}\n```\n\n**Key construction:** `<name>.<folder_path>` \u2014 the first positional argument joined with the `folder_path` keyword argument by a dot.\n\n**Parameter extraction:**\n- `name` \u2014 first positional argument to `retrieve_async()` / `retrieve()`\n- `folder_path` \u2014 keyword argument `folder_path=`\n\n---\n\n### Queue\n\n**SDK call:**\n```python\n# create_item / create_item_async \u2014 queue name is inside the QueueItem dict\nsdk.queues.create_item(item={\"Name\": \"queue_name\", \"SpecificContent\": {...}})\nawait sdk.queues.create_item_async(item=QueueItem(name=\"queue_name\", specific_content={...}))\n\n# create_items / create_items_async \u2014 queue name is a direct parameter\nsdk.queues.create_items(queue_name=\"queue_name\", items=[...], commit_type=CommitType.ALL_OR_NOTHING)\n\n# create_transaction_item / create_transaction_item_async \u2014 queue name is inside the TransactionItem dict\nsdk.queues.create_transaction_item(item={\"Name\": \"queue_name\", \"SpecificContent\": {...}})\n```\n\n**Binding entry:**\n```json\n{\n  \"resource\": \"queue\",\n  \"key\": \"<queue_name>.<folder_path>\",\n  \"value\": {\n    \"name\": {\n      \"defaultValue\": \"<queue_name>\",\n      \"isExpression\": false,\n      \"displayName\": \"Name\"\n    },\n    \"folderPath\": {\n      \"defaultValue\": \"<folder_path>\",\n      \"isExpression\": false,\n      \"displayName\": \"Folder Path\"\n    }\n  },\n  \"metadata\": {\n    \"ActivityName\": \"create_item_async\",\n    \"BindingsVersion\": \"2.2\",\n    \"DisplayLabel\": \"FullName\"\n  }\n}\n```\n\n**Key construction:** `<queue_name>.<folder_path>`\n\n**Parameter extraction:**\n- `queue_name` \u2014 extracted from `QueueItem.name` (alias `\"Name\"`) inside the `item` dict, or from the `queue_name` keyword argument in `create_items()`\n- `folder_path` \u2014 inherited from `FolderContext` (set via `sdk.queues` folder configuration or the agent's default folder)\n\n**Note:** The queue name is embedded inside the `item` parameter (a dict or `QueueItem`/`TransactionItem` model), not as a top-level keyword argument like other services. When scanning code, look for the `\"Name\"` key in the dict literal or `name=` in `QueueItem()`/`TransactionItem()` constructors.\n\n---\n\n### Process\n\n**SDK call:**\n```python\nresult = await sdk.processes.invoke_async(name=\"process_name\", input_arguments={...}, folder_path=\"folder_path\")\n# or synchronous:\nresult = sdk.processes.invoke(name=\"process_name\", input_arguments={...}, folder_path=\"folder_path\")\n```\n\n**Binding entry:**\n```json\n{\n  \"resource\": \"process\",\n  \"key\": \"<name>.<folder_path>\",\n  \"value\": {\n    \"name\": {\n      \"defaultValue\": \"<name>\",\n      \"isExpression\": false,\n      \"displayName\": \"Name\"\n    },\n    \"folderPath\": {\n      \"defaultValue\": \"<folder_path>\",\n      \"isExpression\": false,\n      \"displayName\": \"Folder Path\"\n    }\n  },\n  \"metadata\": {\n    \"ActivityName\": \"invoke_async\",\n    \"BindingsVersion\": \"2.2\",\n    \"DisplayLabel\": \"FullName\"\n  }\n}\n```\n\n**Key construction:** `<name>.<folder_path>`\n\n**Parameter extraction:**\n- `name` \u2014 keyword argument `name=`\n- `folder_path` \u2014 keyword argument `folder_path=`\n\n**ActivityName:** Always use `invoke_async` in metadata, regardless of whether the code uses the sync or async variant.\n\n---\n\n### Bucket\n\n**SDK call:**\n```python\nbucket = await sdk.buckets.retrieve_async(name=\"bucket_name\", folder_path=\"folder_path\")\n# or synchronous:\nbucket = sdk.buckets.retrieve(name=\"bucket_name\", folder_path=\"folder_path\")\n```\n\n**Binding entry:**\n```json\n{\n  \"resource\": \"bucket\",\n  \"key\": \"<name>.<folder_path>\",\n  \"value\": {\n    \"name\": {\n      \"defaultValue\": \"<name>\",\n      \"isExpression\": false,\n      \"displayName\": \"Name\"\n    },\n    \"folderPath\": {\n      \"defaultValue\": \"<folder_path>\",\n      \"isExpression\": false,\n      \"displayName\": \"Folder Path\"\n    }\n  },\n  \"metadata\": {\n    \"ActivityName\": \"retrieve_async\",\n    \"BindingsVersion\": \"2.2\",\n    \"DisplayLabel\": \"FullName\"\n  }\n}\n```\n\n**Key construction:** `<name>.<folder_path>`\n\n**Parameter extraction:**\n- `name` \u2014 keyword argument `name=`\n- `folder_path` \u2014 keyword argument `folder_path=`\n\n---\n\n### App (Action Center Tasks / Escalations)\n\n**SDK call:**\n```python\ntask = await sdk.tasks.create_async(title=\"...\", data={...}, app_name=\"app_name\", app_folder_path=\"app_folder_path\")\n# or synchronous:\ntask = sdk.tasks.create(title=\"...\", data={...}, app_name=\"app_name\", app_folder_path=\"app_folder_path\")\n```\n\n**Binding entry:**\n```json\n{\n  \"resource\": \"app\",\n  \"key\": \"<app_name>.<app_folder_path>\",\n  \"value\": {\n    \"name\": {\n      \"defaultValue\": \"<app_name>\",\n      \"isExpression\": false,\n      \"displayName\": \"App Name\"\n    },\n    \"folderPath\": {\n      \"defaultValue\": \"<app_folder_path>\",\n      \"isExpression\": false,\n      \"displayName\": \"App Folder Path\"\n    }\n  },\n  \"metadata\": {\n    \"ActivityName\": \"create_async\",\n    \"BindingsVersion\": \"2.2\",\n    \"DisplayLabel\": \"<app_name>\"\n  }\n}\n```\n\n**Key construction:** `<app_name>.<app_folder_path>`\n\n**Parameter extraction:**\n- `app_name` \u2014 keyword argument `app_name=`\n- `app_folder_path` \u2014 keyword argument `app_folder_path=`\n\n**Note:** The `DisplayLabel` in metadata uses the literal app name value, not `\"FullName\"`. Both Action Center tasks and escalations use this resource type \u2014 `CreateEscalation` extends `CreateTask` with the same `app_name`/`app_folder_path` fields.\n\n---\n\n### Index (Context Grounding)\n\n**SDK call:**\n```python\nindex = await sdk.context_grounding.retrieve_async(name=\"index_name\", folder_path=\"folder_path\")\n# also search:\nresults = await sdk.context_grounding.search_async(name=\"index_name\", query=\"...\", folder_path=\"folder_path\")\n# synchronous variants:\nindex = sdk.context_grounding.retrieve(name=\"index_name\", folder_path=\"folder_path\")\nresults = sdk.context_grounding.search(name=\"index_name\", query=\"...\", folder_path=\"folder_path\")\n```\n\n**Binding entry:**\n```json\n{\n  \"resource\": \"index\",\n  \"key\": \"<name>.<folder_path>\",\n  \"value\": {\n    \"name\": {\n      \"defaultValue\": \"<name>\",\n      \"isExpression\": false,\n      \"displayName\": \"Name\"\n    },\n    \"folderPath\": {\n      \"defaultValue\": \"<folder_path>\",\n      \"isExpression\": false,\n      \"displayName\": \"Folder Path\"\n    }\n  },\n  \"metadata\": {\n    \"ActivityName\": \"retrieve_async\",\n    \"BindingsVersion\": \"2.2\",\n    \"DisplayLabel\": \"FullName\"\n  }\n}\n```\n\n**Key construction:** `<name>.<folder_path>`\n\n**Parameter extraction:**\n- `name` \u2014 keyword argument `name=`\n- `folder_path` \u2014 keyword argument `folder_path=`\n\n---\n\n### Connection (Integration Service)\n\n**SDK call:**\n```python\nconnection = await sdk.connections.retrieve_async(\"connection_key\")\n# or synchronous:\nconnection = sdk.connections.retrieve(\"connection_key\")\n```\n\n**Binding entry:**\n```json\n{\n  \"resource\": \"connection\",\n  \"key\": \"<connection_key>\",\n  \"value\": {\n    \"ConnectionId\": {\n      \"defaultValue\": \"<connection_key>\",\n      \"isExpression\": false,\n      \"displayName\": \"Connection\"\n    }\n  },\n  \"metadata\": {\n    \"BindingsVersion\": \"2.2\",\n    \"Connector\": \"\",\n    \"UseConnectionService\": \"True\"\n  }\n}\n```\n\n**Key construction:** Just `<connection_key>` (no folder path, no dot).\n\n**Parameter extraction:**\n- `connection_key` \u2014 first positional argument to `retrieve_async()` / `retrieve()`\n\n**Differences from other resource types:**\n- No `folderPath` in `value`\n- Uses `ConnectionId` instead of `name` in `value`\n- No `ActivityName` in metadata\n- Has `Connector` (empty string default) and `UseConnectionService` (`\"True\"`) in metadata\n\n---\n\n### MCP Server\n\n**SDK call:**\n```python\nserver = await sdk.mcp.
