time ignores it)\n\u251c\u2500\u2500 .env                    \u2190 Authentication tokens (never commit to source control)\n\u251c\u2500\u2500 .agent-builder/         \u2190 Execution contract (auto-managed, do not edit)\n\u251c\u2500\u2500 resources/              \u2190 Individual resource definition files (Studio Web only)\n\u2514\u2500\u2500 evaluations/            \u2190 Evaluation datasets and custom evaluators\n    \u251c\u2500\u2500 eval-sets/\n    \u2514\u2500\u2500 evaluators/\n```\n\n### File Descriptions\n\n| File / Directory | Purpose |\n|---|---|\n| `agent.json` | The complete agent definition: model, prompts, input/output schemas, resources, features. This is the primary file to edit. |\n| `entry-points.json` | I/O schema contract consumed by Orchestrator and Studio Web. Generated by `uip codedagent init` or Studio Web. |\n| `bindings.json` | Maps logical resource names to actual Orchestrator folder paths and process names. Used for environment-specific overrides. |\n| `project.uiproj` | Project type metadata (`ProjectType: \"Agent\"`). Generated by `uip codedagent pull` (from Studio Web) or by `uip codedagent init` when creating from scratch. |\n| `flow-layout.json` | Visual node positions from the Studio Web canvas. Ignored by the runtime. |\n| `.agent-builder/` | Copies of `agent.json`, `bindings.json`, `entry-points.json` used by the execution runtime. Auto-populated \u2014 do not edit directly. |\n| `resources/` | Individual resource JSON files generated by Studio Web. The runtime reads resources from `agent.json`, not from this directory. |\n| `.env` | Stores `UIPATH_URL`, `UIPATH_ACCESS_TOKEN`, and other secrets. Never commit this file. |\n| `evaluations/eval-sets/` | Evaluation input/expected-output pairs for `uip codedagent eval`. |\n| `evaluations/evaluators/` | Evaluator configuration files (LLM judge, exact match, etc.). |\n\n---\n\n## Authentication\n\nCreate a `.env` file in the project root with the following variables:\n\n```dotenv\nUIPATH_URL=https://cloud.uipath.com/{org}/{tenant}\nUIPATH_ACCESS_TOKEN=<your-personal-access-token>\nUIPATH_FOLDER_PATH=<your-orchestrator-folder>\n```\n\nYou can generate a Personal Access Token in **UiPath Automation Cloud \u2192 Preferences \u2192 Privacy and Security**.\n\n---\n\n## Running the Agent Locally\n\nOnce `agent.json` is in place and `.env` is configured:\n\n```bash\n# First-time runtime setup (only needed once)\nuip codedagent setup --format json\n\n# Generate entry-points.json (optional for local run, required before push/deploy)\nuip codedagent init\n\n# Run the agent with a test input\nuip codedagent run agent.json '{\"task\": \"Summarise the quarterly report.\"}'\n```\n\n---\n\n## Publishing to Automation Cloud\n\nBefore deploying for the first time, register the agent in Studio Web and link your local project to it:\n\n1. Open Studio Web at `https://cloud.uipath.com/{orgName}/studio_/projects` and create a new **Agent** project.\n2. Copy the project ID from the URL or project settings.\n3. Add `UIPATH_PROJECT_ID=<project-id>` to your `.env` file.\n4. Push the local files to Studio Web:\n   ```bash\n   uip codedagent push\n   ```\n5. Then deploy to Orchestrator:\n   ```bash\n   uip codedagent deploy --my-workspace\n   ```\n\nThis packages and uploads the agent to your personal workspace, making it available in Studio Web and for API invocation.\n\n---\n\n## Next Steps\n\n- **Add tools and context:** See [resources-reference.md](./resources-reference.md) for all resource types.\n- **Full schema reference:** See [agent-json-reference.md](./agent-json-reference.md) for every field.\n- **Starter template:** Copy [../../assets/templates/agent.json](../../assets/templates/agent.json) as a project starting point.\n"};

var LINKS=primaryTargets.map(function(t){return{source:"SKILL.md",target:t,type:"primary"};}).concat(crossRefs.map(function(c){return{source:c[0],target:c[1],type:"cross"};}));

var GROUPS=[{key:"root",lbl:"Root"},{key:"templates",lbl:"Templates"},{key:"lifecycle",lbl:"Lifecycle"},{key:"evaluations",lbl:"Evaluations"},{key:"frameworks",lbl:"Frameworks"},{key:"capabilities",lbl:"Capabilities"},{key:"lowcode",lbl:"Low-code refs"}];
var sidebar=document.getElementById("sidebar");
sidebar.innerHTML="<h2>Files</h2>";
GROUPS.forEach(function(gr){
  var ns=NODES.filter(function(n){return n.g===gr.key;});
  var div=document.createElement("div");
  div.innerHTML="<div class='tree-group-header'><div class='dot' style='background:"+GC[gr.key]+"'></div>"+gr.lbl+" <span style='margin-left:auto;font-size:9px;opacity:.5'>"+ns.length+"</span></div>";
  ns.forEach(function(n){
    var el=document.createElement("div");el.className="tree-item";el.dataset.id=n.id;
    var pc=n.a==="both"?"pill-both":n.a==="coded"?"pill-coded":"pill-lowcode";
    var pl=n.a==="both"?"B":n.a==="coded"?"C":"L";
    el.innerHTML="<span style='flex:1;overflow:hidden;text-overflow:ellipsis'>"+n.l+"</span><span class='agent-pill "+pc+"'>"+pl+"</span>";
    el.onmouseenter=function(){hlNode(n.id);};el.onmouseleave=resetHL;
    el.onclick=function(){setActive(n.id);openViewer(n);};
    div.appendChild(el);
  });
  sidebar.appendChild(div);
});

var wrap=document.getElementById("graph-wrap");
var svgSel=d3.select("#graph");
var zoomBehavior=d3.zoom().scaleExtent([.2,4]).on("zoom",function(e){g.attr("transform",e.transform);});
svgSel.call(zoomBehavior);
var g=svgSel.append("g");
var defs=svgSel.append("defs");
["primary","cross"].forEach(function(t){defs.append("marker").attr("id","arr-"+t).attr("viewBox","0 -4 8 8").attr("refX",20).attr("refY",0).attr("markerWidth",5).attr("markerHeight",5).attr("orient","auto").append("path").attr("d","M0,-4L8,0L0,4").attr("fill",t==="primary"?"#f7816660":"#8b949e40");});

var GX={root:{x:0,y:0},templates:{x:360,y:-220},capabilities:{x:380,y:60},frameworks:{x:200,y:290},lifecycle:{x:-310,y:190},evaluations:{x:-140,y:360},lowcode:{x:-380,y:-190}};

var sim=d3.forceSimulation(NODES)
  .force("link",d3.forceLink(LINKS).id(function(d){return d.id;}).distance(function(d){return d.type==="primary"?135:85;}).strength(function(d){return d.type==="primary"?.32:.16;}))
  .force("charge",d3.forceManyBody().strength(-300))
  .force("center",d3.forceCenter(0,0))
  .force("gx",d3.forceX(function(d){return(GX[d.g]||{x:0}).x;}).strength(.2))
  .force("gy",d3.forceY(function(d){return(GX[d.g]||{y:0}).y;}).strength(.2))
  .force("coll",d3.forceCollide(function(d){return d.g==="root"?40:34;}));

var link=g.append("g").selectAll("line").data(LINKS).join("line").attr("stroke",function(d){return d.type==="primary"?"#f7816660":"#8b949e38";}).attr("stroke-width",function(d){return d.type==="primary"?1.5:1;}).attr("stroke-dasharray",function(d){return d.type==="cross"?"4 3":null;}).attr("marker-end",function(d){return"url(#arr-"+d.type+")";});

var nodeG=g.append("g").selectAll("g").data(NODES).join("g").style("cursor","pointer").call(d3.drag().on("start",function(e,d){if(!e.active)sim.alphaTarget(.3).restart();d.fx=d.x;d.fy=d.y;}).on("drag",function(e,d){d.fx=e.x;d.fy=e.y;}).on("end",function(e,d){if(!e.active)sim.alphaTarget(0);d.fx=null;d.fy=null;}));

nodeG.append("circle").attr("r",function(d){return d.g==="root"?23:16;}).attr("fill","none").attr("stroke",function(d){return RC[d.a];}).attr("stroke-width",2).attr("opacity",.75).attr("class","ring");
nodeG.append("circle").attr("r",function(d){return d.g==="root"?21:14;}).attr("fill",function(d){return GC[d.g];}).attr("fill-opacity",.88).attr("stroke",function(d){return d3.color(GC[d.g]).darker(.5);}).attr("stroke-width",1.5).attr("class","body");
nodeG.append("text").attr("dy",function(d){return d.g==="root"?36:26;}).attr("text-anchor","middle").attr("font-size",function(d){return d.g==="root"?"11.5px":"10px";}).attr("font-weight",function(d){return d.g==="root"?"700":"400";}).attr("fill",function(d){return d.g==="root"?"#fff":"#c9d1d9";}).attr("pointer-events","none").text(function(d){return d.l;});

var tip=document.getElementById("tooltip");
var PILL={both:"<span class='agent-pill pill-both' style='font-size:9px;padding:1px 5px'>Both</span>",coded:"<span class='agent-pill pill-coded' style='font-size:9px;padding:1px 5px'>Coded</span>",lowcode:"<span class='agent-pill pill-lowcode' style='font-size:9px;padding:1px 5px'>Low-code</span>"};
nodeG.on("mouseenter",function(e,d){tip.innerHTML="<div class='tt-name'>"+d.l+"</div><div class='tt-path'>"+d.id+"</div><div class='tt-desc'>"+d.d+"</div><div class='tt-type'>"+PILL[d.a]+"</div>";tip.style.opacity="1";hlNode(d.id);var si=document.querySelector(".tree-item[data-id='"+d.id+"']");if(si)si.scrollIntoView({block:"nearest"});}).on("mousemove",function(e){var r=wrap.getBoundingClientRect();tip.style.left=(e.clientX-r.left+14)+"px";tip.style.top=(e.clientY-r.top-10)+"px";}).on("mouseleave",function(){tip.style.opacity="0";resetHL();}).on("click",function(e,d){e.stopPropagation();setActive(d.id);openViewer(d);});

sim.on("tick",function(){link.attr("x1",function(d){return d.source.x;}).attr("y1",function(d){return d.source.y;}).attr("x2",function(d){return d.target.x;}).attr("y2",function(d){return d.target.y;});nodeG.attr("transform",function(d){return"translate("+d.x+","+d.y+")";});});

function centerView(){var w=wrap.clientWidth,h=wrap.clientHeight;svgSel.call(zoomBehavior.transform,d3.zoomIdentity.translate(w/2,h/2));}
sim.on("end",centerView);setTimeout(centerView,200);

function getNeighbors(id){var s=new Set([id]);LINKS.forEach(function(l){var si=typeof l.source==="object"?l.source.id:l.source,ti=typeof l.target==="object"?l.target.id:l.target;if(si===id)s.add(ti);if(ti===id)s.add(si);});return s;}
function hlNode(id){var nb=getNeighbors(id);nodeG.select(".body").attr("fill-opacity",function(d){return nb.has(d.id)?1:.1;});nodeG.select(".ring").attr("opacity",function(d){return nb.has(d.id)?.9:.08;});nodeG.selectAll("text").attr("opacity",function(d){return nb.has(d.id)?1:.1;});link.attr("opacity",function(l){var si=typeof l.source==="object"?l.source.id:l.source,ti=typeof l.target==="object"?l.target.id:l.target;return(si===id||ti===id)?1:.03;});}
function resetHL(){nodeG.select(".body").attr("fill-opacity",.88);nodeG.select(".ring").attr("opacity",.75);nodeG.selectAll("text").attr("opacity",1);link.attr("opacity",1);}
function setActive(id){document.querySelectorAll(".tree-item").forEach(function(el){el.classList.remove("active");});var si=document.querySelector(".tree-item[data-id='"+id+"']");if(si){si.classList.add("active");si.scrollIntoView({block:"nearest"});}}

var viewer=document.getElementById("viewer"),vTitle=document.getElementById("viewer-title"),vPath=document.getElementById("viewer-path"),vBody=document.getElementById("viewer-body"),viewerOpen=false;
marked.setOptions({gfm:true,breaks:false});
marked.use({renderer:(function(){var r=new marked.Renderer();r.code=function(code,lang){var hl=lang&&hljs.getLanguage(lang)?hljs.highlight(code,{language:lang}).value:hljs.highlightAuto(code).value;return"<pre><code class='hljs'>"+hl+"<"+"/code><"+"/pre>";};return r;})()});
function openViewer(n){var content=FILE_DATA[n.id]||"File content not available.";vTitle.textContent=n.l;vPath.textContent=n.id;vBody.innerHTML=marked.parse(content);vBody.scrollTop=0;if(!viewerOpen){viewer.classList.add("open");wrap.classList.add("shrunk");document.getElementById("click-hint").style.opacity="0";viewerOpen=true;}}
function closeViewer(){viewer.classList.remove("open");wrap.classList.remove("shrunk");document.getElementById("click-hint").style.opacity="1";viewerOpen=false;document.querySelectorAll(".tree-item").forEach(function(el){el.classList.remove("active");});}
document.getElementById("viewer-close").onclick=closeViewer;
document.addEventListener("keydown",function(e){if(e.key==="Escape"&&viewerOpen)closeViewer();});
document.getElementById("cb-primary").onchange=function(e){link.filter(function(d){return d.type==="primary";}).attr("display",e.target.checked?null:"none");};
document.getElementById("cb-cross").onchange=function(e){link.filter(function(d){return d.type==="cross";}).attr("display",e.target.checked?null:"none");};
document.getElementById("charge").oninput=function(e){sim.force("charge",d3.forceManyBody().strength(+e.target.value));sim.alpha(.35).restart();};
window.onresize=function(){if(!viewerOpen)centerView();};

</script>
