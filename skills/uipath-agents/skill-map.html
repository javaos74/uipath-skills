retrieve_async(slug=\"mcp_server_slug\", folder_path=\"folder_path\")\n# or synchronous:\nserver = sdk.mcp.retrieve(slug=\"mcp_server_slug\", folder_path=\"folder_path\")\n```\n\n**Binding entry:**\n```json\n{\n  \"resource\": \"mcpServer\",\n  \"key\": \"<slug>.<folder_path>\",\n  \"value\": {\n    \"name\": {\n      \"defaultValue\": \"<slug>\",\n      \"isExpression\": false,\n      \"displayName\": \"Name\"\n    },\n    \"folderPath\": {\n      \"defaultValue\": \"<folder_path>\",\n      \"isExpression\": false,\n      \"displayName\": \"Folder Path\"\n    }\n  },\n  \"metadata\": {\n    \"ActivityName\": \"retrieve_async\",\n    \"BindingsVersion\": \"2.2\",\n    \"DisplayLabel\": \"FullName\"\n  }\n}\n```\n\n**Key construction:** `<slug>.<folder_path>`\n\n**Parameter extraction:**\n- `slug` \u2014 keyword argument `slug=` to `retrieve_async()` / `retrieve()`\n- `folder_path` \u2014 keyword argument `folder_path=`\n\n**Note:** The resource identifier for MCP servers is `slug`, not `name`. The `value.name.defaultValue` in the binding still stores the slug value.\n\n---\n\n## Entrypoint Binding\n\nAny resource in `bindings.json` can optionally be linked to an entrypoint defined in `entry-points.json`. This is done by adding `EntryPointUniqueId` and/or `EntryPointPath` to the resource's `value` block.\n\n### entry-points.json Structure\n\n```json\n{\n  \"$schema\": \"https://cloud.uipath.com/draft/2024-12/entry-point\",\n  \"$id\": \"entry-points.json\",\n  \"entryPoints\": [\n    {\n      \"filePath\": \"agent\",\n      \"uniqueId\": \"708b62c7-15f1-46d8-9564-5d03c6a8668f\",\n      \"type\": \"agent\",\n      \"input\": { ... },\n      \"output\": { ... }\n    }\n  ]\n}\n```\n\nKey fields for binding:\n- `uniqueId` \u2014 UUID that maps to `EntryPointUniqueId` in the binding\n- `filePath` \u2014 path string that maps to `EntryPointPath` in the binding\n\n### Entrypoint Fields in Resource Value\n\n**Preferred \u2014 using `EntryPointUniqueId`** (when `uniqueId` is available in entry-points.json):\n```json\n{\n  \"resource\": \"asset\",\n  \"key\": \"my_asset.Finance\",\n  \"value\": {\n    \"name\": { \"defaultValue\": \"my_asset\", \"isExpression\": false, \"displayName\": \"Name\" },\n    \"folderPath\": { \"defaultValue\": \"Finance\", \"isExpression\": false, \"displayName\": \"Folder Path\" },\n    \"EntryPointUniqueId\": {\n      \"defaultValue\": \"708b62c7-15f1-46d8-9564-5d03c6a8668f\",\n      \"isExpression\": false,\n      \"displayName\": \"agent\"\n    }\n  },\n  \"metadata\": { \"ActivityName\": \"retrieve_async\", \"BindingsVersion\": \"2.2\", \"DisplayLabel\": \"FullName\" }\n}\n```\n\n**Fallback \u2014 using `EntryPointPath`** (only when `uniqueId` is not available):\n```json\n{\n  \"resource\": \"asset\",\n  \"key\": \"my_asset.Finance\",\n  \"value\": {\n    \"name\": { \"defaultValue\": \"my_asset\", \"isExpression\": false, \"displayName\": \"Name\" },\n    \"folderPath\": { \"defaultValue\": \"Finance\", \"isExpression\": false, \"displayName\": \"Folder Path\" },\n    \"EntryPointPath\": {\n      \"defaultValue\": \"agent\",\n      \"isExpression\": false,\n      \"displayName\": \"agent\"\n    }\n  },\n  \"metadata\": { \"ActivityName\": \"retrieve_async\", \"BindingsVersion\": \"2.2\", \"DisplayLabel\": \"FullName\" }\n}\n```\n\n### Rules\n\n- **Add only one field per resource** \u2014 prefer `EntryPointUniqueId`. Only use `EntryPointPath` as a fallback if the entrypoint has no `uniqueId`.\n- The field uses the standard value format: `{ \"defaultValue\": \"...\", \"isExpression\": false, \"displayName\": \"<filePath>\" }` \u2014 `displayName` is **mandatory** and must be set to the entrypoint's `filePath` value from `entry-points.json`.\n- **The field is optional.** If a resource is not bound to any entrypoint, omit it entirely.\n- The field goes inside the `value` object alongside `name`, `folderPath`, `ConnectionId`, etc.\n- For connections, `EntryPointUniqueId`/`EntryPointPath` sits alongside `ConnectionId` in the `value` block.\n\n### When to Add Entrypoint Fields\n\n- **Single entrypoint** in `entry-points.json` \u2014 auto-bind all resources. Add `EntryPointUniqueId` (preferred) or `EntryPointPath` (fallback).\n- **Multiple entrypoints** \u2014 ask the user per resource. If the user chooses \"None\", omit the field.\n- **No `entry-points.json`** \u2014 skip entrypoint binding entirely.\n\n---\n\n## SDK Method to Resource Type Mapping\n\n| SDK Property | Methods | Resource Type | Resource Identifier Param | ActivityName |\n|-------------|---------|---------------|--------------------------|-------------|\n| `sdk.assets` | `retrieve`, `retrieve_async`, `retrieve_credential`, `retrieve_credential_async` | `asset` | `name` (1st positional) | `retrieve_async` |\n| `sdk.queues` | `create_item`, `create_item_async`, `create_items`, `create_items_async`, `create_transaction_item`, `create_transaction_item_async` | `queue` | `item[\"Name\"]` or `queue_name` | `create_item_async` |\n| `sdk.processes` | `invoke`, `invoke_async` | `process` | `name` | `invoke_async` |\n| `sdk.jobs` | `resume`, `resume_async` | `process` | `process_name` | `invoke_async` |\n| `sdk.buckets` | ALL methods (`retrieve`, `upload`, `download`, `delete`, `list_files`, etc.) | `bucket` | `name` | `retrieve_async` |\n| `sdk.tasks` | `create`, `create_async`, `retrieve`, `retrieve_async` | `app` | `app_name` | `create_async` |\n| `sdk.context_grounding` | ALL methods (`retrieve`, `search`, `add_to_index`, `create_index`, `delete`, `ingest_data`, etc.) | `index` | `name` or `index_name` | `retrieve_async` |\n| `sdk.connections` | `retrieve`, `retrieve_async` | `connection` | `key` (1st positional) | *(none)* |\n| `sdk.mcp` | `retrieve`, `retrieve_async` | `mcpServer` | `slug` | `retrieve_async` |\n\n**Note on ActivityName:** Always use the `_async` variant in the `ActivityName` metadata field, regardless of whether the code uses the sync or async version.\n\n**Note on broad override coverage:** For `bucket` and `index` (context_grounding), ALL SDK methods have the `@resource_override` decorator \u2014 not just `retrieve`. This means `upload`, `download`, `search`, `add_to_index`, etc. all participate in resource overrides. However, a single binding entry per unique resource (name + folder) is sufficient regardless of how many methods are called on that resource.\n\n---\n\n## SDK Variable Name Patterns\n\nThe UiPath SDK instance may be stored in different variable names. Common patterns:\n\n```python\n# Direct instantiation\nuipath = UiPath()\nsdk = UiPath()\nclient = UiPath()\n\n# Attribute access in LangGraph / tools\nself.sdk = UiPath()\n```\n\nWhen scanning code, search for all calls to the relevant service methods (`.assets.retrieve`, `.processes.invoke`, etc.) regardless of the variable name preceding them.\n\n---\n\n## Methods That Do NOT Create Bindings\n\nNot every SDK service supports resource overrides. The following services have NO `@resource_override` decorator and do NOT produce bindings:\n\n- `sdk.llm.*` / `sdk.llm_openai.*` \u2014 no bindings support\n- `sdk.documents.*` \u2014 no bindings support (uses `bucket` bindings for storage via `storage_bucket_name`)\n- `sdk.entities.*` \u2014 no bindings support\n- `sdk.guardrails.*` \u2014 no bindings support\n- `sdk.attachments.*` \u2014 no bindings support\n- `sdk.agenthub.*` \u2014 no bindings support\n- `sdk.folders.*` \u2014 no bindings support\n- `sdk.resource_catalog.*` \u2014 no bindings support\n\n**Note on assets:** `sdk.assets.update()` does NOT have `@resource_override` \u2014 only `retrieve` and `retrieve_credential` do.\n\n---\n\n## Dynamic Values\n\nIf the resource name or folder path is constructed dynamically at runtime (e.g., from a variable, f-string, or function return), it cannot be statically bound. Flag these to the user as requiring manual bindings.json entries or refactoring to use literal string values.\n\nExample of a dynamic value that cannot be auto-bound:\n```python\nasset_name = get_config(\"asset_name\")\nasset = await sdk.assets.retrieve_async(asset_name, folder_path=folder)\n```\n\n---\n\n## Complete Example\n\nGiven this agent code and a single entrypoint in `entry-points.json`:\n\n**entry-points.json:**\n```json\n{\n  \"$schema\": \"https://cloud.uipath.com/draft/2024-12/entry-point\",\n  \"$id\": \"entry-points.json\",\n  \"entryPoints\": [\n    {\n      \"filePath\": \"agent\",\n      \"uniqueId\": \"708b62c7-15f1-46d8-9564-5d03c6a8668f\",\n      \"type\": \"agent\",\n      \"input\": { ... },\n      \"output\": { ... }\n    }\n  ]\n}\n```\n\n**Agent code:**\n```python\nasync def main() -> Response:\n    uipath = UiPath()\n\n    asset = await uipath.assets.retrieve_async(\"my_asset\", folder_path=\"Finance\")\n    conn = await uipath.connections.retrieve_async(\"salesforce_conn\")\n    result = await uipath.processes.invoke_async(\n        name=\"InvoiceProcessor\", input_arguments={\"id\": \"123\"}, folder_path=\"Finance/Invoices\"\n    )\n    server = await uipath.mcp.retrieve_async(slug=\"my-mcp-server\", folder_path=\"Shared\")\n\n    return Response(...)\n```\n\n**The corresponding bindings.json** (with entrypoint binding \u2014 single entrypoint with `uniqueId`, so `EntryPointUniqueId` is used):\n\n```json\n{\n  \"version\": \"2.0\",\n  \"resources\": [\n    {\n      \"resource\": \"asset\",\n      \"key\": \"my_asset.Finance\",\n      \"value\": {\n        \"name\": { \"defaultValue\": \"my_asset\", \"isExpression\": false, \"displayName\": \"Name\" },\n        \"folderPath\": { \"defaultValue\": \"Finance\", \"isExpression\": false, \"displayName\": \"Folder Path\" },\n        \"EntryPointUniqueId\": { \"defaultValue\": \"708b62c7-15f1-46d8-9564-5d03c6a8668f\", \"isExpression\": false, \"displayName\": \"agent\" }\n      },\n      \"metadata\": { \"ActivityName\": \"retrieve_async\", \"BindingsVersion\": \"2.2\", \"DisplayLabel\": \"FullName\" }\n    },\n    {\n      \"resource\": \"connection\",\n      \"key\": \"salesforce_conn\",\n      \"value\": {\n        \"ConnectionId\": { \"defaultValue\": \"salesforce_conn\", \"isExpression\": false, \"displayName\": \"Connection\" },\n        \"EntryPointUniqueId\": { \"defaultValue\": \"708b62c7-15f1-46d8-9564-5d03c6a8668f\", \"isExpression\": false, \"displayName\": \"agent\" }\n      },\n      \"metadata\": { \"BindingsVersion\": \"2.2\", \"Connector\": \"\", \"UseConnectionService\": \"True\" }\n    },\n    {\n      \"resource\": \"process\",\n      \"key\": \"InvoiceProcessor.Finance/Invoices\",\n      \"value\": {\n        \"name\": { \"defaultValue\": \"InvoiceProcessor\", \"isExpression\": false, \"displayName\": \"Name\" },\n        \"folderPath\": { \"defaultValue\": \"Finance/Invoices\", \"isExpression\": false, \"displayName\": \"Folder Path\" },\n        \"EntryPointUniqueId\": { \"defaultValue\": \"708b62c7-15f1-46d8-9564-5d03c6a8668f\", \"isExpression\": false, \"displayName\": \"agent\" }\n      },\n      \"metadata\": { \"ActivityName\": \"invoke_async\", \"BindingsVersion\": \"2.2\", \"DisplayLabel\": \"FullName\" }\n    },\n    {\n      \"resource\": \"mcpServer\",\n      \"key\": \"my-mcp-server.Shared\",\n      \"value\": {\n        \"name\": { \"defaultValue\": \"my-mcp-server\", \"isExpression\": false, \"displayName\": \"Name\" },\n        \"folderPath\": { \"defaultValue\": \"Shared\", \"isExpression\": false, \"displayName\": \"Folder Path\" },\n        \"EntryPointUniqueId\": { \"defaultValue\": \"708b62c7-15f1-46d8-9564-5d03c6a8668f\", \"isExpression\": false, \"displayName\": \"agent\" }\n      },\n      \"metadata\": { \"ActivityName\": \"retrieve_async\", \"BindingsVersion\": \"2.2\", \"DisplayLabel\": \"FullName\" }\n    }\n  ]\n}\n```\n", "references/lifecycle/build.md": "# Build UiPath Agents\n\n> **Note:** This guide covers coded (Python) agent build. For low-code agents, edit `agent.json` directly \u2014 see [lowcode/agent-json-reference.md](../lowcode/agent-json-reference.md).\n\nImplement agent logic using UiPath SDK and framework-specific patterns.\n\n## Reference Lookup\n\nRead **only** the reference matching the selected framework. Do NOT load other framework references.\n\n| Framework | Reference |\n|-----------|-----------|\n| Simple Function | `../frameworks/simple-agents.md` + `../frameworks/agent-patterns.md` |\n| LangGraph | `../frameworks/langgraph-integration.md` |\n| LlamaIndex | `../frameworks/llamaindex-integration.md` |\n| OpenAI Agents | `../frameworks/openai-agents-integration.md` |\n\nLoad capability references **only if the task requires them** \u2014 do not preload:\n\n| Capability | Reference | Load when... |\n|------------|-----------|-------------|\n| RPA process invocation | `../capabilities/process-invocation.md` | agent invokes UiPath processes/jobs |\n| Human approval / interrupt | `../capabilities/human-in-the-loop.md` | agent needs human-in-the-loop or pause/resume |\n| RAG / context grounding | `../capabilities/context-grounding.md` | agent searches organization documents |\n| Platform API calls | `../capabilities/sdk-services.md` | agent uses UiPath platform services directly |\n| Tracing / monitoring | `../capabilities/tracing.md` | agent needs custom `@traced()` tracing (Simple Function only \u2014 LangGraph, LlamaIndex, and OpenAI Agents all trace automatically via openinference instrumentation) |\n\n## Framework Reference\n\n| Framework | Config File | Key Dependency | Entry Point |\n|-----------|------------|----------------|-------------|\n| Simple Function | `uipath.json` | `uipath` | `main.py` function |\n| LangGraph | `langgraph.json` | `uipath-langchain` | `main.py` compiled StateGraph |\n| LlamaIndex | `llama_index.json` | `uipath-llamaindex` | `main.py` Workflow instance |\n| OpenAI Agents | `openai_agents.json` | `uipath-openai-agents` | `main.py` Agent instance |\n\n## Troubleshooting\n\n| Error | Cause | Solution |\n|-------|-------|----------|\n| `'dict' has no attribute '...'` | `with_structured_output()` returns a dict, not a Pydantic model | Access results with `result['key']` dict syntax, not `result.key` attribute access |\n| `ImportError: Could not import <package>` | External tool package not in `pyproject.toml` | Add all third-party tool packages to dependencies: `uv add <package>` |\n| Agent returns empty output | Entry point not wired correctly | Verify `main.py` exports the correct object (compiled graph, Workflow, Agent) |\n| `TypeError` on Input/Output | Schema mismatch after code change | Re-run `uip codedagent init` to regenerate `entry-points.json` |\n\n## Additional Instructions\n\n- **Select a framework before writing any code.** Infer from the prompt if possible (tools/orchestration \u2192 LangGraph, RAG \u2192 LlamaIndex, simple LLM \u2192 OpenAI Agents, no LLM \u2192 Simple Function). If ambiguous, ask the user to choose.\n- **Read ONLY the single framework reference** for the selected framework before writing code. Do NOT read other framework references or capability references unless the task explicitly requires that capability.\n- **NEVER instantiate LLM clients or SDK clients at module level.** `uip codedagent init` imports your Python file to introspect schemas \u2014 module-level `UiPathAzureChatOpenAI()`, `UiPathChat()`, `UiPathChatOpenAI()`, or `UiPath()` will fail because auth may not have happened yet. Always create these instances inside functions or graph nodes, never at the top level of the module.\n- **Correct SDK import: `from uipath.platform import UiPath`** \u2014 not `from uipath import UiPath` (that does not exist). Instantiate inside functions only: `sdk = UiPath()`.\n- LangGraph agents get tracing automatically \u2014 no `@traced()` needed on graph nodes.\n- Simple function agents require `@traced()` on the `main` function.\n", "references/lifecycle/deployment.md": "# Deploy UiPath Agents\n\n> **Agent type: Both coded and low-code agents.** The `deploy`, `pack`, `publish`, and `invoke` commands work for both types. Coded agents require a `pyproject.toml` with `name`/`version`/`authors` and version bumping before re-deploy. Low-code agents only need `agent.json` and `entry-points.json` \u2014 no Python packaging.\n\nPackage, publish, and invoke your agents in UiPath Cloud.\n\n## Quick Reference\n\n```bash\n# Pack + publish in one command (recommended)\nuip codedagent deploy --my-workspace\n\n# Note: uip codedagent pack and uip codedagent publish as standalone\n# commands are blocked by the CLI wrapper. Use deploy instead.\n\n# Invoke published agent \u2014 use entrypoint name from entry-points.json, NOT project name\nuip codedagent invoke <ENTRYPOINT> '{\"query\": \"test\"}'\n```\n\n## Documentation\n\n- **[Authentication](authentication.md)** \u2014 Set up credentials before deploying\n- **[Running Agents](running-agents.md)** \u2014 Test locally before deploying\n- **[File Sync](file-sync.md)** \u2014 Push to Studio Web before deploying for the first time\n\n## Prerequisites\n\n- Authentication configured \u2014 if not authenticated, use the [authentication reference](authentication.md) first\n- `entry-points.json` exists (run `uip codedagent init`)\n- `pyproject.toml` has `name`, `version`, `description`, `authors` (**coded agents only** \u2014 low-code agents do not need this)\n\n## Troubleshooting\n\n| Error | Cause | Solution |\n|-------|-------|----------|\n| `Project authors cannot be empty` | Missing `authors` in `pyproject.toml` | Add `authors = [{ name = \"Your Name\" }]` to `[project]` section |\n| `Pack failed: missing fields` | `pyproject.toml` incomplete | Ensure `name`, `version`, `description`, and `authors` are all set |\n| `Version already exists` | Same version already published | Bump the patch version in `pyproject.toml` before re-deploying |\n| `401 Unauthorized` | Auth expired or not configured | Re-run `uip login --format json` then `uip login tenant set \"<TENANT>\" --format json` |\n\n## Additional Instructions\n\n- Read the [deployment reference](deployment.md) for details on pack options and feed selection.\n- Always test locally with `uip codedagent run <ENTRYPOINT>` before deploying.\n\n---\n\n# Deployment\n\nPackage, publish, and invoke your UiPath coded agent in the cloud.\n\n## Deployment Workflow\n\n```\nuip codedagent init \u2192 uip codedagent run (test) \u2192 uip codedagent deploy \u2192 uip codedagent invoke\n                                                     (pack + publish combined)\n```\n\n## Pack\n\nPackage your project into a `.nupkg` file for deployment.\n\n> **Low-code agents:** The `pack` step is handled automatically by `deploy`. No `pyproject.toml` version bumping is needed.\n\n> **\u26a0\ufe0f `uip codedagent pack` as a standalone command is blocked** by the CLI wrapper and will return an error. Use `uip codedagent deploy` instead \u2014 it runs pack and publish internally. If you need the `.nupkg` file without publishing, use `uip codedagent deploy` and retrieve it from `.uipath/`.\n\n```bash\nuip codedagent pack\n```\n\n### What It Does\n\n1. Validates project structure (`uipath.json`, `pyproject.toml`, `entry-points.json`)\n2. Runs `uv lock` to lock dependencies\n3. Generates metadata files (`operate.json`, `entry-points.json`, `bindings_v2.json`, `package-descriptor.json`)\n4. Creates a `.nupkg` file in `.uipath/`\n\n### Options\n\n| Option | Description |\n|--------|-------------|\n| `root` | Project root directory (default: `.`) |\n| `--nolock` | Skip `uv lock` and exclude `uv.lock` from package |\n\n### Package Contents\n\nThe generated `.nupkg` (NuGet package) contains:\n\n```\ncontent/\n\u251c\u2500\u2500 operate.json           # Operation configuration\n\u251c\u2500\u2500 entry-points.json      # Entry point definitions\n\u251c\u2500\u2500 bindings_v2.json       # Runtime bindings\n\u251c\u2500\u2500 package-descriptor.json # File manifest\n\u251c\u2500\u2500 main.py                # Your source files\n\u251c\u2500\u2500 pyproject.toml\n\u2514\u2500\u2500 uv.lock                # (unless --nolock)\n```\n\n### Controlling Included Files\n\nUse `packOptions` in `uipath.json` to control which files are packaged:\n\n```json\n{\n  \"packOptions\": {\n    \"fileExtensionsIncluded\": [\".py\", \".json\"],\n    \"filesIncluded\": [\"config.yaml\"],\n    \"filesExcluded\": [\"test_*.py\"],\n    \"directoriesExcluded\": [\"tests\", \"__pycache__\"],\n    \"includeUvLock\": true\n  }\n}\n```\n\n### Output\n\n```\nName:        my-agent\nVersion:     0.1.0\nDescription: UiPath Coded Agent - My agent description\nAuthors:     Your Name\n```\n\n> **Low-code agents:** The `.nupkg` contains `agent.json`, `entry-points.json`, `bindings_v2.json`, and `operate.json` \u2014 no `main.py`, `pyproject.toml`, or `uv.lock`. The `Pack` step also does not require a version bump; only coded agents need version bumping before re-deploy.\n\nThe package is saved as `.uipath/my-agent.0.1.0.nupkg`.\n\n---\n\n## Publish\n\nUpload a packaged project to a UiPath feed.\n\n> **\u26a0\ufe0f `uip codedagent publish` as a standalone command is blocked** by the CLI wrapper and will return an error. Use `uip codedagent deploy` which combines pack + publish in one step.\n\n```bash\nuip codedagent publish\n```\n\n### Options\n\n| Option | Short | Description |\n|--------|-------|-------------|\n| `--tenant` | `-t` | Publish to the tenant package feed |\n| `--my-workspace` | `-w` | Publish to your personal workspace |\n| `--folder` | `-f` | Specify folder name (skips interactive selection) |\n\n### Examples\n\n```bash\n# Publish to personal workspace\nuip codedagent publish --my-workspace\n\n# Publish to tenant feed\nuip codedagent publish --tenant\n\n# Publish to a specific folder\nuip codedagent publish --folder \"Finance\"\n```\n\n### Feed Selection\n\nIf no flag is specified, the CLI displays an interactive menu to select the target feed. Feed matching is case-insensitive and strips common prefixes/suffixes (e.g., \"Orchestrator My Folder Feed\" matches \"My Folder\").\n\n### Authentication\n\nAuthentication configures these environment variables:\n- `UIPATH_URL` - Base URL of your UiPath instance\n- `UIPATH_ACCESS_TOKEN` - Bearer token for authorization\n\n---\n\n## Deploy\n\nShorthand that runs **pack + publish** in one command.\n\n```bash\nuip codedagent deploy\n```\n\n### Options\n\nCombines all options from pack and publish:\n\n| Option | Short | Description |\n|--------|-------|-------------|\n| `root` | | Project root directory (default: `./`) |\n| `--tenant` | `-t` | Publish to tenant feed |\n| `--my-workspace` | `-w` | Publish to personal workspace |\n| `--folder` | `-f` | Specify folder name |\n\n### Examples\n\n```bash\n# Deploy to personal workspace\nuip codedagent deploy --my-workspace\n\n# Deploy to a specific folder\nuip codedagent deploy --folder \"Finance\"\n\n# Deploy from a subdirectory\nuip codedagent deploy ./my-agent --my-workspace\n```\n\n---\n\n## Execute\n\nTo run and test your published agent, use `uip codedagent invoke <entrypoint> '<json-input>'`. This is async \u2014 it returns a monitoring URL immediately. There is NO `--wait` flag.\n\n---\n\n## Configuration Files\n\n### Files Used During Deployment\n\n| File | Created By | Used By | Purpose |\n|------|-----------|---------|---------|\n| `uipath.json` | `uip codedagent init` | `pack` | Runtime options, pack options |\n| `pyproject.toml` | You | `pack`, `invoke` | Project name, version, dependencies |\n| `entry-points.json` | `uip codedagent init` | `pack`, `invoke` | Entry point definitions with schemas |\n| `bindings.json` | `uip codedagent init` | `pack` | Developer-facing runtime bindings (converted to `bindings_v2.json` inside the `.nupkg` by `pack`) |\n\n### Environment Variables\n\n| Variable | Required For | Description |\n|----------|-------------|-------------|\n| `UIPATH_URL` | publish, deploy, invoke | UiPath instance base URL |\n| `UIPATH_ACCESS_TOKEN` | publish, deploy, invoke | Bearer token for API auth |\n| `UIPATH_FOLDER_PATH` | optional | Default folder context |\n\nThese are set automatically by `uip login`.\n\n## Version Bumping\n\nPublishing fails with `409 Conflict` (shown as \"Version already exists\" in some CLI versions) if the version was already published. **Before re-deploying, bump the patch version** in `pyproject.toml`:\n\n```toml\n[project]\nversion = \"0.0.2\"  # was 0.0.1\n```\n\nOn re-deploy, always increment the patch number (e.g., `0.0.1` \u2192 `0.0.2` \u2192 `0.0.3`). Only bump minor/major for breaking or feature changes.\n\n## Typical Deployment Flow\n\n1. Authenticate with `uip login --format json` then `uip login tenant set \"<TENANT>\" --format json`\n2. Test locally: `uip codedagent run main '<input-json>'`\n3. Bump version in `pyproject.toml` if re-deploying\n4. Deploy: `uip codedagent deploy --my-workspace`\n5. Invoke published agent: `uip codedagent invoke main '<input-json>'`\n\n> **Note:** Use `uip codedagent run` for local testing and `uip codedagent invoke` for cloud execution.\n", "references/lifecycle/evaluate.md": "# Evaluate UiPath Agents\n\n> **Agent type: Both coded and low-code agents.** The same `uip codedagent eval` command and evaluation file format works for both. For coded agents the entrypoint is the name from `entry-points.json` (e.g. `main`). For low-code agents it is always `agent.json`. The `@mockable()` decorator for mocking external calls is only available to coded agents.\n\nDesign and run tests for your agents using the UiPath evaluation framework.\n\n## Prerequisites\n\n- `entry-points.json` exists (run `uip codedagent init`)\n\n### Local-only vs Studio Web\n\nBefore proceeding, determine whether the user wants to run evaluations **locally only** or also **report evaluation results in Studio Web**:\n\n- **Local-only** \u2014 No authentication or `UIPATH_PROJECT_ID` needed. Use `--no-report` flag when running evals. Skip auth checks entirely.\n- **Studio Web** \u2014 Required when the user wants to report evaluation results to Studio Web or use `--report`. In this case:\n  - Authentication must be configured \u2014 if not authenticated, use the [authentication reference](authentication.md) first\n  - `UIPATH_PROJECT_ID` must be set in `.env` \u2014 this is obtained by pushing the agent to Studio Web via `uip codedagent push` (see [sync reference](file-sync.md))\n\n## Quick Reference\n\n```bash\n# Run evaluations locally (no cloud connection needed)\nuip codedagent eval <ENTRYPOINT> evaluations/eval-sets/smoke-test.json --no-report --workers 4\n\n# With output file\nuip codedagent eval <ENTRYPOINT> evaluations/eval-sets/smoke-test.json --no-report --output-file results.json\n\n# Cache LLM evaluator responses for reproducible reruns and lower API cost\nuip codedagent eval <ENTRYPOINT> evaluations/eval-sets/smoke-test.json --no-report --mocker-cache\n\n# Report results to Studio Web (requires auth + UIPATH_PROJECT_ID)\nuip codedagent eval <ENTRYPOINT> evaluations/eval-sets/smoke-test.json --report --workers 4\n\n# Low-code agent\nuip codedagent eval agent.json evaluations/eval-sets/smoke-test.json\n```\n\n## Documentation\n\n- **[Evaluators Reference](evaluations/evaluators.md)** \u2014 All evaluator types, configs, scoring, and `evaluatorTypeId` values\n- **[Evaluation Sets](evaluations/evaluation-sets.md)** \u2014 Test case file format, mocking strategies, and examples\n- **[Creating Evaluations](evaluations/creating-evaluations.md)** \u2014 Test case design and organization\n- **[Running Evaluations](evaluations/running-evaluations.md)** \u2014 Command options, score interpretation, troubleshooting\n- **[Best Practices](evaluations/best-practices.md)** \u2014 Patterns by agent type, CI/CD integration\n\n## File Structure\n\n```\nevaluations/\n\u251c\u2500\u2500 eval-sets/\n\u2502   \u2514\u2500\u2500 smoke-test.json              # Test cases\n\u2514\u2500\u2500 evaluators/\n    \u2514\u2500\u2500 llm-judge-trajectory.json    # Evaluator config (REQUIRED)\n```\n\n**Every evaluator referenced in `evaluatorRefs` must have a matching config file in `evaluations/evaluators/`.** The `id` field in the config must match the `evaluatorRefs` value exactly.\n\nExample `evaluations/evaluators/llm-judge-trajectory.json`:\n```json\n{\n  \"version\": \"1.0\",\n  \"id\": \"LLMJudgeTrajectoryEvaluator\",\n  \"evaluatorTypeId\": \"uipath-llm-judge-trajectory-similarity\",\n  \"evaluatorConfig\": {\n    \"name\": \"LLMJudgeTrajectoryEvaluator\",\n    \"defaultEvaluationCriteria\": {\n      \"expectedAgentBehavior\": \"Agent should process the input and return a response.\"\n    }\n  }\n}\n```\n\n## Mocking External Calls\n\n> **Note:** Both mocking approaches below are only available for coded (Python) agents. Low-code agents cannot mock external tool calls \u2014 all resources declared in `agent.json` will be called for real during eval.\n\n### Mocking Approaches\n\n| Approach | How | Requires |\n|---|---|---|\n| `@mockable()` Python decorator | Marks a function as mock-able at the Python level | Decorator in agent code |\n| `mockingStrategy: mockito` in eval set | Replaces specific function calls in the eval set JSON | `@mockable()` in agent code + `mockingStrategy` in eval set |\n| `mockingStrategy: llm` in eval set | Simulates LLM responses without real API calls | Only `mockingStrategy` in eval set; no code change needed |\n\n`@mockable()` and `mockingStrategy: mockito` work together \u2014 the decorator makes the function interceptable, and the eval set JSON specifies the replacement values. `mockingStrategy: llm` is independent and simulates the LLM layer only.\n\n### Using `@mockable()`\n\nApply `@mockable()` to functions that call external services:\n\n```python\nfrom uipath.eval.mocks import mockable\n\n@mockable(example_calls=[\n    {\"args\": {\"query\": \"weather in NYC\"}, \"return_value\": {\"temp\": 72, \"condition\": \"sunny\"}},\n])\ndef fetch_weather(query: str) -> dict:\n    return call_weather_api(query)\n```\n\nDuring evaluations, matching args return the mock value. During normal execution, the real function runs.\n\n## Troubleshooting\n\n| Error | Cause | Solution |\n|-------|-------|----------|\n| `typing.Any must be a subclass of BaseEvaluatorConfig` | Invalid `evaluatorTypeId` in evaluator JSON | Check `evaluators.md` for valid evaluator type IDs |\n| `target_output_key: Input should be a valid string` | ContainsEvaluator missing required config | Set `\"target_output_key\"` to the output field name in the evaluator JSON |\n| `UIPATH_PROJECT_ID not found` | Agent not pushed to Studio Web (only needed for `--report`) | Push the agent first with `uip codedagent push` and set `UIPATH_PROJECT_ID=<id>` in `.env`. For local-only evals, use `--no-report` to skip this requirement |\n| All scores are 0 | Mock data missing or wrong args | Check `@mockable()` `example_calls` match the args used in eval set inputs |\n\n## Additional Instructions\n\n- Read [Evaluators Reference](evaluations/evaluators.md) first to choose the right evaluator.\n- Read [Evaluation Sets](evaluations/evaluation-sets.md) for file format before creating test cases.\n- Evaluators are auto-discovered from `evaluations/evaluators/` \u2014 the `id` field must match `evaluatorRefs` in eval sets.\n", "references/lifecycle/file-sync.md": "# File Synchronization\n\n> **Agent type: Both coded and low-code agents.** The same `uip codedagent push` / `pull` commands work for both. For coded agents the primary files synced are `main.py`, `pyproject.toml`, `uv.lock`, and config JSONs. For low-code agents the primary file is `agent.json` (no `pyproject.toml` or `uv.lock`).\n\nSync project files between local development and remote Studio Web storage.\n\n## Quick Reference\n\n```bash\n# Pull remote files to local\nuip codedagent pull\n\n# Push local files to remote (mirrors local state)\nuip codedagent push\n\n# Force overwrite without prompts\nuip codedagent push --overwrite\nuip codedagent pull --overwrite\n```\n\n## Documentation\n\n- **[Authentication](authentication.md)** \u2014 Required before push or pull\n- **[Deployment](deployment.md)** \u2014 Deploy after syncing\n- **[Running Agents](running-agents.md)** \u2014 Test locally before pushing changes\n\n## Prerequisites\n\n- Authentication configured \u2014 if not authenticated, use the [authentication reference](authentication.md) first\n- `UIPATH_PROJECT_ID` set in `.env` or environment \u2014 also required by the [evaluate reference](evaluate.md) when reporting evaluation results to Studio Web (`--report` flag)\n\n## Troubleshooting\n\n| Error | Cause | Solution |\n|-------|-------|----------|\n| `UIPATH_PROJECT_ID environment variable not found` | Missing project ID in `.env` | Create a Coded Agent project in Studio Web, copy its ID, add `UIPATH_PROJECT_ID=<id>` to `.env` |\n| `Your local version is behind the remote version. Aborted!` | Push requires interactive confirmation that CLI cannot provide | Use `uip codedagent push --overwrite` to force push |\n| Push deleted unexpected files | Push mirrors local state \u2014 removes remote files not present locally | This is by design. Review local files before pushing |\n| `Conflict on pull` | Remote and local both changed | Use `uip codedagent pull --overwrite` to force remote, or manually resolve differences |\n| `401 Unauthorized` | Auth expired | Re-run `uip login --format json` then `uip login tenant set \"<TENANT>\" --format json` |\n\n## Additional Instructions\n\n- Read the [file sync reference](file-sync.md) before making assumptions about push/pull behavior.\n- Push **deletes** remote files not present locally. It mirrors local state.\n\n---\n\n# File Synchronization\n\nSync UiPath project files between your local development environment and remote storage (Studio Web).\n\n## Synchronization Workflow\n\n```\nSetup Project ID \u2192 Pull Remote Files \u2192 Make Local Changes \u2192 Push Local Files\n                      (optional)                           to Remote\n```\n\n## Prerequisites\n\nBefore syncing files, ensure:\n\n1. **UiPath Account**: Active UiPath Cloud or on-premise account\n2. **Authentication**: Configured credentials via `uip login`\n3. **Project ID**: Identify your project's ID in Studio Web\n4. **Python Environment**: Python 3.11+ with `uv` package manager\n\n## Environment Setup\n\n### Set Project ID\n\nThe `UIPATH_PROJECT_ID` is required for both push and pull operations. Create a `.env` file in your project directory:\n\n```env\nUIPATH_PROJECT_ID=12345\n```\n\nAlternatively, set it as an environment variable:\n\n```bash\nexport UIPATH_PROJECT_ID=12345\n```\n\nOr inline for a single command:\n\n```bash\nUIPATH_PROJECT_ID=12345 uip codedagent push\n```\n\n### Authentication\n\nRun `uip login --format json` then `uip login tenant set \"<TENANT>\" --format json` to configure your credentials. This sets up:\n- `UIPATH_URL` - Your UiPath instance URL\n- `UIPATH_ACCESS_TOKEN` - Bearer token for API access\n- `UIPATH_TENANT_NAME` - Your tenant identifier\n\n---\n\n## Pull Command\n\nDownload remote project files to your local environment.\n\n```bash\nuip codedagent pull\n```\n\n### What It Does\n\n1. Fetches all files from the remote project (Studio Web)\n2. Downloads them to your local workspace\n3. Preserves directory structure and file organization\n4. Overwrites local files if `--overwrite` flag is used\n\n### Options\n\n| Option | Description |\n|--------|-------------|\n| `--overwrite` | Automatically replace conflicting local files without confirmation |\n\n### Examples\n\n**Pull remote files (with confirmation on conflicts):**\n```bash\nuip codedagent pull\n```\n\n**Pull and automatically overwrite local changes:**\n```bash\nuip codedagent pull --overwrite\n```\n\n### Use Cases\n\n- **Clone existing project**: Get a fresh copy of a remote project locally\n- **Sync team changes**: Pull updates made by team members\n- **Restore files**: Recover local files from remote backup\n- **Start collaboration**: Begin working on a shared project\n\n---\n\n## Push Command\n\nUpload local project files to remote storage, keeping remote in sync with local state.\n\n```bash\nuip codedagent push\n```\n\n### What It Does\n\n1. **Updates** - Overwrites remote files with your local versions if they differ\n2. **Uploads** - Adds new local files to remote storage\n3. **Deletes** - Removes remote files that no longer exist locally\n4. Ensures remote is an exact mirror of your local project\n\n### Options\n\n| Option | Description |\n|--------|-------------|\n| `--overwrite` | Skip confirmation prompts when overwriting remote files |\n| `--nolock` | Skip `uv lock` and don't include lock file in sync |\n| `--ignore-resources` | Skip importing resources during push |\n\n### Examples\n\n**Push with confirmation prompts:**\n```bash\nuip codedagent push\n```\n\n**Push and skip confirmation (batch/automation):**\n```bash\nuip codedagent push --overwrite\n```\n\n**Push without updating dependencies lock:**\n```bash\nuip codedagent push --nolock\n```\n\n> **Low-code agents:** The `--nolock` flag is not relevant (no `uv.lock` file).\n\n**Push without syncing resources:**\n```bash\nuip codedagent push --ignore-resources\n```\n\n### Use Cases\n\n- **Save work**: Persist your local changes to remote storage\n- **Publish updates**: Share changes with team members\n- **Backup**: Create a remote backup of your project\n- **CI/CD**: Automate project sync in deployment pipelines\n\n---\n\n## Conflict Resolution\n\n### Pull with Conflicts\n\nIf local files differ from remote, you have two options:\n\n**Option 1: Review and confirm each conflict**\n```bash\nuip codedagent pull\n# Interactive prompts will ask about each conflicting file\n```\n\n**Option 2: Auto-overwrite local files with remote**\n```bash\nuip codedagent pull --overwrite\n```\n\n### Push with Conflicts\n\nIf remote files differ from local, you have two options:\n\n**Option 1: Review and confirm each change**\n```bash\nuip codedagent push\n# Interactive prompts will ask about each file to overwrite\n```\n\n**Option 2: Force push local state (overwrite all remote files)**\n```bash\nuip codedagent push --overwrite\n```\n\n---\n\n## Common Workflows\n\n### Workflow 1: Clone and Work on a Project\n\nCreate `.env` file:\n```env\nUIPATH_PROJECT_ID=my-project-123\n```\n\nThen work with your project:\n```bash\n# Pull all remote files to local\nuip codedagent pull\n\n# Make changes locally\n# ... edit your files ...\n\n# Push changes back to remote\nuip codedagent push\n```\n\n### Workflow 2: Collaborative Development\n\nCreate `.env` file in your project:\n```env\nUIPATH_PROJECT_ID=shared-project\n```\n\n**Developer A:**\n```bash\nuip codedagent pull          # Get latest from team\n# ... make changes ...\nuip codedagent push --overwrite  # Push back\n```\n\n**Developer B:**\n```bash\nuip codedagent pull --overwrite  # Get latest from Developer A\n# ... make their own changes ...\nuip codedagent push --overwrite\n```\n\n### Workflow 3: Automated Sync in CI/CD\n\nCreate `.env` file or set variables in CI/CD:\n```env\nUIPATH_PROJECT_ID=$PROJECT_ID\n```\n\nScript:\n```bash\n#!/bin/bash\nset -e\n\n# Sync files\nuip codedagent pull --overwrite\n# ... run tests or build ...\nuip codedagent push --overwrite\n```\n\n### Workflow 4: Selective Sync (Skip Resources)\n\nCreate `.env` file:\n```env\nUIPATH_PROJECT_ID=my-project\n```\n\nThen selectively sync:\n```bash\n# Push code without syncing resource files\nuip codedagent push --ignore-resources\n\n# Later, sync resources separately\nuip codedagent push\n```\n\n---\n\n## Configuration Files\n\n### Files Involved in Sync\n\n| File | Purpose |\n|------|---------|\n| `pyproject.toml` | Project metadata, dependencies |\n| `uipath.json` | UiPath project configuration |\n| `entry-points.json` | Entry point definitions |\n| `main.py` | Main agent/project code |\n| `uv.lock` | Dependency lock file (can skip with `--nolock`) |\n| `.py`, `.json`, `.yaml` files | Project source files |\n\n> **Low-code agents:** The primary file synced is `agent.json`. No `pyproject.toml`, `main.py`, or `uv.lock` files are involved.\n\n### Files Excluded from Sync\n\n- `__pycache__/` - Python cache\n- `.git/` - Git repository\n- `.env` - Environment variables (don't sync secrets!)\n- `.uipath/` - Build artifacts\n- Other files based on `packOptions` in `uipath.json`\n\n> **After pulling on a new machine:** `.env` is excluded from sync for security. After pulling, manually recreate `.env` with `UIPATH_PROJECT_ID=<id>` and re-run `uip login --format json` + `uip login tenant set \"<TENANT>\" --format json` to restore credentials.\n\n---\n\n## Environment Variables\n\n| Variable | Required | Description | How to Set |\n|----------|----------|-------------|-----------|\n| `UIPATH_PROJECT_ID` | Yes | ID of the project to sync | Add to `.env` file |\n| `UIPATH_URL` | Yes | Base URL of your UiPath instance | Set by `uip login` |\n| `UIPATH_ACCESS_TOKEN` | Yes | Bearer token for authentication | Set by `uip login` |\n| `UIPATH_TENANT_NAME` | Optional | Your tenant identifier | Set by `uip login` |\n\nSee [Environment Setup](#environment-setup) above for how to set these.\n\n---\n\n## Best Practices\n\n1. **Always Pull Before Push**\n   - Pull latest remote changes before pushing local changes\n   - Reduces conflicts and maintains consistency\n\n2. **Use --overwrite Carefully**\n   - In automated workflows (CI/CD), use `--overwrite`\n   - In manual workflows, review conflicts first\n\n3. **Don't Sync Secrets**\n   - Never include `.env` or credential files in sync\n   - Use environment variables or secure vaults instead\n\n4. **Test Before Pushing**\n   - Test your local changes with `uip codedagent run`\n   - Verify everything works before pushing to remote\n\n5. **Use Version Control Locally**\n   - Commit your changes to git before major syncs\n   - Allows recovery if something goes wrong\n\n6. **Document Your Project**\n   - Include README and comments in your project\n   - Helps team members understand the structure\n\n---\n\n## Troubleshooting\n\n### \"UIPATH_PROJECT_ID not set\"\n\n**Error:** Command fails with \"UIPATH_PROJECT_ID environment variable required\"\n\n**Solution:** Add to your `.env` file:\n```env\nUIPATH_PROJECT_ID=your-project-id\n```\n\nOr set it as an environment variable:\n```bash\nexport UIPATH_PROJECT_ID=your-project-id\nuip codedagent push\n```\n\n### \"Authentication failed\"\n\n**Error:** Command fails with \"Unauthorized\" or \"Invalid token\"\n\n**Solution:** Re-run `uip login --format json` then `uip login tenant set \"<TENANT>\" --format json` to refresh credentials.\n\n### \"Files were unexpectedly deleted\"\n\n**Error:** Remote files are gone after push\n\n**Solution:** This happens because push deletes remote files not in local. Restore from:\n1. Version control backup\n2. Previous remote state\n3. Pull from another local copy\n\n### \"Conflict on multiple files\"\n\n**Error:** Many files conflict between local and remote\n\n**Solution:** Choose a strategy:\n```bash\n# Keep local version (push --overwrite)\nuip codedagent push --overwrite\n\n# Keep remote version (pull --overwrite)\nuip codedagent pull --overwrite\n```\n", "references/lifecycle/running-agents.md": "# Run UiPath Agents\n\n> **Agent type: Both coded and low-code agents.** `uip codedagent run` and `uip codedagent invoke` work for both. For coded agents the entrypoint is the name from `entry-points.json` (e.g. `main`). For low-code agents it is always `agent.json`.\n\nExecute agents locally for testing or invoke published agents in UiPath Cloud.\n\n## Quick Reference\n\n```bash\n# Run locally \u2014 ENTRYPOINT is the name from entry-points.json, NOT the project name\nuip codedagent run <ENTRYPOINT> '{\"query\": \"test\"}'\n\n# Run with file input\nuip codedagent run <ENTRYPOINT> --file input.json\n\n# Invoke published agent in cloud\nuip codedagent invoke <ENTRYPOINT> '{\"query\": \"test\"}'\n\n# Low-code agent\nuip codedagent run agent.json '{\"task\": \"test\"}'\n```\n\n**IMPORTANT:** The entrypoint name comes from `entry-points.json` (e.g., `main`, `agent`). It is NOT the project or package name. Check `entry-points.json` for the correct name.\n\n## Documentation\n\n- **[Authentication](authentication.md)** \u2014 Set up credentials before invoking cloud commands\n- **[Deployment](deployment.md)** \u2014 Publish agents before using `invoke`\n- **[Evaluation](evaluate.md)** \u2014 Run evaluations after confirming local run works\n\n## Prerequisites\n\n- `entry-points.json` must exist (run `uip codedagent init` if missing)\n- For `invoke`: agent must be published and auth configured\n\n> **Low-code agents:** No `entry-points.json` needed. The entrypoint is always `agent.json`.\n\n## Troubleshooting\n\n| Error | Cause | Solution |\n|-------|-------|----------|\n| `Authorization required. Please run uipath auth` | Not authenticated before running | Run `uip login --format json` then `uip login tenant set \"<TENANT>\" --format json` first |\n| `UIPATH_ORGANIZATION_ID...is required` | Missing org ID env variable (OpenAI Agents) | Ensure `.env` has `UIPATH_ORGANIZATION_ID` set after auth |\n| `Invalid input` | JSON doesn't match Input schema | Check `entry-points.json` for expected fields and types |\n| `Error during initialization: File not found: main` | `main.py` missing or not in project root | Create `main.py` in the project root directory |\n\n## Additional Instructions\n\n- Read the [running agents reference](running-agents.md) before making assumptions about run/invoke behavior.\n\n---\n\n# Running UiPath Agents\n\nExecute your UiPath agent locally or in the cloud.\n\n## Run vs Invoke\n\n| Aspect | Run (Local) | Invoke (Cloud) |\n|--------|-----------|---|\n| **Purpose** | Test agents locally during development | Execute deployed agents in UiPath Cloud |\n| **Location** | Your machine | UiPath Cloud workspace |\n| **When to Use** | Before deployment, debugging, testing | After publishing to the cloud |\n| **Command** | `uip codedagent run` | `uip codedagent invoke` |\n| **Requirements** | Local project setup | Published agent in workspace |\n\n---\n\n## Run (Local Execution)\n\nTest your agent locally before deploying to the cloud.\n\n### Project Verification\n\nBefore running an agent, your project should have:\n- `uipath.json` - Project configuration\n- `entry-points.json` - Agent entry points with schemas\n\nIf missing, create an agent first using `uip codedagent new` and `uip codedagent init`.\n\n### Agent Discovery\n\nThe tool reads `entry-points.json` to find all available agents and their schemas:\n- **File path** and **entry point** (e.g., main.py:main)\n- **Input schema** with field types and descriptions\n- **Output schema** with expected return fields\n\nIf multiple entry points exist, **always specify the entrypoint explicitly** in the `uip codedagent run` command. The interactive selector cannot be used from Claude's Bash tool and will cause the command to hang indefinitely.\n\n### Input Collection\n\nThe skill parses the agent's JSON schema and generates interactive prompts for each input field:\n\n**For simple types:**\n```\nEnter field_name (number) - Description: 42\nEnter description (string) - Agent input: hello\n```\n\n**For enums:**\n```\nSelect action (string) - Choose an action:\n  1. process\n  2. analyze\n  3. export\nChoice: 1\n```\n\n**For optional fields:**\n```\nEnter description (string) - Optional agent description [press Enter to skip]:\n```\n\n### Execution\n\nYour agent runs locally with:\n```bash\nuip codedagent run <entrypoint> '<json-input>'\n```\n\nThe agent runs with your provided inputs and returns structured output.\n\n> **Note:** The JSON input must conform to the schema defined in `entry-points.json` for the selected entry point.\n\n### Results Display\n\nResults are shown in a formatted output panel:\n\n```\nEXECUTION RESULTS\n\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\n\nStatus:           \u2705 SUCCESS\nExecution Time:   0.45 seconds\nAgent:            my-agent (agent.py:run)\nInput:            {\"action\": \"process\", \"data\": \"sample\"}\n\nOUTPUT:\n{\n  \"status\": \"completed\",\n  \"result\": \"processed successfully\"\n}\n```\n\n### Supported Input Types\n\nThe skill supports all JSON schema types:\n- **string** - Text input\n- **number** - Decimal numbers\n- **integer** - Whole numbers\n- **boolean** - Yes/No toggle\n- **array** - List of items\n- **object** - Complex nested data\n- **enum** - Choice from predefined options\n\n### Error Handling\n\nIf local execution fails, you'll see:\n- Error message from the agent\n- Stack trace for debugging\n- Suggestions for fixing the issue\n- Option to re-run with modified inputs\n\n### Integration\n\nExecution traces are automatically collected and can be:\n- Viewed in UiPath Cloud\n- Analyzed for performance\n- Used for debugging and optimization\n\n---\n\n## Invoke (Cloud Execution)\n\nExecute a published agent in your UiPath Cloud workspace.\n\n### Prerequisites\n\nBefore invoking an agent, ensure:\n- Agent is published to your workspace (`uip codedagent deploy --my-workspace`)\n- You're authenticated with UiPath Cloud (`uip login --format json` then `uip login tenant set \"<TENANT>\" --format json`)\n- Project has `pyproject.toml` with the correct project name and version\n\n### Execution\n\nRun a published agent in the cloud with:\n```bash\nuip codedagent invoke <entrypoint> '<json-input>'\n```\n\n**Arguments:**\n- `entrypoint` - Entry point path to invoke (optional, defaults to first entry point)\n- `input` - JSON input data (default: `{}`)\n\n> **Note:** The JSON input must conform to the schema defined in `entry-points.json` for the selected entry point.\n\n### What It Does\n\n1. Reads the project name to look up the published release:\n   - **Coded agents**: reads name and version from `pyproject.toml`\n   - **Low-code agents**: reads name from `agent.json` metadata\n2. Looks up the published release in your UiPath workspace\n3. Starts a cloud job with the provided input\n4. Returns a monitoring URL to track execution\n\n### Output\n\n```\nJob started successfully!\nMonitor your job here: ...\n```\n\n> **Important:** `invoke` creates an asynchronous UiPath job that runs in the cloud. The command immediately returns a monitoring URL. You must open this link to view the job execution status, logs, and results in real-time on UiPath Cloud. There is NO `--wait` flag \u2014 the command always returns immediately.\n", "references/lifecycle/setup.md": "# Setup UiPath Agent Project\n\n> **Note:** This guide covers coded (Python) agent setup. For low-code agent setup, see [lowcode/setup.md](../lowcode/setup.md).\n\nScaffold a new project or initialize an existing one for UiPath agent development.\n\n## Quick Reference\n\n```bash\n# New project from scratch\nmkdir my-agent && cd my-agent\n# Copy pyproject.toml template, add framework dep if needed, then:\nuv sync\nsource .venv/bin/activate           # activate venv BEFORE uip codedagent commands\nuip codedagent setup --format json # configure Python backend (once per env)\nuip codedagent new my-agent        # name is REQUIRED\nuip codedagent init\n\n# Existing project \u2014 just generate entry points\nuip codedagent init\n```\n\n## Documentation\n\n- **[Project Setup Guide](setup.md)** \u2014 Complete setup walkthrough\n  - Prerequisites (Python 3.11+, uv)\n  - Choosing agent type (Simple, LangGraph, LlamaIndex, OpenAI Agents)\n  - Creating and scaffolding projects\n  - Running `uip codedagent init` and what it generates\n  - `uipath.json` structure and configuration\n  - Simple function agent details (Input/Output models, project structure)\n\n## Template\n\nA `pyproject.toml` template is available in [assets/templates/pyproject.toml](../../assets/templates/pyproject.toml). Replace `{AGENT_NAME}` and `{AGENT_DESCRIPTION}` after copying.\n\n## Troubleshooting\n\n| Error | Cause | Solution |\n|-------|-------|----------|\n| `No entrypoints found in uipath.json` | Framework package not installed or config file missing | Ensure `uipath-langchain` (or equivalent) is in deps and `langgraph.json` exists |\n| `NameError: name 'StateGraph' is not defined` | `uip codedagent init` imports `main.py` but `langgraph` not installed | Run `uv sync` to install all dependencies before `uip codedagent init` |\n| `No solution found` for Python 3.10 | `requires-python` set too low | Set `requires-python = \">=3.11\"` \u2014 UiPath SDK requires Python 3.11+ |\n| `Project authors cannot be empty` | Missing `authors` in `pyproject.toml` | Add `authors = [{ name = \"Your Name\" }]` to `[project]` section |\n\n## Additional Instructions\n\n- **STOP: You must know which framework to use before running setup.** If no framework has been selected yet, ask the user to choose (Simple Function, LangGraph, LlamaIndex, or OpenAI Agents). The framework determines which dependency to add and what `uip codedagent new` scaffolds.\n- Read the [setup reference](setup.md) before making assumptions about project structure.\n- **Use lazy LLM initialization** so `uip codedagent init` works without auth. Never instantiate LLM clients at module level \u2014 create them inside functions/nodes.\n- After changing Input/Output models, re-run `uip codedagent init` to regenerate schemas.\n\n---\n\n# Project Setup\n\nSet up a new UiPath coded agent project from scratch.\n\n## Prerequisites\n\n- **Python 3.11+** installed\n- **Node.js 18+** and **npm** installed \u2014 required for `uip` CLI (`npm install -g @uipath/cli`)\n- **uv** package manager installed ([docs](https://docs.astral.sh/uv/))\n- UiPath account with access to Orchestrator (for deployment)\n\n## Choose Your Agent Type\n\n| Agent Type | Config File | Entrypoint | Key Dependency | Integration Guide                     |\n|---|---|---|---|---------------------------------------|\n| **Simple Function** | `uipath.json` | `main.py` (function) | `uipath` | [Guide](../frameworks/simple-agents.md)             |\n| **LangGraph** | `langgraph.json` | `main.py` (compiled StateGraph) | `uipath-langchain` | See build skill |\n| **LlamaIndex** | `llama_index.json` | `main.py` (Workflow instance) | `uipath-llamaindex` | See build skill |\n| **OpenAI Agents** | `openai_agents.json` | `main.py` (Agent instance) | `uipath-openai-agents` | See build skill |\n\nEach integration guide is **self-contained** \u2014 it covers project structure, dependencies, input/output patterns, `uip codedagent init`, and complete examples.\n\nThe rest of this page covers the **common setup steps** shared by all agent types, plus details specific to **simple function agents**.\n\n## Creating a New Project\n\n### 1. Setup New Project Directory (if it does not exist already)\n\n```bash\nmkdir my-agent && cd my-agent\n```\n\nThen, copy `pyproject.toml` file from assets to the agent directory.\n\nIf building an agent for a specific framework, add framework-specific dependencies:\n\n```bash\n# For LangGraph agents\nuv add uipath-langchain\n\n# For LlamaIndex agents\nuv add uipath-llamaindex\n\n# For OpenAI Agents\nuv add uipath-openai-agents\n```\n\nFinally, to install dependencies, run:\n\n```bash\nuv sync\n```\n\n### 2. Scaffold with `uip codedagent new`\n\nIf there is **no existing agent code**, use `uip codedagent new` to scaffold the project. It generates necessary integration-specific config file based on which integration package is installed. It may also modify dependencies in `pyproject.toml`.\n\n```bash\nuip codedagent new my-agent\n```\n\n**What it generates per integration:**\n\n| Integration | Generated Files | Template Content |\n|---|---|---|\n| Simple (base) | `main.py`, `pyproject.toml`, `uipath.json` | Dataclass-based echo function |\n| LangGraph | `main.py`, `pyproject.toml`, `langgraph.json` | StateGraph with UiPathChat LLM |\n| LlamaIndex | `main.py`, `pyproject.toml`, `llama_index.json` | Workflow with StartEvent/StopEvent |\n| OpenAI Agents | `main.py`, `pyproject.toml`, `openai_agents.json`, `AGENTS.md` | Agent with UiPathChatOpenAI + tool |\n\n**Which template is used** depends on which integration package is installed. If `uipath-langchain` is installed, you get a LangGraph scaffold. If none of the integration packages are installed, you get the base scaffold.\n\n> **Skip this step** if the project already has `main.py` or `graph.py` with agent code. `uip codedagent new` is only for starting from scratch.\n\nAfter scaffolding, modify the generated `main.py` to implement your actual agent logic.\n\n### 3. Install Dependencies\n\n```bash\nuv sync\n```\n\n### 4. Verify SDK\n\n```bash\nuip codedagent --version\n```\n\n### 5. Authenticate\n\nRun `uip login --format json` then `uip login tenant set \"<TENANT>\" --format json` if your agent needs UiPath Cloud access.\n\n## Simple Function Agent Details\n\nThe sections below are specific to **simple function agents** (no LLM framework). For LangGraph, LlamaIndex, or OpenAI Agents, see their respective integration guides.\n\n### Defining Input/Output Models\n\nEvery simple function agent requires Pydantic `Input` and `Output` models in `main.py`:\n\n```python\nfrom pydantic import BaseModel, Field\nfrom uipath.tracing import traced\n\nclass Input(BaseModel):\n    query: str = Field(description=\"The user's question\")\n    max_results: int = Field(default=5, description=\"Maximum results to return\")\n\nclass Output(BaseModel):\n    answer: str = Field(description=\"The agent's response\")\n    sources: list[str] = Field(default_factory=list, description=\"Source references\")\n\n@traced()\nasync def main(input: Input) -> Output:\n    # Agent logic here\n    return Output(answer=\"Hello!\", sources=[])\n```\n\n### Project Structure\n\n```\nmy-agent/\n\u251c\u2500\u2500 main.py                 # Agent entrypoint with Input/Output models\n\u251c\u2500\u2500 pyproject.toml          # Python project configuration\n\u251c\u2500\u2500 uipath.json             # UiPath project configuration\n\u251c\u2500\u2500 entry-points.json       # Generated entry points with JSON schemas\n\u251c\u2500\u2500 bindings.json           # Runtime bindings\n\u251c\u2500\u2500 .env                    # Environment variables\n\u251c\u2500\u2500 .uipath/                # Internal UiPath files\n\u2502   \u2514\u2500\u2500 telemetry.json\n\u2514\u2500\u2500 main.mermaid            # Generated graph diagram\n```\n\n### First-Time Checklist\n\n1. Create project directory\n2. Copy `pyproject.toml` from `assets/templates/pyproject.toml` (replace placeholders)\n3. Add framework dependency if needed (e.g., `uv add uipath-langchain`)\n4. Run `uv sync` to install dependencies (must happen **before** `uip codedagent new`)\n5. Run `source .venv/bin/activate` to activate the virtual environment\n6. Run `uip codedagent setup --format json` to configure the Python runtime\n7. Run `uip codedagent new my-agent` to scaffold `main.py` and framework config (framework template is selected based on installed packages \u2014 `uv sync` must run first)\n8. Modify `main.py` with your agent logic\n9. Run `uip codedagent init` to generate `entry-points.json`, `bindings.json`, and `.env`\n10. Test with `uip codedagent run main '{\"query\": \"test\"}'`\n\n## Running `uip codedagent init`\n\nAfter creating your entrypoint file, generate project configuration:\n\n```bash\nuip codedagent init\n```\n\nThis works for **all agent types**. The CLI auto-detects the agent type by checking for config files (`langgraph.json`, `llama_index.json`, `openai_agents.json`) via registered middleware. If none are found, it falls back to simple function agent detection.\n\n### Simple Function Agents \u2014 Entrypoint Registration\n\nFor simple function agents (no LangGraph/LlamaIndex/OpenAI Agents), `uip codedagent init` does NOT auto-discover entrypoints. You must register them in `uipath.json` under `\"functions\"` **before** running `uip codedagent init` (or re-run init after adding them).\n\nAfter the first `uip codedagent init` creates `uipath.json`, edit it to add your function mapping:\n\n```json\n{\n  \"functions\": {\n    \"main\": \"main.py:main\"\n  }\n}\n```\n\nThe format is `\"entrypoint_name\": \"file.py:function_name\"`. Then re-run `uip codedagent init` to generate the entry points.\n\nLangGraph, LlamaIndex, and OpenAI Agents integrations auto-discover entrypoints from their respective config files (`langgraph.json`, `llama_index.json`, `openai_agents.json`) \u2014 no manual registration needed.\n\n### What It Generates\n\n| File | Purpose |\n|------|---------|\n| `uipath.json` | Project configuration (runtime options, pack options) |\n| `entry-points.json` | Entry point definitions with JSON schemas from your Pydantic models |\n| `bindings.json` | Runtime bindings (v2.0 format) |\n| `.env` | Environment variables template |\n| `*.mermaid` | Mermaid diagram files for graph visualization |\n| `.uipath/telemetry.json` | Telemetry configuration with project ID |\n| `AGENTS.md`, `.agent/` | Documentation files |\n\n### Options\n\n- **`--no-agents-md-override`** - Skip overwriting existing `.agent` files and `AGENTS.md`\n\n### When to Re-run\n\nRe-run `uip codedagent init` whenever you modify your input/output models to regenerate the JSON schemas in `entry-points.json`.\n\n## uipath.json Structure\n\nThe main project configuration file (generated by `uip codedagent init`):\n\n```json\n{\n  \"$schema\": \"https://cloud.uipath.com/draft/2024-12/uipath\",\n  \"runtimeOptions\": {\n    \"isConversational\": false\n  },\n  \"packOptions\": {\n    \"fileExtensionsIncluded\": [],\n    \"filesIncluded\": [],\n    \"filesExcluded\": [],\n    \"directoriesExcluded\": [],\n    \"includeUvLock\": true\n  },\n  \"functions\": {}\n}\n```\n\n**Key fields:**\n- **`runtimeOptions.isConversational`** - Set `true` for conversational/chat agents\n- **`packOptions`** - Control which files are included when packaging for deployment\n- **`functions`** - Entrypoint name \u2192 file:function mappings. Format: `\"<entrypoint_name>\": \"<file_path>:<function_name>\"`. Example: `\"main\": \"main.py:main\"` means the entrypoint is named `main` and is called with `uip codedagent run main`.\n", "references/lifecycle/evaluations/best-practices.md": "# Best Practices & Common Patterns\n\nThis guide covers best practices for effective evaluation design and common patterns for different agent types.\n\n## Evaluation Best Practices\n\n### Do\n\n- **Use multiple evaluators** for comprehensive validation\n  - Don't rely on a single evaluator\n  - Combine output-based and trajectory-based evaluators for complex agents\n  - Example: Use both ExactMatchEvaluator and JsonSimilarityEvaluator\n\n- **Create separate eval sets for different scenarios**\n  - Happy path scenarios\n  - Edge cases\n  - Error scenarios\n  - Performance tests\n  - This makes it easier to maintain and debug\n\n- **Mix evaluator types appropriately**\n  - Output-based evaluators for result validation\n  - Trajectory evaluators for multi-step agents\n  - LLM evaluators for natural language outputs\n\n- **Use trajectory evaluators for multi-step agents**\n  - Validates execution flow and tool usage\n  - Ensures agent takes expected decision paths\n  - Useful for orchestration agents\n\n- **Use LLM evaluators for natural language or fuzzy matching**\n  - Better for semantic equivalence\n  - More flexible than exact matching\n  - Handles variations in wording\n\n- **Start with ExactMatch, then add flexibility**\n  - Begin with strict ExactMatchEvaluator during development\n  - Add LLM evaluators for production as needed\n  - Allows refinement as agent matures\n\n- **Mock external dependencies consistently**\n  - Mock all external API calls\n  - Use mocking for deterministic testing\n  - Cache LLM responses in CI/CD\n\n- **Version your evaluation sets**\n  - Use semantic versioning in IDs\n  - Track changes over time\n  - Example: `calculator-v1`, `calculator-v2`\n\n- **Document test purposes clearly**\n  - Use descriptive test names\n  - Explain what each test validates\n  - Make it easy for others to understand\n\n- **Review failed tests carefully**\n  - Examine execution traces\n  - Understand why tests failed\n  - Fix either the agent or test expectations\n\n### Don't\n\n- **Use only ExactMatch for natural language outputs**\n  - Too strict, fails on minor variations\n  - Use LLMJudgeOutputEvaluator instead\n\n- **Forget to test edge cases and error scenarios**\n  - Test boundary values (0, min, max)\n  - Test empty/null values\n  - Test invalid inputs\n\n- **Use trajectory evaluators when output-based is sufficient**\n  - Trajectory evaluation is more expensive\n  - Only use when execution path matters\n  - For simple agents, output validation is enough\n\n- **Set too strict criteria early in development**\n  - Allow flexibility while agent is evolving\n  - Tighten criteria as agent stabilizes\n  - Start with 80%, improve to 95%+\n\n- **Skip schema validation during test creation**\n  - Always validate inputs against schema\n  - Prevents invalid test data\n  - Catches type mismatches early\n\n- **Mix unrelated tests in one eval set**\n  - Keep eval sets focused and organized\n  - Separate happy path from error cases\n  - Makes debugging easier\n\n## Common Evaluation Patterns\n\n### Pattern 1: Calculator/Deterministic Agents\n\nFor agents that always produce the same output for the same input:\n\n**Evaluator Selection:**\n- **Primary:** ExactMatchEvaluator\n- **Secondary:** (optional) JsonSimilarityEvaluator for complex outputs\n\n**Test Cases:**\n```\nHappy Path: Basic addition, subtraction, multiplication, division\nEdge Cases: Zero values, negative numbers, very large numbers, decimal results\nError Scenarios: Non-numeric input, missing parameters, division by zero\n```\n\n**Scoring:** 1.0 (pass) or 0.0 (fail). No partial credit for exact match.\n\n**Example Eval Set:**\n\n```json\n{\n  \"version\": \"1.0\",\n  \"id\": \"calculator-comprehensive\",\n  \"name\": \"Calculator Comprehensive Tests\",\n  \"evaluatorRefs\": [\"ExactMatchEvaluator\"],\n  \"evaluations\": [\n    {\n      \"id\": \"test-1-add\",\n      \"name\": \"Basic addition\",\n      \"inputs\": {\"a\": 5, \"b\": 3},\n      \"evaluationCriterias\": {\n        \"ExactMatchEvaluator\": {\n          \"expectedOutput\": {\"result\": \"8\"}\n        }\n      }\n    },\n    {\n      \"id\": \"test-2-divide-by-zero\",\n      \"name\": \"Error handling\",\n      \"inputs\": {\"a\": 10, \"b\": 0},\n      \"evaluationCriterias\": {\n        \"ExactMatchEvaluator\": {\n          \"expectedOutput\": {\"error\": \"Division by zero\"}\n        }\n      }\n    }\n  ]\n}\n```\n\n### Pattern 2: Natural Language Agents\n\nFor agents that generate text, summaries, or natural language output:\n\n**Evaluator Selection:**\n- **Primary:** LLMJudgeOutputEvaluator (semantic matching)\n- **Secondary:** ContainsEvaluator (keyword checks)\n\n**Test Cases:**\n```\nSemantic Equivalence: Different phrasings of same concept, synonymous expressions\nKeyword Validation: Must contain specific terms, key concepts\nFormat Validation: Output length constraints, required fields\n```\n\n**Scoring:** 0.0-1.0 range based on semantic similarity. Accept 0.7+ for good match.\n\n### Pattern 3: Multi-Step Orchestration Agents\n\nFor agents that coordinate multiple tools or services:\n\n**Evaluator Selection:**\n- **Primary:** LLMJudgeTrajectoryEvaluator (execution path validation)\n- **Secondary:** JsonSimilarityEvaluator (output structure)\n\n**Test Cases:**\n```\nTool Sequence: Tools called in expected order, correct arguments\nTool Interaction: Output of one tool becomes input to next\nError Handling: Fallback paths when tool fails, graceful degradation\n```\n\n### Pattern 4: API Integration Agents\n\nFor agents that interact with external APIs:\n\n**Evaluator Selection:**\n- **Primary:** JsonSimilarityEvaluator (response structure)\n- **Secondary:** ExactMatchEvaluator (specific fields)\n\n**Mocking Strategy:** Mock all external API calls using mockito type.\n\n**Test Cases:**\n```\nSuccess Paths: Valid API responses, different formats, pagination\nError Handling: API errors (500, 404, 403), timeouts, malformed responses\nEdge Cases: Empty results, large responses, rate limiting\n```\n\n## Test Organization\n\n### By Scenario Type\n\n```\neval-sets/\n\u251c\u2500\u2500 {agent}-happy-path.json\n\u251c\u2500\u2500 {agent}-edge-cases.json\n\u251c\u2500\u2500 {agent}-error-handling.json\n\u2514\u2500\u2500 {agent}-performance.json\n```\n\n## CI/CD Integration\n\n```bash\nuip codedagent eval <agent> evaluations/eval-sets/smoke-test.json \\\n  --no-report \\\n  --workers 4 \\\n  --mocker-cache \\\n  --output-file eval-results.json\n```\n\n**Low-code agents:**\n```bash\nuip codedagent eval agent.json evaluations/eval-sets/smoke-test.json \\\n  --no-report \\\n  --workers 4 \\\n  --output-file eval-results.json\n```\n\n> Add `--report` (and ensure `UIPATH_PROJECT_ID` is set in `.env`) to publish results to Studio Web.\n\n## Evaluator Selection Quick Guide\n\n| Agent Type | Primary Evaluator | Secondary | Notes |\n|-----------|------------------|-----------|-------|\n| Calculator | ExactMatch | - | Deterministic |\n| Text Generator | LLMJudge | Contains | Natural language |\n| Orchestrator | LLMJudgeTrajectory | JsonSimilarity | Multi-step flow |\n| API Client | JsonSimilarity | ExactMatch | Structured data |\n| Summarizer | LLMJudge | Contains | Semantic matching |\n", "references/lifecycle/evaluations/creating-evaluations.md": "# Creating Evaluations\n\nThis guide walks you through the process of creating comprehensive test cases for your UiPath agents.\n\n## Overview\n\nCreating evaluations involves defining test cases that validate your agent's behavior. Each evaluation set contains multiple test cases with inputs, expected outputs, and evaluation criteria.\n\n## Workflow\n\n### Phase 1: Setup Check\n\n> **Low-code agents:** Only `agent.json` and the `evaluations/` directory are needed. `uipath.json` and `entry-points.json` are not required for creating evaluations.\n\nBefore creating evaluations, ensure your project has the right files:\n\n**Coded agents:**\n- `uipath.json` - Project configuration\n- `entry-points.json` - Agent definitions with input/output schemas\n- `evaluations/` directory for test cases\n\nIf missing, create and initialise the agent first (`uip codedagent new` + `uip codedagent init`).\n\n**Low-code agents:**\n- `agent.json` - Agent definition (input/output schemas come from here)\n- `evaluations/` directory for test cases\n\n### Phase 2: Define Evaluation Details\n\nYou'll be asked for:\n\n- **Evaluation Set Name** - Identifier for this evaluation set\n- **Description** - What scenarios this covers\n- **Target Agent** - Which agent to test\n- **Number of Test Cases** - How many tests to create\n\n### Phase 3: Collect Test Cases\n\nFor each test case, you'll guide through:\n\n- **Inputs** - Based on agent's input schema with validation\n- **Expected Output** - What the agent should return\n- **Evaluation Criteria** - How to validate using available evaluators\n- **Test Metadata** - ID, name, and purpose\n\n## Test Metadata\n\nEach test case requires:\n\n- **id** - Unique identifier within the evaluation set\n- **name** - Human-readable description of what this test validates\n- **purpose** - What aspect of the agent is being tested\n\nGood naming examples:\n- `test-1-basic-addition` - Basic functionality test\n- `test-2-large-numbers` - Boundary value test\n- `test-3-negative-input` - Edge case test\n- `test-4-invalid-type` - Error handling test\n\n## Input Validation\n\nInputs are validated against your agent's input schema defined in `entry-points.json`:\n\n- Required fields must be provided\n- Values must match the expected types\n- Complex objects follow their schema definitions\n\n## Expected Output\n\nDefine what your agent should return:\n\n- For simple outputs: a string or number\n- For complex outputs: a JSON object matching your agent's output schema\n- Multiple output fields can be specified\n\n## Evaluation Criteria\n\nEach test case can use multiple evaluators. For each evaluator, provide:\n\n- **Evaluator ID** - Which evaluator to use (e.g., \"ExactMatchEvaluator\")\n- **Evaluation-specific criteria** - Parameters for that evaluator\n\nExamples:\n\n**For ExactMatchEvaluator:**\n```json\n\"expectedOutput\": {\n  \"result\": \"5.0\"\n}\n```\n\n**For ContainsEvaluator:**\n```json\n\"searchText\": \"success\"\n```\n\n**For JsonSimilarityEvaluator:**\n```json\n\"expectedOutput\": {\n  \"result\": 5.0,\n  \"status\": \"complete\"\n}\n```\n\n**For LLMJudgeTrajectoryEvaluator:**\n```json\n\"expectedAgentBehavior\": \"The agent should call the calculator tool once and return the result.\"\n```\n\n## Organizing Test Cases\n\nOrganize your test cases by scenario:\n\n### Happy Path Tests\n\nTests for normal operations with typical inputs:\n- Expected successful outcomes\n- Standard use cases\n- Typical input ranges\n\n### Edge Case Tests\n\nTests for boundary conditions and unusual inputs:\n- Boundary values (0, min, max)\n- Empty/null values\n- Large datasets\n- Special characters\n\n### Error Scenario Tests\n\nTests for invalid inputs and error handling:\n- Invalid input types\n- Missing required fields\n- Out-of-range values\n- Expected error messages\n\n## Best Practices for Test Cases\n\n- **Be Specific** - Use descriptive test names like \"test-large-json-output\"\n- **Test One Thing Per Case** - Separate tests for each distinct scenario\n- **Use Realistic Data** - Realistic inputs based on actual use cases\n- **Cover the Input Space** - Normal, boundary, error, and combination cases\n- **Validate Multiple Aspects** - Use multiple evaluators (output + structure + flow)\n\n## Mocking External Calls\n\n### Function Mocking\n\n> **Note:** Mockito mocking strategy is only available for coded (Python) agents.\n\nMock specific function calls with return values or exceptions:\n\n```json\n\"mockingStrategy\": {\n  \"type\": \"mockito\",\n  \"behaviors\": [\n    {\n      \"function\": \"external_api_call\",\n      \"arguments\": {\n        \"args\": [\"param1\"],\n        \"kwargs\": {\"key\": \"value\"}\n      },\n      \"then\": [\n        {\n          \"type\": \"return\",\n          \"value\": {\n            \"status\": \"success\",\n            \"data\": \"mocked-response\"\n          }\n        }\n      ]\n    }\n  ]\n}\n```\n\n**Mock Behavior Types:**\n- `type: \"return\"` - Return a value\n- `type: \"raise\"` - Throw an exception\n\n### LLM Call Mocking\n\nMock LLM interactions for testing without API calls:\n\n```json\n\"mockingStrategy\": {\n  \"type\": \"llm\",\n  \"prompt\": \"Test prompt describing the expected LLM behavior\",\n  \"toolsToSimulate\": [\n    {\n      \"name\": \"tool_name\"\n    }\n  ]\n}\n```\n\n", "references/lifecycle/evaluations/evaluation-sets.md": "# Evaluation Sets\n\nEvaluation sets define test cases and organize them with their evaluation criteria.\n\n## What is an Evaluation Set?\n\nAn evaluation set is a JSON file containing:\n\n- **Metadata** - Name, description, version information\n- **Evaluator References** - Which evaluators this set uses\n- **Test Cases** - Individual evaluations with inputs and criteria\n- **Optional Mocking** - Mock external calls for isolated testing\n\n## File Location\n\n```\nevaluations/eval-sets/\n```\n\n## Basic Schema\n\n```json\n{\n  \"version\": \"1.0\",\n  \"id\": \"my-eval-set\",\n  \"name\": \"My Evaluation Set\",\n  \"description\": \"Description of what this eval set tests\",\n  \"evaluatorRefs\": [\"EvaluatorId1\", \"EvaluatorId2\"],\n  \"evaluations\": [\n    {\n      \"id\": \"test-1\",\n      \"name\": \"Test case name\",\n      \"inputs\": {\n        \"param1\": \"value1\",\n        \"param2\": 42\n      },\n      \"evaluationCriterias\": {\n        \"EvaluatorId1\": {\n          // Evaluator-specific criteria\n        }\n      }\n    }\n  ]\n}\n```\n\n## Top-Level Fields\n\n| Field | Description |\n|-------|-------------|\n| `version` | Schema version. Currently: `\"1.0\"` |\n| `id` | Unique identifier (e.g., `\"happy-path\"`, `\"calculator-tests\"`) |\n| `name` | Human-readable name |\n| `description` | (Optional) Longer description |\n| `evaluatorRefs` | Array of evaluator IDs matching `id` in evaluator files |\n| `evaluations` | Array of test cases |\n\n## Test Case Structure\n\n```json\n{\n  \"id\": \"test-1-basic\",\n  \"name\": \"Basic test case\",\n  \"inputs\": {\n    \"param1\": \"value1\",\n    \"param2\": 42\n  },\n  \"evaluationCriterias\": {\n    \"ExactMatchEvaluator\": {\n      \"expectedOutput\": { \"result\": \"expected-value\" }\n    }\n  },\n  \"mockingStrategy\": {}\n}\n```\n\n### Test Case Fields\n\n- **id** - Unique within this eval set. Convention: `test-<number>-<scenario>`\n- **name** - Human-readable description\n- **inputs** - Must match the agent's input schema from `entry-points.json`\n\n  > **Low-code agents:** inputs must match `inputSchema` in `agent.json`.\n- **evaluationCriterias** - Map of evaluator ID to criteria for that evaluator\n- **mockingStrategy** - (Optional) Mock external calls\n\n### Evaluator-Specific Criteria\n\n**ExactMatchEvaluator:**\n```json\n\"ExactMatchEvaluator\": {\n  \"expectedOutput\": { \"result\": \"5.0\" }\n}\n```\n\n**ContainsEvaluator:**\n```json\n\"ContainsEvaluator\": {\n  \"searchText\": \"success\"\n}\n```\n\n**JsonSimilarityEvaluator:**\n```json\n\"JsonSimilarityEvaluator\": {\n  \"expectedOutput\": { \"result\": 5.0, \"status\": \"complete\" }\n}\n```\n\n**LLMJudgeTrajectoryEvaluator:**\n```json\n\"LLMJudgeTrajectoryEvaluator\": {\n  \"expectedAgentBehavior\": \"The agent should call the calculator tool once and return the sum.\"\n}\n```\n\n**LLMJudgeOutputEvaluator:**\n```json\n\"LLMJudgeOutputEvaluator\": {\n  \"expectedOutput\": { \"result\": \"A helpful response\" }\n}\n```\n\n## Mocking Strategies\n\n### Function Mocking (mockito)\n\n> **Note:** The `mockito` mocking strategy is only available for coded (Python) agents.\n\n```json\n\"mockingStrategy\": {\n  \"type\": \"mockito\",\n  \"behaviors\": [\n    {\n      \"function\": \"external_api_call\",\n      \"arguments\": {\n        \"args\": [\"param1\"],\n        \"kwargs\": {\"key\": \"value\"}\n      },\n      \"then\": [\n        {\n          \"type\": \"return\",\n          \"value\": { \"status\": \"success\", \"data\": \"mocked-response\" }\n        }\n      ]\n    }\n  ]\n}\n```\n\n**Mock Behavior Types:**\n- `type: \"return\"` - Return a value\n- `type: \"raise\"` - Throw an exception\n\n### LLM Call Mocking\n\n```json\n\"mockingStrategy\": {\n  \"type\": \"llm\",\n  \"prompt\": \"Test prompt describing the expected LLM behavior\",\n  \"toolsToSimulate\": [\n    { \"name\": \"tool_name\" }\n  ]\n}\n```\n\n## Complete Example\n\n```json\n{\n  \"version\": \"1.0\",\n  \"id\": \"calculator-basic\",\n  \"name\": \"Calculator Basic Tests\",\n  \"description\": \"Basic tests for calculator agent\",\n  \"evaluatorRefs\": [\"ExactMatchEvaluator\"],\n  \"evaluations\": [\n    {\n      \"id\": \"test-1-add\",\n      \"name\": \"Basic addition\",\n      \"inputs\": { \"num1\": 5, \"num2\": 3 },\n      \"evaluationCriterias\": {\n        \"ExactMatchEvaluator\": {\n          \"expectedOutput\": { \"result\": \"8\" }\n        }\n      }\n    },\n    {\n      \"id\": \"test-2-zero\",\n      \"name\": \"Edge case with zero\",\n      \"inputs\": { \"num1\": 0, \"num2\": 5 },\n      \"evaluationCriterias\": {\n        \"ExactMatchEvaluator\": {\n          \"expectedOutput\": { \"result\": \"5\" }\n        }\n      }\n    }\n  ]\n}\n```\n\n## Best Practices\n\n- **Use Descriptive IDs** - Make te
