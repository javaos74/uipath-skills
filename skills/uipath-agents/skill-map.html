st IDs self-documenting\n- **Group Related Tests** - Put similar tests in the same eval set\n- **Reuse Evaluators** - Create evaluator files once, reference in multiple eval sets\n- **Version Your Eval Sets** - Use semantic versioning as they evolve\n\n", "references/lifecycle/evaluations/evaluators.md": "# Evaluators Reference\n\n## Evaluator Selection Guide\n\n| Agent Type | Primary Evaluator | Secondary | Notes |\n|-----------|------------------|-----------|-------|\n| Calculator/Deterministic | Exact Match | - | Binary pass/fail |\n| Text/NLP | LLM Judge Output | Contains | Semantic matching |\n| Multi-step Orchestration | LLM Judge Trajectory | Tool Call Order | Execution path + tool validation |\n| API Integration | JSON Similarity | Exact Match | Structured data |\n| Classification | Binary/Multiclass Classification | - | Label validation |\n\nAll evaluators return scores: **1.0** (pass), **0.5-0.9** (partial), **0.0** (fail).\n\n## Evaluator File Structure\n\nEvery evaluator needs a JSON config in `evaluations/evaluators/`. All follow this structure:\n\n```json\n{\n  \"version\": \"1.0\",\n  \"id\": \"<EvaluatorId>\",\n  \"evaluatorTypeId\": \"<uipath-type-id>\",\n  \"description\": \"...\",\n  \"evaluatorConfig\": {\n    \"name\": \"<EvaluatorId>\",\n    \"defaultEvaluationCriteria\": { ... }\n  }\n}\n```\n\n---\n\n## Output-Based Evaluators\n\n### ExactMatchEvaluator (`uipath-exact-match`)\n\nStrict string comparison. Binary scoring (1.0 or 0.0).\n\n**Config:** `targetOutputKey` (default `\"*\"`), `ignoreCase` (default false), `negated` (default false)\n\n**Eval criteria:**\n```json\n\"ExactMatchEvaluator\": { \"expectedOutput\": { \"result\": \"8\" } }\n```\n\n**Use for:** Deterministic outputs, exact numbers. **Avoid for:** Natural language, floats.\n\n### ContainsEvaluator (`uipath-contains`)\n\nSubstring search. Binary scoring (1.0 or 0.0).\n\n**Config:** `targetOutputKey` (default `\"*\"`), `caseSensitive` (default false), `negated` (default false)\n\n**Eval criteria:**\n```json\n\"ContainsEvaluator\": { \"searchText\": \"success\" }\n```\n\n**Use for:** Keyword validation, required terms.\n\n### JsonSimilarityEvaluator (`uipath-json-similarity`)\n\nTree-based JSON comparison. Continuous scoring (0.0-1.0). Strings use Levenshtein distance, numbers ~1% tolerance. Missing keys penalized, extra keys ignored.\n\n**Eval criteria:**\n```json\n\"JsonSimilarityEvaluator\": { \"expectedOutput\": { \"result\": 5.0, \"status\": \"complete\" } }\n```\n\n**Use for:** Structured JSON output, API responses. **Avoid for:** Exact string matching.\n\n### LLMJudgeOutputEvaluator (`uipath-llm-judge-output-semantic-similarity`)\n\nLLM-powered semantic similarity. Continuous scoring (0.0-1.0). Accept 0.7+ as good match.\n\n**Config:** `model`, `temperature` (default 0), `maxTokens` (default 4096), `targetOutputKey`, `prompt` (optional, placeholders: `{{ExpectedOutput}}`, `{{ActualOutput}}`)\n\n**Eval criteria:**\n```json\n\"LLMJudgeOutputEvaluator\": { \"expectedOutput\": { \"summary\": \"A helpful response about the topic\" } }\n```\n\n**Use for:** Natural language, summaries. **Note:** Requires LLM API access.\n\n### LLMJudgeStrictJSONSimilarityOutputEvaluator (`uipath-llm-judge-output-strict-json-similarity`)\n\nPer-key JSON matching with LLM-powered penalty scoring. Continuous (0.0-1.0).\n\n**Eval criteria:**\n```json\n\"LLMJudgeStrictJSONSimilarityOutputEvaluator\": { \"expectedOutput\": { \"key1\": \"value1\" } }\n```\n\n**Use for:** Structured outputs where each field matters independently.\n\n---\n\n## Trajectory & Tool Call Evaluators\n\n### LLMJudgeTrajectoryEvaluator (`uipath-llm-judge-trajectory-similarity`)\n\nLLM-powered execution path analysis. Continuous scoring (0.0-1.0).\n\n**Config:** `model`, `temperature` (default 0), `prompt` (optional, placeholders: `{{AgentRunHistory}}`, `{{ExpectedAgentBehavior}}`, `{{UserOrSyntheticInput}}`)\n\n**Eval criteria:**\n```json\n\"LLMJudgeTrajectoryEvaluator\": {\n  \"expectedAgentBehavior\": \"The agent should call the calculator tool once with the correct arguments and return the sum.\"\n}\n```\n\n**Writing good behavior descriptions:** Be specific (\"Agent calls fetch_data, then transform_data in order\"), not vague (\"Agent should work correctly\").\n\n**Use for:** Multi-step agents, tool call validation. **Note:** Requires LLM API access.\n\n### LLMJudgeTrajectorySimulationEvaluator (`uipath-llm-judge-trajectory-simulation`)\n\nUses LLM simulation to evaluate agent trajectory. Continuous (0.0-1.0).\n\n**Eval criteria:**\n```json\n\"LLMJudgeTrajectorySimulationEvaluator\": {\n  \"expectedAgentBehavior\": \"The agent should search for the product, compare prices, and return the cheapest option.\"\n}\n```\n\n**Placeholders:** `{{ExpectedAgentBehavior}}`, `{{AgentRunHistory}}`, `{{UserOrSyntheticInput}}`, `{{SimulationInstructions}}`\n\n### ToolCallOrderEvaluator (`uipath-tool-call-order`)\n\nValidates tool call sequence.\n\n**Eval criteria:**\n```json\n\"ToolCallOrderEvaluator\": { \"toolCallsOrder\": [\"search_products\", \"compare_prices\", \"format_result\"] }\n```\n\n### ToolCallArgsEvaluator (`uipath-tool-call-args`)\n\nValidates arguments passed to tool calls.\n\n**Config:** `strict` (default false), `subset` (default false)\n\n**Eval criteria:**\n```json\n\"ToolCallArgsEvaluator\": {\n  \"toolCalls\": [{ \"name\": \"calculator\", \"arguments\": { \"a\": 5, \"b\": 3, \"operation\": \"add\" } }]\n}\n```\n\n### ToolCallCountEvaluator (`uipath-tool-call-count`)\n\nValidates tool call counts. Operators: `\"=\"`, `\">\"`, `\"<\"`, `\">=\"`, `\"<=\"`.\n\n**Eval criteria:**\n```json\n\"ToolCallCountEvaluator\": { \"toolCallsCount\": { \"search\": [\"=\", 1], \"format\": [\"=\", 2] } }\n```\n\n### ToolCallOutputEvaluator (`uipath-tool-call-output`)\n\nValidates tool call outputs.\n\n**Eval criteria:**\n```json\n\"ToolCallOutputEvaluator\": {\n  \"toolOutputs\": [{ \"name\": \"get_temperature\", \"output\": \"{\\\"temperature\\\": 25.0, \\\"unit\\\": \\\"fahrenheit\\\"}\" }]\n}\n```\n\n---\n\n## Classification Evaluators\n\n### BinaryClassificationEvaluator (`uipath-binary-classification`)\n\n**Config:** `classes` (string[]), `positiveClass` (string), `metricType` (`\"precision\"`, `\"recall\"`, `\"f-score\"`)\n\n**Eval criteria:**\n```json\n\"BinaryClassificationEvaluator\": { \"expectedClass\": \"positive\" }\n```\n\n### MulticlassClassificationEvaluator (`uipath-multiclass-classification`)\n\n**Config:** `classes` (string[]), `metricType` (`\"precision\"`, `\"recall\"`, `\"f-score\"`), `averaging` (`\"micro\"`, `\"macro\"`)\n\n**Eval criteria:**\n```json\n\"MulticlassClassificationEvaluator\": { \"expectedClass\": \"spam\" }\n```\n\n---\n\n## Custom Evaluators\n\n> **Note:** Custom Python evaluators are only available for coded agents.\n\nCreate custom Python evaluators in `evaluations/custom_evaluators/`:\n\n```python\nfrom uipath.eval.evaluators import BaseEvaluationCriteria, BaseEvaluatorConfig, BaseEvaluator\n\nclass MyEvaluationCriteria(BaseEvaluationCriteria):\n    my_field: str\n\nclass MyEvaluatorConfig(BaseEvaluatorConfig[MyEvaluationCriteria]):\n    name: str = \"MyCustomEvaluator\"\n\nclass MyCustomEvaluator(BaseEvaluator[MyEvaluationCriteria, MyEvaluatorConfig, ...]):\n    @classmethod\n    def get_evaluator_id(cls) -> str:\n        return \"MyCustomEvaluator\"\n\n    async def evaluate(self, agent_execution, evaluation_criteria) -> EvaluationResult:\n        pass\n```\n\nConfig JSON references the Python file: `\"evaluatorSchema\": \"file://my_evaluator.py:MyCustomEvaluator\"`\n\n---\n\n## Field Naming Convention\n\nJSON files use **camelCase**, Python uses **snake_case**. Key mappings: `expectedOutput`, `expectedAgentBehavior`, `searchText`, `targetOutputKey`, `defaultEvaluationCriteria`, `maxTokens`, `toolCallsCount`, `toolCallsOrder`, `expectedClass`, `positiveClass`.\n\n## Built-in evaluatorTypeId Values\n\n| evaluatorTypeId | Evaluator | Scoring |\n|----------------|-----------|---------|\n| `uipath-exact-match` | ExactMatchEvaluator | Binary (0/1) |\n| `uipath-contains` | ContainsEvaluator | Binary (0/1) |\n| `uipath-json-similarity` | JsonSimilarityEvaluator | Continuous (0-1) |\n| `uipath-llm-judge-output-semantic-similarity` | LLMJudgeOutputEvaluator | Continuous (0-1) |\n| `uipath-llm-judge-output-strict-json-similarity` | LLMJudgeStrictJSONSimilarityOutputEvaluator | Continuous (0-1) |\n| `uipath-llm-judge-trajectory-similarity` | LLMJudgeTrajectoryEvaluator | Continuous (0-1) |\n| `uipath-llm-judge-trajectory-simulation` | LLMJudgeTrajectorySimulationEvaluator | Continuous (0-1) |\n| `uipath-binary-classification` | BinaryClassificationEvaluator | Binary (0/1) |\n| `uipath-multiclass-classification` | MulticlassClassificationEvaluator | Continuous (0-1) |\n| `uipath-tool-call-order` | ToolCallOrderEvaluator | Binary/Fractional |\n| `uipath-tool-call-args` | ToolCallArgsEvaluator | Binary/Fractional |\n| `uipath-tool-call-count` | ToolCallCountEvaluator | Binary/Fractional |\n| `uipath-tool-call-output` | ToolCallOutputEvaluator | Binary/Fractional |\n", "references/lifecycle/evaluations/running-evaluations.md": "# Running Evaluations\n\nThis guide covers how to execute your evaluation sets and understand the results.\n\n## Running Evaluations\n\n### Command\n\n```bash\nuip codedagent eval <entrypoint> <eval-file> \\\n  --workers 4 \\\n  --no-report \\\n  --output-file eval-results.json\n```\n\n**Low-code agent:**\n```bash\nuip codedagent eval agent.json <eval-file> \\\n  --workers 4 \\\n  --no-report \\\n  --output-file eval-results.json\n```\n\n**Parameters:**\n- `<entrypoint>` - Agent entry point name from `entry-points.json` (coded agents) or `agent.json` (low-code agents)\n- `<eval-file>` - Path to evaluation set file\n- `--workers` - Number of parallel workers (1-8)\n- `--no-report` - Don't report to UiPath Cloud\n- `--output-file` - Save results to JSON file\n- `--mocker-cache` - Cache LLM responses for reproducibility\n\n### Evaluation Discovery\n\nThe system scans for evaluation sets in:\n\n```\nevaluations/eval-sets/*.json\n```\n\n## Understanding Results\n\n### Numeric Scores\n\nAll evaluators return scores:\n\n- **1.0** - Perfect pass (evaluator criteria fully met)\n- **0.5-0.9** - Partial success (similarity-based evaluators show partial match)\n- **0.0** - Complete failure (evaluator criteria not met)\n\n### Score Interpretation\n\n**For ExactMatchEvaluator & ContainsEvaluator:**\n- 1.0 - Requirement met\n- 0.0 - Requirement not met\n\n**For Similarity-Based Evaluators (JSON, LLM Judge, Trajectory):**\n- 1.0 - Perfect match\n- 0.9-0.5 - Good match with minor differences\n- 0.4-0.1 - Weak match with significant differences\n- 0.0 - No match\n\n### Example Detailed Result\n\n```json\n{\n  \"testId\": \"test-1-basic\",\n  \"testName\": \"Basic addition test\",\n  \"status\": \"PASSED\",\n  \"input\": { \"num1\": 5, \"num2\": 3 },\n  \"expectedOutput\": { \"result\": 8 },\n  \"actualOutput\": { \"result\": 8 },\n  \"evaluationResults\": [\n    {\n      \"evaluatorId\": \"ExactMatchEvaluator\",\n      \"score\": 1.0,\n      \"status\": \"PASSED\",\n      \"justification\": \"Output exactly matches expected value\"\n    }\n  ]\n}\n```\n\n## Pass vs Fail\n\nA test passes if:\n- All required evaluators produce their expected scores\n- Output matches criteria for pass-fail evaluators (ExactMatch, Contains)\n- Similarity scores are above your acceptance threshold\n\nA test fails if:\n- Any evaluator criteria are not met\n- Similarity scores are below acceptable thresholds\n\n## Performance Optimization\n\n### Using Parallel Workers\n\n```bash\nuip codedagent eval <entrypoint> <eval-file> --workers 8\n```\n\n**Worker count recommendations:**\n- `1` - Sequential, useful for debugging\n- `4` - Default, good balance\n- `8` - Maximum, for large evaluation sets\n\n### Caching LLM Responses\n\nFor evaluators using LLMs (LLMJudge, Trajectory), enable mocker cache:\n\n```bash\nuip codedagent eval <entrypoint> <eval-file> --mocker-cache\n```\n\nBenefits: Faster re-runs, reproducible results, lower API costs.\n\n## Integration with UiPath Cloud\n\nTo report evaluation results to Studio Web for visualization and tracking, use `--report`. This requires authentication and `UIPATH_PROJECT_ID` set in `.env` (obtained by pushing the agent to Studio Web via `uip codedagent push`).\n\n```bash\nuip codedagent eval <entrypoint> <eval-file> --report --workers 4\n```\n\nFor local-only evaluations (no cloud connection needed), use `--no-report`:\n\n```bash\nuip codedagent eval <entrypoint> <eval-file> --no-report --workers 4\n```\n\n## Troubleshooting\n\n### All Tests Fail\n- Verify agent is working correctly with `uip codedagent run`\n- Check evaluation set references correct agent\n- Ensure evaluator files exist and are valid\n- Review agent input/output schemas\n\n### Performance Issues\n- Reduce number of workers if hitting rate limits\n- Enable mocker cache for LLM evaluators\n- Run subset of tests first to debug\n\n### LLM Evaluator Issues\n- Verify API credentials are configured\n- Check model name is valid\n- Enable cache to reduce API calls\n\n", "references/lowcode/agent-json-reference.md": "# `agent.json` File Format Reference\n\n> **Agent type: Low-code agents only.** Coded agents define their schema in Python (`Input`/`Output` Pydantic models or `StartEvent`/`StopEvent` subclasses) \u2014 see the framework guides in [references/frameworks/](../frameworks/).\n>\n> **Audience:** AI coding assistants (e.g., Claude Code) that create or edit UiPath low-code agent definition files.\n> **Source of truth:** Real `agent.json` files from UiPath Studio projects.\n\n---\n\n## Overview\n\n`agent.json` is the declarative definition file for a UiPath low-code agent. It describes:\n\n- The agent's identity and version metadata\n- The LLM prompt (system + user messages, with optional variable interpolation)\n- Input and output data schemas\n- LLM model settings and runtime engine\n- Resources the agent can use (tools, context sources, HITL escalations, MCP servers, other agents)\n- Guardrails (content moderation, PII detection, injection prevention)\n\nEvery agent project has exactly one `agent.json` at its root.\n\n---\n\n## Top-Level Structure\n\n```json\n{\n  \"id\": \"<uuid>\",\n  \"version\": \"1.1.0\",\n  \"name\": \"My Agent\",\n  \"metadata\": { ... },\n  \"messages\": [ ... ],\n  \"inputSchema\": { ... },\n  \"outputSchema\": { ... },\n  \"settings\": { ... },\n  \"resources\": [ ... ],\n  \"features\": [],\n  \"guardrails\": [ ... ]\n}\n```\n\n### Top-Level Fields\n\n| Field | Type | Required | Description |\n|---|---|---|---|\n| `id` | `string` (UUID) | No | Stable unique identifier for the agent. Omit when creating new files; UiPath Studio assigns it. |\n| `version` | `string` | **Yes** | Schema version. Use `\"1.1.0\"` for all new agents. `\"1.0.0\"` is a legacy schema used by older Studio projects. |\n| `name` | `string` | Recommended | Human-readable display name shown in Studio Web and traces. Defaults to the project folder name if omitted. |\n| `metadata` | `object` | **Yes** | Runtime and storage metadata (see [Metadata](#metadata)). |\n| `messages` | `array` | **Yes** | Exactly two prompt messages: one `system` and one `user` (see [Messages](#messages)). |\n| `inputSchema` | `object` | **Yes** | JSON Schema describing the agent's input variables (see [Schemas](#inputschema-and-outputschema)). |\n| `outputSchema` | `object` | **Yes** | JSON Schema describing the agent's output variables (see [Schemas](#inputschema-and-outputschema)). |\n| `settings` | `object` | **Yes** | LLM model and runtime engine configuration (see [Settings](#settings)). |\n| `resources` | `array` | No | Tools, context sources, escalations, and integrations available to the agent (see [Resources](#resources)). Omit or use `[]` when none. |\n| `features` | `array` | No | Feature flags. Currently always `[]`; include it for forward compatibility. |\n| `guardrails` | `array` | No | Content moderation and safety policies (see [Guardrails](#guardrails)). Omit or use `[]` when none. |\n\n---\n\n## Metadata\n\n```json\n\"metadata\": {\n  \"storageVersion\": \"44.0.0\",\n  \"isConversational\": false\n}\n```\n\n| Field | Type | Required | Description |\n|---|---|---|---|\n| `storageVersion` | `string` | **Yes** | Internal storage format version used by UiPath Studio. Use `\"44.0.0\"` for current Studio Web projects (older projects may use `\"31.0.0\"`). |\n| `isConversational` | `boolean` | **Yes** | `true` for conversational agents (multi-turn dialogue); `false` for single-turn / task agents. Must be consistent with `settings.engine`. |\n| `targetRuntime` | `string` | No | Set to `\"pythonAgent\"` by Studio Web. Optional for hand-crafted files. |\n| `showProjectCreationExperience` | `boolean` | No | Studio Web UI hint. Optional; omit for hand-crafted files. |\n\n---\n\n## Messages\n\nThe `messages` array must contain **exactly two** entries, in this order:\n\n1. A **system** message \u2014 sets the agent's persona, role, and global instructions.\n2. A **user** message \u2014 the task prompt sent at runtime, typically containing variable references.\n\n### Message Object Structure\n\n```json\n{\n  \"role\": \"system\" | \"user\",\n  \"content\": \"Plain text with optional {{variable}} placeholders\",\n  \"contentTokens\": [ ... ]\n}\n```\n\n| Field | Type | Required | Description |\n|---|---|---|---|\n| `role` | `string` | **Yes** | `\"system\"` or `\"user\"`. |\n| `content` | `string` | **Yes** | The prompt text. May use `{{variableName}}` legacy interpolation syntax for input variables. |\n| `contentTokens` | `array` | No | Structured token representation of `content`. Required by Studio; always include it when creating files programmatically (see [Content Tokens](#content-tokens)). |\n\n### Content Tokens\n\n`contentTokens` breaks the `content` string into typed segments. Studio uses this for visual editing; it must stay in sync with `content`.\n\n#### Token Types\n\n| `type` | Description | Key field |\n|---|---|---|\n| `simpleText` | A literal text segment. | `rawString` \u2014 the literal text. |\n| `variable` | A reference to an input variable. | `rawString` \u2014 `\"input.<variableName>\"`. |\n| `expression` | A computed expression. | `rawString` \u2014 the expression source. |\n\n#### Example \u2014 User message with three input variables\n\n```json\n{\n  \"role\": \"user\",\n  \"content\": \"Calculate: {{a}} {{operator}} {{b}}\",\n  \"contentTokens\": [\n    { \"type\": \"simpleText\",  \"rawString\": \"Calculate: \" },\n    { \"type\": \"variable\",    \"rawString\": \"input.a\" },\n    { \"type\": \"simpleText\",  \"rawString\": \" \" },\n    { \"type\": \"variable\",    \"rawString\": \"input.operator\" },\n    { \"type\": \"simpleText\",  \"rawString\": \" \" },\n    { \"type\": \"variable\",    \"rawString\": \"input.b\" }\n  ]\n}\n```\n\n> **Rule:** Every `{{variableName}}` in `content` must map to a `variable` token with `rawString: \"input.<variableName>\"`. Surrounding literal text becomes `simpleText` tokens. The concatenation of all `rawString` values (substituting variable names with their `{{}}` form) must reproduce `content` exactly.\n\n> **Studio Web convention:** Studio Web appends an empty trailing `{\"type\": \"simpleText\", \"rawString\": \"\"}` token to messages containing variables. This is harmless \u2014 include or omit it freely.\n\n---\n\n## `inputSchema` and `outputSchema`\n\nBoth fields follow [JSON Schema draft-07](https://json-schema.org/draft-07/json-schema-release-notes.html) with `type: \"object\"` at the root.\n\n```json\n\"inputSchema\": {\n  \"type\": \"object\",\n  \"properties\": {\n    \"a\":        { \"type\": \"number\" },\n    \"b\":        { \"type\": \"number\" },\n    \"operator\": { \"type\": \"string\" }\n  },\n  \"required\": [\"a\", \"b\", \"operator\"]\n},\n\"outputSchema\": {\n  \"type\": \"object\",\n  \"properties\": {\n    \"result\": { \"type\": \"number\" }\n  }\n}\n```\n\n### Supported JSON Schema Property Types\n\n| JSON Schema type | Use for |\n|---|---|\n| `\"string\"` | Text values |\n| `\"number\"` | Integers and floats |\n| `\"boolean\"` | True/false flags |\n| `\"array\"` | Lists (add `\"items\": { ... }` to define element type) |\n| `\"object\"` | Nested structures (add nested `\"properties\"`) |\n\n### Rules\n\n- Always set `\"type\": \"object\"` at the root level of both schemas.\n- List all mandatory input variables in `\"required\"`.\n- `outputSchema` rarely needs `\"required\"` \u2014 the LLM may not always produce every field.\n- Variables declared in `inputSchema.properties` are what you reference as `{{variableName}}` in `messages[].content`.\n\n---\n\n## Settings\n\n```json\n\"settings\": {\n  \"model\":         \"gpt-4.1-2025-04-14\",\n  \"maxTokens\":     16384,\n  \"temperature\":   0,\n  \"engine\":        \"basic-v2\",\n  \"maxIterations\": 25\n}\n```\n\n| Field | Type | Required | Description |\n|---|---|---|---|\n| `model` | `string` | **Yes** | The LLM model identifier (see [Supported Models](#supported-models)). |\n| `maxTokens` | `integer` | **Yes** | Maximum tokens for the LLM response. Typical values: `4096`, `8192`, `16384`, `32768`. |\n| `temperature` | `number` | **Yes** | Sampling temperature. Range `0`\u2013`1`. Use `0` for deterministic/task agents; `0.7`\u2013`1` for creative/conversational agents. |\n| `engine` | `string` | **Yes** | Agent runtime engine (see [Engine Values](#engine-values)). |\n| `maxIterations` | `integer` | No | Maximum tool-call iterations before the agent stops. Default: `25`. Increase only for complex multi-step workflows. |\n| `byomProperties` | `object` | No | Bring-Your-Own-Model properties for custom model endpoints (see [BYOM](#byom-properties)). |\n\n### Engine Values\n\n| Value | Description |\n|---|---|\n| `\"basic-v2\"` | Standard single-turn agent. Use for most non-conversational agents. (**Preferred**) |\n| `\"basic-v1\"` | Legacy single-turn engine. Use only when targeting older deployments. |\n| `\"conversational-v1\"` | Multi-turn conversational agent. Requires `metadata.isConversational: true`. |\n\n### Supported Models\n\nUse the exact model string as shown. UiPath routes the call to the appropriate provider.\n\n| Model string | Provider |\n|---|---|\n| `\"gpt-4.1-2025-04-14\"` | OpenAI |\n| `\"gpt-4o-2024-11-20\"` | OpenAI |\n| `\"anthropic.claude-sonnet-4-20250514-v1:0\"` | Anthropic (via AWS Bedrock) |\n| `\"gemini-2.5-pro\"` | Google |\n\n> Any model string supported by the UiPath AI Gateway can be used. Match the string exactly as provided by the platform or user.\n\n### BYOM Properties\n\nUsed when the agent connects to a custom or self-hosted model endpoint.\n\n```json\n\"byomProperties\": {\n  \"endpointUrl\": \"https://my-llm.example.com/v1/chat\",\n  \"modelAlias\":  \"my-custom-model\"\n}\n```\n\nInclude `byomProperties` only when explicitly required; omit it for standard platform models.\n\n---\n\n## Resources\n\n`resources` is an array of objects, each representing a capability the agent can invoke at runtime. Each resource has a `$resourceType` discriminator field.\n\n```json\n\"resources\": [\n  { \"$resourceType\": \"tool\",       ... },\n  { \"$resourceType\": \"context\",    ... },\n  { \"$resourceType\": \"escalation\", ... },\n  { \"$resourceType\": \"mcp\",        ... },\n  { \"$resourceType\": \"a2a\",        ... }\n]\n```\n\nUse `\"resources\": []` (or omit the field) when the agent needs no external capabilities.\n\n---\n\n### Resource Type: `tool`\n\nExposes a UiPath process, API workflow, or integration as a callable function to the agent.\n\n```json\n{\n  \"$resourceType\": \"tool\",\n  \"name\":        \"API Workflow\",\n  \"type\":        \"api\",\n  \"location\":    \"solution\",\n  \"isEnabled\":   true,\n  \"inputSchema\": {\n    \"type\": \"object\",\n    \"properties\": {\n      \"number1\": { \"type\": \"number\" },\n      \"number2\": { \"type\": \"number\" }\n    },\n    \"required\": [\"number1\", \"number2\"]\n  },\n  \"outputSchema\": {\n    \"type\": \"object\",\n    \"properties\": {\n      \"result\": { \"type\": \"number\" }\n    }\n  },\n  \"properties\": {\n    \"folderPath\":  \"solution_folder\",\n    \"processName\": \"API Workflow\"\n  },\n  \"guardrail\":           { \"policies\": [] },\n  \"settings\":            {},\n  \"argumentProperties\":  {}\n}\n```\n\n#### Tool Fields\n\n| Field | Type | Required | Description |\n|---|---|---|---|\n| `$resourceType` | `\"tool\"` | **Yes** | Discriminator. |\n| `name` | `string` | **Yes** | Display name shown to the LLM as the tool's function name. |\n| `type` | `string` | **Yes** | Tool subtype (see [Tool Subtypes](#tool-subtypes)). |\n| `location` | `string` | No | Where the tool is located. `\"solution\"` for same-solution workflows; may also be `\"tenant\"` or a folder path. |\n| `isEnabled` | `boolean` | **Yes** | Whether the tool is active. Set to `true` to enable; `false` to disable without removing. |\n| `inputSchema` | `object` | **Yes** | JSON Schema for the arguments the agent passes to the tool. |\n| `outputSchema` | `object` | **Yes** | JSON Schema for the values the tool returns to the agent. |\n| `properties` | `object` | **Yes** | Runtime routing properties (see [Tool Properties](#tool-properties)). |\n| `guardrail` | `object` | No | Per-tool guardrail policies. Use `{ \"policies\": [] }` for none. |\n| `settings` | `object` | No | Additional tool-level settings. Use `{}` unless needed. |\n| `argumentProperties` | `object` | No | Metadata overrides for individual arguments. Use `{}` unless needed. |\n\n#### Tool Subtypes\n\n| `type` value | Invokes |\n|---|---|\n| `\"api\"` | An API workflow in the same solution or a UiPath process exposed via API trigger. |\n| `\"process\"` | A UiPath automation process (job). |\n| `\"agent\"` | Another UiPath agent (sub-agent invocation \u2014 use `\"a2a\"` resource type for cross-tenant). |\n| `\"integration\"` | A UiPath Integration Service connector action. |\n| `\"internal\"` | An internal platform function. |\n| `\"ixp\"` | An IXP (Integration eXperience Platform) workflow. |\n\n#### Tool Properties\n\n| Property | Description |\n|---|---|\n| `folderPath` | Orchestrator folder containing the process/workflow. Use `\"solution_folder\"` for co-located solution items. |\n| `processName` | Exact name of the process or workflow in Orchestrator. |\n\n---\n\n### Resource Type: `context`\n\nProvides the agent with read access to a knowledge source (document index, file attachments, or Data Fabric entities).\n\n```json\n{\n  \"$resourceType\": \"context\",\n  \"name\": \"Product Knowledge Base\",\n  \"description\": \"Search product documentation for relevant information.\",\n  \"contextType\": \"index\",\n  \"folderPath\": \"MyFolder\",\n  \"indexName\": \"products-index\",\n  \"settings\": {\n    \"resultCount\": 5,\n    \"retrievalMode\": \"Semantic\",\n    \"threshold\": 0.7,\n    \"query\": { \"variant\": \"dynamic\" }\n  }\n}\n```\n\n#### Context Fields\n\n| Field | Type | Required | Description |\n|---|---|---|---|\n| `$resourceType` | `\"context\"` | **Yes** | Discriminator. |\n| `name` | `string` | **Yes** | Display name for the knowledge source. |\n| `contextType` | `string` | No | Context subtype: `\"index\"`, `\"attachments\"`, or `\"datafabricentityset\"`. |\n| `folderPath` | `string` | No | Orchestrator folder containing the index. |\n| `indexName` | `string` | No | Name of the Context Grounding index (when `contextType` is `\"index\"`). |\n| `settings.resultCount` | `integer` | No | Number of results to retrieve (default varies). |\n| `settings.retrievalMode` | `string` | No | How documents are retrieved (see [Retrieval Modes](#retrieval-modes)). |\n| `settings.threshold` | `float` | No | Minimum similarity score (0\u20131, default `0`). |\n| `settings.query.variant` | `string` | No | Query strategy. Use `\"dynamic\"` for agent-determined queries. |\n| `description` | `string` | No | Explains to the LLM what this knowledge source contains and when to query it. Write as a directive to the model, e.g. *\"Search this whenever the user asks about product specs or pricing.\"* |\n| `isEnabled` | `boolean` | No | Whether this context resource is active. Defaults to `true`. Set to `false` to temporarily disable without removing it. |\n\n#### Retrieval Modes\n\n| Value | Description |\n|---|---|\n| `\"Semantic\"` | Vector similarity search. Best for natural language Q&A. |\n| `\"Structured\"` | Keyword / structured query. Best for exact lookups. |\n| `\"DeepRAG\"` | Multi-hop retrieval with reasoning. Best for complex questions. |\n| `\"BatchTransform\"` | Bulk document processing. |\n| `\"DataFabric\"` | Used when `contextType` is `\"datafabricentityset\"`. |\n\n---\n\n### Resource Type: `escalation`\n\nPauses the agent and routes a Human-in-the-Loop (HITL) task to Action Center for human review or decision-making.\n\n```json\n{\n  \"$resourceType\": \"escalation\",\n  \"name\":                   \"color\",\n  \"description\":            \"Ask color confirmation\",\n  \"isAgentMemoryEnabled\":   false,\n  \"escalationType\":         0,\n  \"channels\": [\n    {\n      \"name\": \"Channel\",\n      \"type\": \"actionCenter\",\n      \"inputSchema\": {\n        \"type\": \"object\",\n        \"properties\": {\n          \"Content\": { \"type\": \"string\" },\n          \"Comment\": { \"type\": \"string\" }\n        }\n      },\n      \"outputSchema\": {\n        \"type\": \"object\",\n        \"properties\": {\n          \"Comment\": { \"type\": \"string\" }\n        }\n      },\n      \"outcomeMapping\": {\n        \"approve\": \"continue\",\n        \"reject\":  \"continue\"\n      },\n      \"recipients\": [\n        {\n          \"type\":        1,\n          \"value\":       \"<user-or-group-id>\",\n          \"displayName\": \"Team\"\n        }\n      ],\n      \"properties\": {\n        \"appName\":                    \"HITL App\",\n        \"appVersion\":                 1,\n        \"resourceKey\":                \"<uuid>\",\n        \"isActionableMessageEnabled\": false\n      }\n    }\n  ]\n}\n```\n\n#### Escalation Fields\n\n| Field | Type | Required | Description |\n|---|---|---|---|\n| `$resourceType` | `\"escalation\"` | **Yes** | Discriminator. |\n| `name` | `string` | **Yes** | Identifier used by the agent when invoking this escalation. |\n| `description` | `string` | No | Human-readable description of when/why to escalate. Shown to the LLM. |\n| `isAgentMemoryEnabled` | `boolean` | No | Whether the agent retains context across the escalation pause. Default: `false`. |\n| `escalationType` | `integer` | No | Escalation variant. `0` = standard Action Center task. |\n| `channels` | `array` | **Yes** | One or more delivery channels for the HITL task (see [Channel Object](#channel-object)). |\n\n#### Channel Object\n\n| Field | Type | Description |\n|---|---|---|\n| `name` | `string` | Channel display name. |\n| `description` | `string` | Human-readable description of what this escalation channel does and when it is triggered. |\n| `type` | `string` | Channel type. Currently `\"actionCenter\"`. |\n| `inputSchema` | `object` | JSON Schema for data sent to the human reviewer. |\n| `outputSchema` | `object` | JSON Schema for data returned by the human reviewer. |\n| `outcomeMapping` | `object` | Maps human decisions (`\"approve\"`, `\"reject\"`) to agent actions (`\"continue\"`, `\"abort\"`). |\n| `recipients` | `array` | List of recipient objects (`type`, `value`, `displayName`). `type: 1` = user; `type: 2` = group; `type: 3` = user email. |\n| `properties` | `object` | Action Center app binding: `appName`, `appVersion`, `resourceKey` (UUID), `isActionableMessageEnabled`. |\n\n---\n\n### Resource Type: `mcp`\n\nConnects the agent to an external Model Context Protocol (MCP) server, exposing its tools.\n\n```json\n{\n  \"$resourceType\": \"mcp\",\n  \"name\":          \"My MCP Server\",\n  \"description\":   \"Provides weather and location tools via MCP.\",\n  \"isEnabled\":     true,\n  \"folderPath\":    \"MyFolder\",\n  \"slug\":          \"my-mcp-server\",\n  \"availableTools\": [\n    {\n      \"name\":        \"get_weather\",\n      \"description\": \"Returns current weather for a location.\",\n      \"inputSchema\":  { \"type\": \"object\", \"properties\": { \"location\": { \"type\": \"string\" } } },\n      \"outputSchema\": { \"type\": \"object\", \"properties\": { \"temperature\": { \"type\": \"number\" } } }\n    }\n  ],\n  \"dynamicTools\": \"none\"\n}\n```\n\n| Field | Type | Description |\n|---|---|---|\n| `$resourceType` | `\"mcp\"` | Discriminator. |\n| `name` | `string` | Display name for the MCP server. |\n| `description` | `string` | Human-readable description shown to the LLM. |\n| `isEnabled` | `boolean` | Enables or disables the MCP connection. |\n| `folderPath` | `string` | Orchestrator folder containing the MCP server registration. |\n| `slug` | `string` | URL-safe identifier for the MCP server. |\n| `availableTools` | `array` | List of tools exposed by this MCP server. Each entry has `name`, `description`, `inputSchema`, and `outputSchema`. |\n| `dynamicTools` | `string` | Controls runtime tool discovery: `\"none\"` (static list only), `\"schema\"` (fetch schemas at runtime), `\"all\"` (discover all tools at runtime). |\n\n---\n\n### Resource Type: `a2a`\n\nInvokes another UiPath agent as a sub-agent (Agent-to-Agent). Use instead of `tool` type `\"agent\"` for cross-solution or cross-tenant agent calls.\n\n```json\n{\n  \"$resourceType\":   \"a2a\",\n  \"name\":            \"Summarizer Agent\",\n  \"description\":     \"Summarizes long documents into concise paragraphs.\",\n  \"isEnabled\":       true,\n  \"id\":              \"<target-agent-uuid>\",\n  \"slug\":            \"summarizer-agent\",\n  \"agentCardUrl\":    \"https://platform.uipath.com/agents/summarizer-agent/card\",\n  \"isActive\":        true,\n  \"cachedAgentCard\": {}\n}\n```\n\n| Field | Type | Description |\n|---|---|---|\n| `$resourceType` | `\"a2a\"` | Discriminator. |\n| `name` | `string` | Display name for the target agent. |\n| `description` | `string` | Human-readable description shown to the LLM. |\n| `isEnabled` | `boolean` | Enables or disables this A2A connection. |\n| `id` | `string` (UUID) | Stable identifier of the target agent. Omit when creating manually; Studio assigns it. |\n| `slug` | `string` | URL-safe identifier for the target agent. |\n| `agentCardUrl` | `string` | URL to the agent's A2A card descriptor (capabilities, schemas). |\n| `isActive` | `boolean` | Whether the target agent is currently active and reachable. |\n| `cachedAgentCard` | `object` | Cached copy of the agent card fetched from `agentCardUrl`. Use `{}` if not yet populated. |\n\n---\n\n## Guardrails\n\nGuardrails are content-moderation and safety policies applied to LLM inputs and/or outputs. Defined at the top level of `agent.json` (not inside a resource).\n\n```json\n\"guardrails\": [\n  { ... },\n  { ... }\n]\n```\n\nEach guardrail has a `$guardrailType` discriminator: `\"builtInValidator\"` or `\"custom\"`.\n\n---\n\n### Guardrail Type: `builtInValidator`\n\nUses a platform-provided ML validator.\n\n```json\n{\n  \"name\":            \"PII Detection\",\n  \"$guardrailType\":  \"builtInValidator\",\n  \"validatorType\":   \"pii_detection\",\n  \"action\": {\n    \"$actionType\":   \"log\",\n    \"severityLevel\": \"Warning\"\n  },\n  \"selector\": {\n    \"scopes\": [\"Agent\", \"Llm\"]\n  },\n  \"validatorParameters\": [\n    {\n      \"$parameterType\": \"enum-list\",\n      \"id\":             \"entities\",\n      \"value\":          [\"Email\", \"Address\", \"PhoneNumber\", \"Person\"]\n    },\n    {\n      \"$parameterType\": \"map-enum\",\n      \"id\":             \"entityThresholds\",\n      \"value\": {\n        \"Email\":   0.5,\n        \"Address\": 0.7\n      }\n    }\n  ]\n}\n```\n\n#### Built-In Validator Fields\n\n| Field | Type | Required | Description |\n|---|---|---|---|\n| `name` | `string` | **Yes** | Display name for the guardrail rule. |\n| `$guardrailType` | `\"builtInValidator\"` | **Yes** | Discriminator. |\n| `validatorType` | `string` | **Yes** | Which built-in validator to use (see [Validator Types](#validator-types)). |\n| `action` | `object` | **Yes** | What to do when the validator triggers (see [Guardrail Actions](#guardrail-actions)). |\n| `selector` | `object` | **Yes** | Where to apply the guardrail \u2014 `scopes` array (see [Scopes](#scopes)). |\n| `validatorParameters` | `array` | No | Typed parameter objects that configure the validator (see [Validator Parameters](#validator-parameters)). |\n\n> **Additional fields from Studio Web:** Studio-generated guardrails may include `id` (UUID, auto-assigned), `description` (human-readable explanation), and `enabledForEvals` (boolean, default `true` \u2014 controls whether the guardrail runs during evaluations). These are optional when creating files manually.\n\n#### Validator Types\n\n| `validatorType` | Description |\n|---|---|\n| `\"pii_detection\"` | Detects Personally Identifiable Information (names, emails, phone numbers, addresses, etc.). |\n| `\"prompt_injection\"` | Detects prompt injection attacks in user inputs. |\n\n#### Scopes\n\n| Scope | Description |\n|---|---|\n| `\"Agent\"` | Applied to the agent's own outputs / reasoning. |\n| `\"Llm\"` | Applied to LLM inputs and outputs. |\n| `\"Tool\"` | Applied to tool call arguments and results. |\n\n#### Guardrail Actions\n\n| `$actionType` | Description | Extra fields |\n|---|---|---|\n| `\"log\"` | Record a log entry but allow execution to continue. | `severityLevel`: `\"Info\"`, `\"Warning\"`, or `\"Error\"`. |\n| `\"block\"` | Halts execution with an error. **Requires `\"reason\": \"string\"`.** | `reason`: string explaining why execution was blocked. |\n| `\"filter\"` | Remove or redact the offending content and continue. | \u2014 |\n| `\"escalate\"` | Route the event to an escalation channel. | `escalationName`: name of the escalation resource to invoke. |\n\n#### Validator Parameters\n\nEach entry in `validatorParameters` is a typed object:\n\n| `$parameterType` | `id` (for `pii_detection`) | `value` type | Description |\n|---|---|---|---|\n| `\"enum-list\"` | `\"entities\"` | `string[]` | List of PII entity types to detect: `\"Email\"`, `\"Address\"`, `\"PhoneNumber\"`, `\"Person\"`, `\"Organization\"`, `\"CreditCardNumber\"`, etc. |\n| `\"map-enum\"` | `\"entityThresholds\"` | `{ [entity]: number }` | Confidence threshold (0\u20131) per entity type. Detections below this score are ignored. |\n| `\"number\"` | `\"threshold\"` | `number` | Single numeric threshold (used by `prompt_injection`). |\n| `\"boolean\"` | `\"<flag-id>\"` | `boolean` | A true/false configuration flag. |\n| `\"string\"` | `\"<string-id>\"` | `string` | A free-text configuration value. |\n\n---\n\n### Guardrail Type: `custom`\n\nDefines a rule using simple value comparisons (no ML model required).\n\n```json\n{\n  \"name\":           \"Block empty output\",\n  \"$guardrailType\": \"custom\",\n  \"action\": {\n    \"$actionType\": \"block\",\n    \"reason\": \"Output must not be empty.\"\n  },\n  \"selector\": {\n    \"scopes\": [\"Agent\"]\n  },\n  \"rules\": [\n    {\n      \"field\":    \"output.result\",\n      \"operator\": \"equals\",\n      \"value\":    \"\"\n    }\n  ]\n}\n```\n\nCustom guardrail `rules` entries support `\"equals\"`, `\"notEquals\"`, `\"contains\"`, `\"greaterThan\"`, `\"lessThan\"` operators on string, number, and boolean fields.\n\n---\n\n## Complete Minimal Example\n\nA task agent with two numeric inputs and one numeric output, no resources, no guardrails:\n\n```json\n{\n  \"version\": \"1.0.0\",\n  \"name\": \"Calculator Agent\",\n  \"metadata\": {\n    \"storageVersion\": \"44.0.0\",\n    \"isConversational\": false\n  },\n  \"messages\": [\n    {\n      \"role\": \"system\",\n      \"content\": \"You are a calculator agent. Perform arithmetic operations precisely.\",\n      \"contentTokens\": [\n        { \"type\": \"simpleText\", \"rawString\": \"You are a calculator agent. Perform arithmetic operations precisely.\" }\n      ]\n    },\n    {\n      \"role\": \"user\",\n      \"content\": \"Calculate: {{a}} {{operator}} {{b}}\",\n      \"contentTokens\": [\n        { \"type\": \"simpleText\", \"rawString\": \"Calculate: \" },\n        { \"type\": \"variable\",   \"rawString\": \"input.a\" },\n        { \"type\": \"simpleText\", \"rawString\": \" \" },\n        { \"type\": \"variable\",   \"rawString\": \"input.operator\" },\n        { \"type\": \"simpleText\", \"rawString\": \" \" },\n        { \"type\": \"variable\",   \"rawString\": \"input.b\" }\n      ]\n    }\n  ],\n  \"inputSchema\": {\n    \"type\": \"object\",\n    \"properties\": {\n      \"a\":        { \"type\": \"number\" },\n      \"b\":        { \"type\": \"number\" },\n      \"operator\": { \"type\": \"string\" }\n    },\n    \"required\": [\"a\", \"b\", \"operator\"]\n  },\n  \"outputSchema\": {\n    \"type\": \"object\",\n    \"properties\": {\n      \"result\": { \"type\": \"number\" }\n    }\n  },\n  \"settings\": {\n    \"model\":         \"gpt-4.1-2025-04-14\",\n    \"maxTokens\":     16384,\n    \"temperature\":   0,\n    \"engine\":        \"basic-v2\",\n    \"maxIterations\": 25\n  },\n  \"resources\": [],\n  \"features\":  []\n}\n```\n\n---\n\n## Complete Full-Featured Example\n\nAn agent with an API tool, an Action Center escalation, and guardrails:\n\n```json\n{\n  \"id\":      \"a1b2c3d4-e5f6-7890-abcd-ef1234567890\",\n  \"version\": \"1.0.0\",\n  \"name\":    \"Order Review Agent\",\n  \"metadata\": {\n    \"storageVersion\":  \"31.0.0\",\n    \"isConversational\": false\n  },\n  \"messages\": [\n    {\n      \"role\":    \"system\",\n      \"content\": \"You are an order review agent. Use the available tools to validate orders and escalate when uncertain.\",\n      \"contentTokens\": [\n        { \"type\": \"simpleText\", \"rawString\": \"You are an order review agent. Use the available tools to validate orders and escalate when uncertain.\" }\n      ]\n    },\n    {\n      \"role\":    \"user\",\n      \"content\": \"Review order {{orderId}} for customer {{customerName}}.\",\n      \"contentTokens\": [\n        { \"type\": \"simpleText\", \"rawString\": \"Review order \" },\n        { \"type\": \"variable\",   \"rawString\": \"input.orderId\" },\n        { \"type\": \"simpleText\", \"rawString\": \" for customer \" },\n        { \"type\": \"variable\",   \"rawString\": \"input.customerName\" },\n        { \"type\": \"simpleText\", \"rawString\": \".\" }\n      ]\n    }\n  ],\n  \"inputSchema\": {\n    \"type\": \"object\",\n    \"properties\": {\n      \"orderId\":      { \"type\": \"string\" },\n      \"customerName\": { \"type\": \"string\" }\n    },\n    \"required\": [\"orderId\", \"customerName\"]\n  },\n  \"outputSchema\": {\n    \"type\": \"object\",\n    \"properties\": {\n      \"decision\": { \"type\": \"string\" },\n      \"reason\":   { \"type\": \"string\" }\n    }\n  },\n  \"settings\": {\n    \"model\":         \"gpt-4o-2024-11-20\",\n    \"maxTokens\":     8192,\n    \"temperature\":   0,\n    \"engine\":        \"basic-v2\",\n    \"maxIterations\": 25\n  },\n  \"resources\": [\n    {\n      \"$resourceType\": \"tool\",\n      \"name\":          \"Validate Order\",\n      \"type\":          \"api\",\n      \"location\":      \"solution\",\n      \"isEnabled\":     true,\n      \"inputSchema\": {\n        \"type\": \"object\",\n        \"properties\": {\n          \"orderId\": { \"type\": \"string\" }\n        },\n        \"required\": [\"orderId\"]\n      },\n      \"outputSchema\": {\n        \"type\": \"object\",\n        \"properties\": {\n          \"isValid\":    { \"type\": \"boolean\" },\n          \"totalValue\": { \"type\": \"number\" }\n        }\n      },\n      \"properties\": {\n        \"folderPath\":  \"solution_folder\",\n        \"processName\": \"Validate Order\"\n      },\n      \"guardrail\":          { \"policies\": [] },\n      \"settings\":           {},\n      \"argumentProperties\": {}\n    },\n    {\n      \"$resourceType\":        \"escalation\",\n      \"name\":                 \"managerApproval\",\n      \"description\":          \"Escalate to a manager for high-value or ambiguous orders\",\n      \"isAgentMemoryEnabled\": false,\n      \"escalationType\":       0,\n      \"channels\": [\n        {\n          \"name\": \"Channel\",\n          \"type\": \"actionCenter\",\n          \"inputSchema\": {\n            \"type\": \"object\",\n            \"properties\": {\n              \"Content\": { \"type\": \"string\" },\n              \"Comment\": { \"type\": \"string\" }\n            }\n          },\n          \"outputSchema\": {\n            \"type\": \"object\",\n            \"properties\": {\n              \"Comment\":  { \"type\": \"string\" }\n            }\n          },\n          \"outcomeMapping\": {\n            \"approve\": \"continue\",\n            \"reject\":  \"continue\"\n          },\n          \"recipients\": [\n            { \"type\": 2, \"value\": \"managers-group-id\", \"displayName\": \"Managers\" }\n          ],\n          \"properties\": {\n            \"appName\":                    \"Order Review HITL\",\n            \"appVersion\":                 1,\n            \"resourceKey\":                \"b2c3d4e5-f6a7-8901-bcde-f12345678901\",\n            \"isActionableMessageEnabled\": false\n          }\n        }\n      ]\n    }\n  ],\n  \"features\": [],\n  \"guardrails\": [\n    {\n      \"name\":           \"PII Detection\",\n      \"$guardrailType\": \"builtInValidator\",\n      \"validatorType\":  \"pii_detection\",\n      \"action\": {\n        \"$actionType\":   \"log\",\n        \"severityLevel\": \"Warning\"\n      },\n      \"selector\": {\n        \"scopes\": [\"Agent\", \"Llm\"]\n      },\n      \"validatorParameters\": [\n        {\n          \"$parameterType\": \"enum-list\",\n          \"id\":             \"entities\",\n          \"value\":          [\"Email\", \"PhoneNumber\", \"CreditCardNumber\"]\n        },\n        {\n          \"$parameterType\": \"map-enum\",\n          \"id\":             \"entityThresholds\",\n          \"value\": {\n            \"Email\":           0.5,\n            \"PhoneNumber\":     0.6,\n            \"CreditCardNumber\": 0.8\n          }\n        }\n      ]\n    },\n    {\n      \"name\":           \"Prompt Injection Guard\",\n      \"$guardrailType\": \"builtInValidator\",\n      \"validatorType\":  \"prompt_injection\",\n      \"action\": {\n        \"$actionType\":   \"block\",\n        \"reason\": \"Prompt injection detected.\"\n      },\n      \"selector\": {\n        \"scopes\": [\"Llm\"]\n      },\n      \"validatorParameters\": [\n        { \"$parameterType\": \"number\", \"id\": \"threshold\", \"value\": 0.5 }\n      ]\n    }\n  ]\n}\n```\n\n---\n\n## Studio Web Generated Fields\n\nWhen you pull an `agent.json` from Studio Web, it may contain additional fields not documented above:\n\n- **Escalation channels:** `id`, `description`, `inputSchemaDotnetTypeMapping`, `outputSchemaDotnetTypeMapping`, `actionableMessageMetaData`\n- **Escalation top-level:** `governanceProperties`, `properties`\n- **Tool resources:** `id`, `referenceKey`, `location`\n- **Top-level:** `projectId`, `type: \"lowCode\"`\n\nThese fields are auto-assigned by Studio Web. They are **not required** when creating `agent.json` manually \u2014 the runtime fills in defaults where needed. Do not fabricate UUIDs for `id` or `referenceKey` fields; omit them instead.\n\n---\n\n## Authoring Rules and Conventions\n\nFollow these rules when creating or editing `agent.json` files:\n\n1. **Always include all required fields** \u2014 `messages`, `inputSchema`, `outputSchema`, `settings`, and `metadata` must be present.\n\n2. **Keep `messages` to exactly two entries** \u2014 `system` first, `user` second. Never add a third.\n\n3. **Sync `content` and `contentTokens`** \u2014 every `{{variable}}` in `content` needs a matching `variable` token in `contentTokens`. Every literal text segment becomes a `simpleText` token.\n\n4. **Variable references use `input.` prefix in tokens** \u2014 `\"rawString\": \"input.myVar\"` corresponds to `{{myVar}}` in `content`.\n\n5. **Match `inputSchema.properties` to message variables** \u2014 every `{{variable}}` in the user message must appear as a property in `inputSchema.properties`.\n\n6. **Use `\"engine\": \"basic-v2\"`** for new non-conversational agents unless a specific requirement calls for another engine.\n\n7. **Set `\"temperature\": 0`** for task/automation agents; use higher values only for creative or conversational agents.\n\n8. **Use `\"resources\": []` and `\"features\": []`** (not omit the fields) for consistency and forward compatibility.\n\n9. **Do not generate `id`** when creating new files \u2014 UiPath Studio will assign it on first save.\n\n10. **`storageVersion`** should match the Studio version generating the file; default to `\"44.0.0\"` for new agents.\n\n11. **Resource `name` fields are seen by the LLM** \u2014 use clear, verb-phrase names for tools (e.g., `\"Get Customer Profile\"`, `\"Submit Order\"`) so the model knows when to call them.\n\n12. **Guardrails at the top level apply to the whole agent** \u2014 per-tool guardrails go inside the tool's `guardrail.policies` array.\n", "references/lowcode/resources-reference.md": "# Low-Code Agent Resources Reference\n\n> **Agent type: Low-code agents only.** Coded agents access platform resources via the Python SDK (`from uipath.platform import UiPath`) and configure overridable resource bindings in `bindings.json` \u2014 see [lifecycle/bindings-reference.md](../lifecycle/bindings-reference.md).\n\nResources are the external capabilities an agent can use during execution \u2014 tools it can call, knowledge it can retrieve, humans it can escalate to, and external servers it can connect to. All resources are declared in the `\"resources\"` array of `agent.json`.\n\nEvery resource object has at minimum:\n\n| Field | Type | Description |\n|---|---|---|\n| `$resourceType` | string | Discriminator: `\"tool\"`, `\"context\"`, `\"escalation\"`, `\"mcp\"`, or `\"a2a\"` |\n| `name` | string | Display name; also used as the tool name the LLM sees |\n| `description` | string | Explains to the LLM what the resource does and when to use it |\n| `isEnabled` | boolean | Whether the resource is active (default `true`) |\n\n---\n\n## 1. Tool Resources (`$resourceType: \"tool\"`)\n\nTool resources give the agent callable actions. The `type` field selects the subtype.\n\n---\n\n### 1.1 Api \u2014 API Workflow Tool\n\nCalls an **API-triggered UiPath workflow** (an Orchestrator process started via API). Use this for automation workflows that return a structured result synchronously.\n\n**Key fields:**\n\n| Field | Path | Description |\n|---|---|---|\n| `type` | \u2014 | `\"Api\"` (also: `\"Process\"`, `\"Agent\"`, `\"Integration\"`, `\"Internal\"`, `\"Ixp\"`) |\n| `folderPath` | `properties.folderPath` | Orchestrator folder containing the process |\n| `processName` | `properties.processName` | Name of the Orchestrator process |\n| `inputSchema` | \u2014 | JSON Schema for the arguments passed to the workflow |\n| `outputSchema` | \u2014 | JSON Schema for the value returned by the workflow |\n\n```json\n{\n  \"$resourceType\": \"tool\",\n  \"type\": \"Api\",\n  \"name\": \"Get Customer Data\",\n  \"description\": \"Retrieves customer account details from the CRM system given a customer ID. Returns name, email, account status, and contract tier.\",\n  \"isEnabled\": true,\n  \"location\": \"solution\",\n  \"guardrail\": { \"policies\": [] },\n  \"settings\": {},\n  \"argumentProperties\": {},\n  \"properties\": {\n    \"folderPath\": \"Finance/CRM\",\n    \"processName\": \"GetCustomerData\"\n  },\n  \"inputSchema\": {\n    \"type\": \"object\",\n    \"properties\": {\n      \"customerId\": {\n        \"type\": \"string\",\n        \"description\": \"The unique customer identifier (e.g. CUST-00123).\"\n      }\n    },\n    \"required\": [\"customerId\"]\n  },\n  \"outputSchema\": {\n    \"type\": \"object\",\n    \"properties\": {\n      \"name\": { \"type\": \"string\" },\n      \"email\": { \"type\": \"string\" },\n      \"accountStatus\": { \"type\": \"string\", \"enum\": [\"active\", \"suspended\", \"closed\"] },\n      \"contractTier\": { \"type\": \"string\" }\n    }\n  }\n}\n```\n\n---\n\n### 1.2 Process \u2014 RPA Process Tool\n\nTriggers a **job-based UiPath RPA process** (long-running or robot-executed). The structure is identical to `Api` but uses `type: \"Process\"`. Use this when the automation runs on an unattended robot and may take longer to complete.\n\n```json\n{\n  \"$resourceType\": \"tool\",\n  \"type\": \"Process\",\n  \"name\": \"Generate Invoice\",\n  \"description\": \"Runs an RPA process that generates a PDF invoice in the ERP system and returns the document URL. Use this after all invoice line items have been confirmed.\",\n  \"isEnabled\": true,\n  \"location\": \"solution\",\n  \"guardrail\": { \"policies\": [] },\n  \"settings\": {},\n  \"argumentProperties\": {},\n  \"properties\": {\n    \"folderPath\": \"Finance/Invoicing\",\n    \"processName\": \"GenerateInvoicePDF\"\n  },\n  \"inputSchema\": {\n    \"type\": \"object\",\n    \"properties\": {\n      \"orderId\": {\n        \"type\": \"string\",\n        \"description\": \"The order ID for which to generate the invoice.\"\n      },\n      \"recipientEmail\": {\n        \"type\": \"string\",\n        \"description\": \"Email address to send the invoice to.\"\n      }\n    },\n    \"required\": [\"orderId\", \"recipientEmail\"]\n  },\n  \"outputSchema\": {\n    \"type\": \"object\",\n    \"properties\": {\n      \"invoiceUrl\": {\n        \"type\": \"string\",\n        \"description\": \"Public URL of the generated PDF invoice.\"\n      },\n      \"invoiceNumber\": {\n        \"type\": \"string\"\n      }\n    }\n  }\n}\n```\n\n---\n\n### 1.3 Agent \u2014 Call Another Agent as a Tool\n\nDelegates a sub-task to **another UiPath agent**. The called agent runs independently and returns its output schema as the tool result. Use this for modular, multi-agent architectures.\n\n```json\n{\n  \"$resourceType\": \"tool\",\n  \"type\": \"Agent\",\n  \"name\": \"Summarisation Agent\",\n  \"description\": \"Calls a specialised summarisation agent that condenses long documents into structured bullet-point summaries. Use this when the input text exceeds 2000 words.\",\n  \"isEnabled\": true,\n  \"location\": \"solution\",\n  \"guardrail\": { \"policies\": [] },\n  \"settings\": {},\n  \"argumentProperties\": {},\n  \"properties\": {\n    \"folderPath\": \"Shared/Agents\",\n    \"processName\": \"SummarisationAgent\"\n  },\n  \"inputSchema\": {\n    \"type\": \"object\",\n    \"properties\": {\n      \"documentText\": {\n        \"type\": \"string\",\n        \"description\": \"The full text of the document to summarise.\"\n      },\n      \"maxBullets\": {\n        \"type\": \"integer\",\n        \"description\": \"Maximum number of bullet points in the summary.\",\n        \"default\": 5\n      }\n    },\n    \"required\": [\"documentText\"]\n  },\n  \"outputSchema\": {\n    \"type\": \"object\",\n    \"properties\": {\n      \"summary\": {\n        \"type\": \"array\",\n        \"items\": { \"type\": \"string\" },\n        \"description\": \"List of summary bullet points.\"\n      }\n    }\n  }\n}\n```\n\n---\n\n### 1.4 Integration \u2014 Integration Service Connector Tool\n\nCalls an action exposed by an **Integration Service connector** (e.g. Salesforce, ServiceNow, Jira). Requires `connectorKey` (the connector type identifier) and `elementInstanceId` (the specific authenticated connection).\n\n```json\n{\n  \"$resourceType\": \"tool\",\n  \"type\": \"Integration\",\n  \"name\": \"Create ServiceNow Incident\",\n  \"description\": \"Creates a new incident ticket in ServiceNow. Use this when the user requests IT support or when an automated check detects a system issue that requires human follow-up.\",\n  \"isEnabled\": true,\n  \"location\": \"solution\",\n  \"guardrail\": { \"policies\": [] },\n  \"settings\": {},\n  \"argumentProperties\": {},\n  \"properties\": {\n    \"connectorKey\": \"ServiceNow\",\n    \"elementInstanceId\": \"a1b2c3d4-e5f6-7890-abcd-ef1234567890\",\n    \"actionName\": \"CreateIncident\"\n  },\n  \"inputSchema\": {\n    \"type\": \"object\",\n    \"properties\": {\n      \"shortDescription\": {\n        \"type\": \"string\",\n        \"description\": \"One-line summary of the incident.\"\n      },\n      \"description\": {\n        \"type\": \"string\",\n        \"description\": \"Full description of the issue.\"\n      },\n      \"urgency\": {\n        \"type\": \"string\",\n        \"enum\": [\"1\", \"2\", \"3\"],\n        \"description\": \"1 = High, 2 = Medium, 3 = Low.\"\n      },\n      \"assignmentGroup\": {\n        \"type\": \"string\",\n        \"description\": \"ServiceNow assignment group name.\"\n      }\n    },\n    \"required\": [\"shortDescription\", \"urgency\"]\n  },\n  \"outputSchema\": {\n    \"type\": \"object\",\n    \"properties\": {\n      \"ticketNumber\": { \"type\": \"string\" },\n      \"ticketUrl\": { \"type\": \"string\" }\n    }\n  }\n}\n```\n\n---\n\n### 1.5 Internal \u2014 Built-In Platform Tools\n\nReferences a **built-in UiPath platform capability** rather than an external process. The `toolName` field selects the capability. No `properties.folderPath` or `processName` is needed.\n\nAvailable built-in tool names:\n\n| `toolName` | Description |\n|---|---|\n| `analyze-attachments` | Extracts and interprets content from attached files (PDF, DOCX, images) |\n| `deep-rag` | Performs a deep retrieval-augmented generation search over a knowledge index |\n| `batch-transform` | Applies a transformation prompt to multiple items in parallel |\n\n```json\n{\n  \"$resourceType\": \"tool\",\n  \"type\": \"Internal\",\n  \"name\": \"Analyse Attachments\",\n  \"description\": \"Extracts text, tables, and structured data from file attachments provided by the user. Use this whenever the user uploads a PDF, Word document, or image that contains information relevant to the task.\",\n  \"isEnabled\": true,\n  \"location\": \"solution\",\n  \"guardrail\": { \"policies\": [] },\n  \"settings\": {},\n  \"argumentProperties\": {},\n  \"toolName\": \"analyze-attachments\"\n}\n```\n\n---\n\n### 1.6 Ixp \u2014 IXP Document Understanding Tool\n\nCalls a workflow hosted on the UiPath IXP (Intelligent Document Processing) platform. Used when the agent needs to extract data from documents (PDFs, forms, invoices) using UiPath's Document Understanding service.\n\nStructure is identical to `Api` \u2014 uses `properties.folderPath` and `properties.processName`. Use `type: \"Ixp\"` when the target process is an IXP extraction workflow.\n\n```json\n{\n  \"$resourceType\": \"tool\",\n  \"type\": \"Ixp\",\n  \"name\": \"Extract Invoice Data\",\n  \"description\": \"Extracts structured data from an invoice PDF using Document Understanding. Use this when the user uploads an invoice or provides a document path to process. Returns line items, totals, vendor details, and dates.\",\n  \"isEnabled\": true,\n  \"location\": \"solution\",\n  \"guardrail\": { \"policies\": [] },\n  \"settings\": {},\n  \"argumentProperties\": {},\n  \"properties\": {\n    \"folderPath\": \"Finance/DocumentProcessing\",\n    \"processName\": \"InvoiceExtractionWorkflow\"\n  },\n  \"inputSchema\": {\n    \"type\": \"object\",\n    \"properties\": {\n      \"documentPath\": {\n        \"type\": \"string\",\n        \"description\": \"Path or URL to the invoice document to process.\"\n      }\n    },\n    \"required\": [\"documentPath\"]\n  },\n  \"outputSchema\": {\n    \"type\": \"object\",\n    \"properties\": {\n      \"vendor\": { \"type\": \"string\" },\n      \"totalAmount\": { \"type\": \"number\" },\n      \"invoiceDate\": { \"type\": \"string\" },\n      \"lineItems\": {\n        \"type\": \"array\",\n        \"items\": { \"type\": \"object\" }\n      }\n    }\n  }\n}\n```\n\n---\n\n## 2. Context Resources (`$resourceType: \"context\"`)\n\nContext resources provide the agent with **retrieval-augmented knowledge** \u2014 documents, databases, or file attachments that the agent can query before or during reasoning.\n\n---\n\n### Context Types\n\n| `contextType` | Source |\n|---|---|\n| `\"index\"` | Context Grounding index (vector/keyword search over indexed documents) |\n| `\"attachments\"` | Files attached to the conversation at runtime |\n| `\"datafabricentityset\"` | UiPath Data Fabric structured entity data |\n\n### Retrieval Modes (`settings.retrievalMode`)\n\n| Mode | Description |\n|---|---|\n| `Semantic` | Vector similarity search \u2014 best for natural language queries |\n| `Structured` | Keyword/filter-based retrieval \u2014 best for exact matches |\n| `DeepRAG` | Multi-step retrieval with re-ranking \u2014 best for complex queries |\n| `BatchTransform` | Bulk transformation of retrieved chunks |\n| `DataFabric` | Structured query against Data Fabric entity sets |\n\n```json\n{\n  \"$resourceType\": \"context\",\n  \"name\": \"Product Knowledge Base\",\n  \"isEnabled\": true,\n  \"description\": \"Internal product documentation including feature specs, pricing, and FAQs. Query this whenever the user asks about product capabilities, limitations, or pricing.\",\n  \"contextType\": \"index\",\n  \"folderPath\": \"MyFolder\",\n  \"indexName\": \"product-docs-index\",\n  \"settings\": {\n    \"retrievalMode\": \"Semantic\",\n    \"resultCount\": 5,\n    \"threshold\": 0.75,\n    \"query\": { \"variant\": \"dynamic\" }\n  }\n}\n```\n\n> **`settings` fields:**\n> - `resultCount` \u2014 Maximum number of chunks or documents to retrieve (integer, default: 5).\n> - `threshold` \u2014 Minimum relevance score (0\u20131) for a result to be included. Lower values return more results with potentially lower relevance.\n\n---\n\n## 3. Escalation Resources (`$resourceType: \"escalation\"`)\n\nEscalation resources enable **Human-in-the-Loop (HITL)** workflows. When the agent determines it cannot or should not proceed autonomously, it routes the task to a human via Action Center.\n\n**Key fields:**\n\n| Field | Path | Description |\n|---|---|---|\n| `channels` | \u2014 | Array of channel objects (typically one). Each channel defines a separate escalation path. |\n| `channels[].type` | \u2014 | Must be `\"actionCenter\"` |\n| `channels[].inputSchema` | \u2014 | JSON Schema for data sent to the human reviewer |\n| `channels[].outputSchema` | \u2014 | JSON Schema for the reviewer's response |\n| `channels[].outcomeMapping` | \u2014 | Maps human choices (e.g. `\"approve\"`, `\"reject\"`) to agent actions (`\"continue\"`) |\n| `channels[].recipients` | \u2014 | Array of `{type, value, displayName}` objects. `type`: `1`=UserId, `2`=GroupId, `3`=UserEmail |\n| `channels[].properties` | \u2014 | Action Center app config: `appName`, `appVersion`, `resourceKey`, `isActionableMessageEnabled` |\n| `isAgentMemoryEnabled` | \u2014 | If `true`, resolved escalations are stored for future auto-resolution |\n| `escalationType` | \u2014 | Set to `0` (default) |\n\n```json\n{\n  \"$resourceType\": \"escalation\",\n  \"name\": \"Manager Approval\",\n  \"description\": \"Escalates to a human manager for approval when the action exceeds the agent's scope.\",\n  \"escalationType\": 0,\n  \"isAgentMemoryEnabled\": false,\n  \"channels\": [\n    {\n      \"name\": \"Channel\",\n      \"type\": \"actionCenter\",\n      \"description\": \"Approval channel for high-value actions.\",\n      \"inputSchema\": {\n        \"type\": \"object\",\n        \"properties\": {\n          \"Content\": { \"type\": \"string\" },\n          \"Comment\": { \"type\": \"string\", \"description\": \"Reviewer comments\" }\n        }\n      },\n      \"outputSchema\": {\n        \"type\": \"object\",\n        \"properties\": {\n          \"Comment\": { \"type\": \"string\", \"description\": \"Reviewer response\" }\n        }\n      },\n      \"outcomeMapping\": {\n        \"approve\": \"continue\",\n        \"reject\": \"continue\"\n      },\n      \"recipients\": [\n        { \"type\": 1, \"value\": \"user-or-group-uuid\", \"displayName\": \"Review Team\" }\n      ],\n      \"properties\": {\n        \"appName\": \"HITL App\",\n        \"appVersion\": 1,\n        \"resourceKey\": \"action-center-app-uuid\",\n        \"isActionableMessageEnabled\": false\n      }\n    }\n  ]\n}\n```\n\n> **When to use `isAgentMemoryEnabled: true`:** Enable this when the agent should learn from resolved escalations and auto-resolve similar cases in the future. Disable for privacy-sensitive workflows.\n\n---\n\n## 4. MCP Resources (`$resourceType: \"mcp\"`)\n\nMCP resources connect the agent to an external **Model Context Protocol (MCP) server** \u2014 a standardised interface that exposes tools to LLM agents. Use this to integrate third-party MCP-compatible servers (e.g. GitHub MCP, Brave Search MCP, custom internal servers).\n\n**Key fields:**\n\n| Field | Description |\n|---|---|\n| `slug` | Unique identifier for this MCP connection |\n| `folderPath` | Orchestrator folder where the MCP server connection is registered |\n| `dynamicTools` | How the agent discovers tools from the server: `\"none\"` (use `availableTools` list only), `\"schema\"` (discover tools with schemas at runtime), `\"all\"` (discover all tools dynamically) |\n| `availableTools` | Tool filter list. Format depends on `dynamicTools`: when `\"none\"`, provide an array of tool **objects** with `name`, `description`, `inputSchema`, `outputSchema`; when `\"schema\"` or `\"all\"`, provide an array of tool **name strings** as a filter. |\n\n```json\n{\n  \"$resourceType\": \"mcp\",\n  \"slug\": \"github-mcp\",\n  \"name\": \"GitHub MCP Server\",\n  \"description\": \"Provides tools for interacting with GitHub repositories: reading files, listing issues, creating pull requests, and searching code. Use these tools when the user's request involves source code, repository management, or CI/CD workflows.\",\n  \"folderPath\": \"Engineering/Integrations\",\n  \"dynamicTools\": \"schema\",\n  \"availableTools\": [\n    \"list_repositories\",\n    \"get_file_contents\",\n    \"create_issue\",\n    \"list_pull_requests\",\n    \"search_code\"\n  ],\n  \"serverConfig\": {\n    \"timeoutSeconds\": 30\n  }\n}\n```\n\n> **`dynamicTools` guidance:**\n> - Use `\"none\"` + `availableTools` for stable, well-known tool sets where you want explicit control.\n> - Use `\"schema\"` when the MCP server may add tools over time and you want the agent to discover them automatically with type safety.\n> - Use `\"all\"` only in trusted environments \u2014 it exposes every tool the server publishes without filtering.\n\n---\n\n## 5. A2A Resources (`$resourceType: \"a2a\"`)\n\nA2A resources use the **Agent-to-Agent (A2A) protocol** to connect to agents hosted on external systems (outside UiPath Automation Cloud). Unlike `type: \"Agent\"` tool resources which call UiPath-native agents, A2A uses a standardised HTTP-based protocol with an **Agent Card** that describes the remote agent's capabilities.\n\n**Key fields:**\n\n| Field | Description |\n|---|---|\n| `id` | UUID identifier for this A2A resource |\n| `slug` | Unique string identifier for this A2A connection |\n| `agentCardUrl` | URL where the remote agent publishes its Agent Card (capability manifest) |\n| `isActive` | Whether this A2A connection is active (default `true`) |\n| `cachedAgentCard` | Inline copy of the Agent Card JSON, used when the remote URL is not accessible at design time or for performance |\n\n```json\n{\n  \"$resourceType\": \"a2a\",\n  \"id\": \"a2a-resource-uuid\",\n  \"slug\": \"legal-review-agent\",\n  \"isEnabled\": true,\n  \"name\": \"Legal Review Agent\",\n  \"description\": \"An external legal AI agent that reviews contract clauses for compliance risks and suggests redlines. Use this when the user submits a contract for review or when generated content includes legal commitments.\",\n  \"isActive\": true,\n  \"agentCardUrl\": \"https://legal-ai.company.com/.well-known/agent.json\",\n  \"cachedAgentCard\": {\n    \"name\": \"Legal Review Agent\",\n    \"description\": \"Reviews contracts and flags compliance issues.\",\n    \"version\": \"2.1.0\",\n    \"capabilities\": {\n      \"streaming\": false,\n      \"pushNotifications\": false\n    },\n    \"skills\": [\n      {\n        \"id\": \"review-contract\",\n        \"name\": \"Review Contract\",\n        \"description\": \"Analyses contract text and returns a risk assessment with suggested redlines.\",\n        \"inputModes\": [\"text\"],\n        \"outputModes\": [\"text\"]\n      }\n    ],\n    \"url\": \"https://legal-ai.company.com/a2a\"\n  }\n}\n```\n\n> **`cachedAgentCard` vs `agentCardUrl`:** Always provide `agentCardUrl` for live environments so the agent picks up capability updates automatically. Provide `cachedAgentCard` as a fallback for offline development, testing, or when the remote agent is in a different network zone.\n\n---\n\n## Combining Resources in `agent.json`\n\nResources are listed in the `\"resources\"` array. The agent's LLM uses the `description` field of each resource to decide when to invoke it \u2014 write descriptions as clear instructions to the model.\n\n```json\n{\n  \"resources\": [\n    { \"$resourceType\": \"tool\",      \"type\": \"Api\",       \"name\": \"Get Customer Data\",    \"...\" : \"...\" },\n    { \"$resourceType\": \"context\",   \"name\": \"Product Knowledge Base\", \"...\" : \"...\" },\n    { \"$resourceType\": \"escalation\",\"name\": \"Manager Approval\",       \"...\" : \"...\" },\n    { \"$resourceType\": \"mcp\",       \"slug\": \"github-mcp\",             \"...\" : \"...\" },\n    { \"$resourceType\": \"a2a\",       \"slug\": \"legal-review-agent\",     \"...\" : \"...\" }\n  ]\n}\n```\n\n---\n\n## See Also\n\n- [setup.md](./setup.md) \u2014 Project setup and directory structure\n- [agent-json-reference.md](./agent-json-reference.md) \u2014 Full `agent.json` schema reference\n- [../../assets/templates/agent.json](../../assets/templates/agent.json) \u2014 Minimal starter template\n", "references/lowcode/setup.md": "# Low-Code Agent Setup Guide\n\n> **Agent type: Low-code agents only.** Coded agents are set up with `pyproject.toml`, `uv sync`, and `uip codedagent new` \u2014 see [lifecycle/setup.md](../lifecycle/setup.md).\n\nThis guide explains how to set up a UiPath low-code agent project for local development, testing, and deployment using the `uip` CLI.\n\n---\n\n## Prerequisites\n\nBefore you begin, ensure the following tools are installed:\n\n- **Python 3.11 or higher** \u2014 The agent runtime is Python-based even for low-code agents. Python must be available on your `PATH`.\n- **`uip` CLI** \u2014 The UiPath CLI used for pulling, running, evaluating, and publishing agents. Install it via npm:\n  ```bash\n  npm install -g @uipath/cli\n  ```\n  Verify the installation:\n  ```bash\n  uip --version\n  ```\n  > **Note:** The Python `uipath` package (the agent runtime) is **not** installed manually. It is installed automatically when you run `uip codedagent setup`.\n- **UiPath account credentials** \u2014 You need access to a UiPath Automation Cloud tenant. Authentication tokens are stored in `.env`.\n\n---\n\n## Native Low-Code Agent CLI: `uip agent`\n\nThe `uip agent` tool (`@uipath/agent-tool`, part of `@uipath/cli`) is the native CLI specifically designed for low-code agents. It provides first-class resource management, schema validation, and a dedicated publish/deploy pipeline through AutomationSolutions.\n\n### `uip agent` vs `uip codedagent` for low-code\n\n| Action | `uip agent` | `uip codedagent` |\n|---|---|---|\n| Create new project | `uip agent init <name>` | Create `agent.json` manually or pull |\n| Manage tools/context/escalations | `uip agent tool/context/escalation add` | Edit `agent.json` directly |\n| Validate schema | `uip agent validate` | Not available |\n| Local run | `uip codedagent run agent.json '...'` | Same \u2014 both forward to Python CLI |\n| Push to Studio Web | `uip agent push` | `uip codedagent push` |\n| Publish + deploy | `uip agent publish` then `uip agent deploy <key>` | `uip codedagent deploy --my-workspace` |\n| Remote job management | `uip agent run start/status/list` | `uip codedagent invoke agent.json` |\n\n### Quick `uip agent` scaffold workflow\n\n```bash\n# Create new low-code agent project\nuip agent init my-agent\n\n# Manage resources declaratively\nuip agent tool add \"Get Customer Data\" --type process --description \"Retrieves customer from CRM\"\nuip agent context add \"Product Docs\" --index product-docs-index\nuip agent escalation add \"Manager Approval\"\n\n# Edit prompts and model settings\nuip agent config set systemPrompt \"You are a helpful assistant.\"\nuip agent config set model \"gpt-4o-2024-11-20\"\n\n# Validate before deploying\nuip agent validate\n\n# Push to Studio Web (for visual editing / sharing)\nuip agent push\n\n# Or publish directly to Orchestrator\nuip agent publish                            # \u2192 returns a packageVersionKey\nuip agent deploy <packageVersionKey>         # \u2192 deploys to Orchestrator\n```\n\nBoth paths produce an `agent.json` that works with `uip codedagent run/eval`. Use `uip agent` when you want structured resource management; use the manual `agent.json` approach when you prefer direct JSON editing.\n\n---\n\n## Two Paths to Get an `agent.json`\n\nEvery low-code agent is defined by a single `agent.json` file. There are two ways to obtain one.\n\n### Path 1: Pull from Studio Web (Recommended)\n\nUse this path when you have already designed an agent in **UiPath Studio Web Agent Builder** and want to work with it locally.\n\n1. Open Studio Web and navigate to your agent in Agent Builder.\n2. Publish or save the agent so it has a registered identity in Automation Cloud.\n3. In your terminal, create a local directory and pull the agent definition:\n   ```bash\n   mkdir my-agent && cd my-agent\n   uip codedagent pull\n   ```\n   The CLI will prompt you to select the tenant, folder, and agent. It downloads `agent.json` and an optional `bindings.json` into the current directory.\n4. Verify the files were created:\n   ```bash\n   ls -1\n   # agent.json\n   # bindings.json   (if the agent has deployed resource bindings)\n   ```\n\n> **Note:** `uip codedagent pull` keeps your local `agent.json` in sync with Studio Web. Re-run it whenever the cloud definition changes.\n\n---\n\n### Path 2: Create `agent.json` from Scratch\n\nUse this path when you want to author a brand-new agent entirely in code without using Studio Web first.\n\n1. Create a project directory:\n   ```bash\n   mkdir my-agent && cd my-agent\n   ```\n2. Create `agent.json` manually. See the **Minimal Template** section below for a starting point, and consult [agent-json-reference.md](./agent-json-reference.md) for the full schema.\n3. Optionally create a `.env` file with your credentials (see **Authentication** below).\n\n---\n\n## Minimal `agent.json` Template\n\nThe following is a minimal, working `agent.json` that you can copy and customise. All fields shown are required unless marked optional.\n\n```json\n{\n  \"version\": \"1.1.0\",\n  \"name\": \"My Agent\",\n  \"metadata\": {\n    \"storageVersion\": \"44.0.0\",\n    \"isConversational\": false\n  },\n  \"messages\": [\n    {\n      \"role\": \"system\",\n      \"content\": \"You are a helpful assistant. Answer the user's request clearly and concisely.\",\n      \"contentTokens\": [\n        { \"type\": \"simpleText\", \"rawString\": \"You are a helpful assistant. Answer the user's request clearly and concisely.\" }\n      ]\n    },\n    {\n      \"role\": \"user\",\n      \"content\": \"{{task}}\",\n      \"contentTokens\": [\n        { \"type\": \"variable\", \"rawString\": \"input.task\" }\n      ]\n    }\n  ],\n  \"inputSchema\": {\n    \"type\": \"object\",\n    \"properties\": {\n      \"task\": { \"type\": \"string\", \"description\": \"The task or question for the agent.\" }\n    },\n    \"required\": [\"task\"]\n  },\n  \"outputSchema\": {\n    \"type\": \"object\",\n    \"properties\": {\n      \"result\": { \"type\": \"string\", \"description\": \"The agent's response.\" }\n    }\n  },\n  \"settings\": {\n    \"engine\": \"basic-v2\",\n    \"model\": \"gpt-4.1-2025-04-14\",\n    \"maxTokens\": 16384,\n    \"temperature\": 0,\n    \"maxIterations\": 25\n  },\n  \"resources\": [],\n  \"features\": []\n}\n```\n\nFor production agents with tools, context, or escalation, see [resources-reference.md](./resources-reference.md).\n\n---\n\n## No Virtual Environment Needed for Editing\n\nLow-code agents do **not** require you to create or activate a Python virtual environment just to edit `agent.json`. You can open and modify the file in any editor directly.\n\nHowever, a virtual environment **is** created automatically when you run the agent locally. The `uip codedagent setup` command bootstraps the Python runtime environment required to execute the agent:\n\n```bash\nuip codedagent setup --format json\n```\n\nRun this once per project (or after updating dependencies). It creates a `.venv` directory in your project folder with all necessary runtime packages.\n\n> You do **not** need to call `uip codedagent setup` merely to edit `agent.json`. However, it **is** required before running the agent locally (`uip codedagent run`) or running evaluations (`uip codedagent eval`).\n\n---\n\n## `uip codedagent init` Generates Supporting Files\n\nRunning `uip codedagent init` on a low-code project reads `agent.json` and generates:\n- **`entry-points.json`** \u2014 Mirrors `inputSchema`/`outputSchema` from `agent.json` in the standard entrypoint format used by Orchestrator and Studio Web.\n- **`bindings.json`** \u2014 If not already present, creates an empty bindings file.\n\nThis step is **optional for local `run`** (the runtime reads schemas directly from `agent.json`), but **required before push/deploy** so that Orchestrator and Studio Web know the agent's I/O contract.\n\n```bash\nuip codedagent init\n```\n\n> **Note:** Studio Web generates `entry-points.json` automatically when you pull. You only need to run `uip codedagent init` manually if you created `agent.json` from scratch.\n\n---\n\n## No `pyproject.toml` Needed\n\nLow-code agents do **not** use Python packaging. There is no `pyproject.toml`, no `setup.py`, and no need to define Python dependencies manually. The runtime dependencies are managed entirely by the `uip` toolchain.\n\nIf you see a `pyproject.toml` in a project, it likely belongs to a **coded agent** (Python-based). For low-code agents, ignore or delete it.\n\n---\n\n## No Framework Selection\n\nLow-code agents use UiPath's built-in **ReAct engine** (`\"engine\": \"basic-v2\"`), which is powered by LangGraph under the hood. There is no framework selection step \u2014 the platform automatically builds a LangGraph StateGraph from your `agent.json` definition. You never interact with LangGraph directly.\n\n---\n\n## Directory Structure\n\nA complete low-code agent project looks like this:\n\n```\nmy-agent/\n\u251c\u2500\u2500 agent.json              \u2190 Agent definition (THE agent \u2014 edit this file)\n\u251c\u2500\u2500 entry-points.json       \u2190 I/O schema for Orchestrator (generated by init or Studio Web)\n\u251c\u2500\u2500 bindings.json           \u2190 Resource bindings (maps resource names to Orchestrator paths)\n\u251c\u2500\u2500 project.uiproj          \u2190 Project metadata (generated by init or Studio Web)\n\u251c\u2500\u2500 flow-layout.json        \u2190 Visual canvas layout (Studio Web only, run
