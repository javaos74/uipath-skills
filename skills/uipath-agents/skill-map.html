<script>
const FILE_DATA = {"SKILL.md": "---\nname: uipath-agents\ndescription: UiPath agent lifecycle assistant. Works with both coded agents (Python with LangGraph/LlamaIndex/OpenAI Agents) and low-code agents (agent.json from Agent Builder). Orchestrates setup, auth, build, run, evaluate, deploy, and sync. Use when the user wants to create, run, evaluate, or deploy a UiPath agent, e.g. \"create a UiPath agent\", \"set up and deploy an agent\", \"edit my agent.json\", or \"build and run an agent end-to-end\".\nallowed-tools: Bash, Read, Write, Glob, Grep, AskUserQuestion\nuser-invocable: true\n---\n\n# UiPath Agents\n\n---\n\n## Step 1 \u2014 Choose the Agent Type\n\nBefore writing any code or files, determine whether to build a **Low-Code Agent** or a **Coded Agent**. Both are deployed and run with the same CLI commands \u2014 the difference is entirely in how they are built.\n\n### When to Choose Low-Code\n\n- The agent's behavior can be fully expressed through prompts and pre-built tools (UiPath processes, Integration Service connectors, sub-agents, Context Grounding indexes, HITL escalations, MCP servers)\n- The user is a business analyst, citizen developer, or automation professional who prefers not to write Python\n- Speed of iteration matters more than custom logic \u2014 `agent.json` is faster to scaffold and change\n- The agent uses only standard UiPath capabilities available as `resources` in `agent.json`\n- The user wants to design in Studio Web Agent Builder and work locally with the resulting file\n\n### When to Choose Coded\n\n- The agent needs custom LLM reasoning that cannot be expressed through prompts alone: complex state machines, dynamic multi-step planning, custom memory structures\n- The agent requires a Python library or third-party SDK not available as a pre-built UiPath tool\n- The team is Python-proficient and prefers code over declarative JSON configuration\n- Human-in-the-loop requires conditional resume logic that depends on the human's response (LangGraph `interrupt()` + branching)\n- Custom evaluation mocking (`@mockable()`) or custom Python evaluators are needed\n- Multi-agent routing logic must be implemented in code (LangGraph supervisor, LlamaIndex orchestration)\n- Full control over LLM prompt construction, model selection, or token budget at runtime\n\n### Decision Table\n\n| Requirement | Low-Code | Coded |\n|---|:---:|:---:|\n| Build without writing Python | \u2705 | \u274c |\n| Call UiPath processes / API workflows as tools | \u2705 | \u2705 |\n| Use Integration Service connectors (Salesforce, ServiceNow\u2026) | \u2705 | \u2705 |\n| RAG over a Context Grounding index | \u2705 | \u2705 |\n| Use a third-party Python library | \u274c | \u2705 |\n| Custom LLM state machine (LangGraph StateGraph) | \u274c | \u2705 |\n| Human-in-the-loop (HITL) | \u2705 escalation resource | \u2705 `interrupt()` |\n| Complex conditional HITL resume logic | \u274c | \u2705 |\n| Studio Web Agent Builder canvas | \u2705 | Optional |\n| `@mockable()` for evaluation isolation | \u274c | \u2705 |\n| Full runtime control over LLM prompts | \u274c | \u2705 |\n| Multi-model / multi-framework strategies | \u274c | \u2705 |\n| Fastest path to first working agent | \u2705 | \u274c |\n\n### Detecting the Type from an Existing Project\n\n| Signal | Type |\n|---|---|\n| User mentions Python, LangGraph, LlamaIndex, OpenAI Agents, or writing code | **Coded** |\n| User mentions `agent.json`, Agent Builder, low-code, visual design, or no-code | **Low-Code** |\n| Project has `agent.json` (no `main.py` or `langgraph.json`) | **Low-Code** |\n| Project has `main.py`, `langgraph.json`, or `uipath.json` with `\"functions\"` key | **Coded** |\n| Ambiguous | **Ask the user** |\n\nIf still ambiguous, ask:\n> Should I build this as a **low-code agent** (no Python \u2014 you configure the agent through prompts and pre-built UiPath tools, using the Studio Web Agent Builder or a JSON file) or a **coded agent** (Python \u2014 you write the agent logic in code using LangGraph, LlamaIndex, or the OpenAI Agents SDK for full programmatic control)?\n\n---\n\n## CLI Setup \u2014 Both Paths (Run Once)\n\n**Prerequisites:** Python 3.11+, Node.js 18+ with npm, and `uv` must be installed before running these steps.\n\n```bash\n# 1. Check uip is installed\nwhich uip > /dev/null 2>&1 && echo \"uip found\" || echo \"uip NOT found \u2014 run: npm install -g @uipath/cli\"\n\n# 2. Set up the Python runtime (creates .venv \u2014 must run BEFORE activating it)\nuip codedagent setup --format json\n\n# 3. Activate the virtual environment (required if .venv now exists)\nif [ -d \".venv\" ]; then source .venv/bin/activate; fi\n```\n\nIf `uip` is not found, install with `npm install -g @uipath/cli`. If `npm` is missing, ask the user to install Node.js 18+ first. If `uv` is missing, install with `pip install uv`.\n\n**Do NOT add `--format json` to forwarded commands.** The `--format` flag is only valid for native `uip` commands (`uip login`, `uip codedagent setup`). Commands forwarded to the Python CLI (`new`, `init`, `run`, `eval`, `deploy`, `push`, `pull`, `pack`, `publish`, `invoke`) do **not** accept `--format json`.\n\n**Why `uip codedagent` for low-code agents?** The `codedagent` name is historical. These commands are thin wrappers that forward to the `uipath` Python CLI, which auto-detects the agent type at runtime. `uip codedagent run agent.json '...'` works for low-code agents because the runtime sees `agent.json` and routes to the low-code execution path.\n\n---\n\n## Path A \u2014 Low-Code Agent\n\nA low-code agent is fully defined by a single `agent.json` file. No Python code is written. The UiPath runtime compiles `agent.json` into a LangGraph ReAct agent at execution time using the built-in `basic-v2` engine.\n\nThe primary CLI for low-code agents is **`uip agent`** (`@uipath/agent-tool`). It provides first-class resource management (`tool add`, `context add`, `escalation add`), schema validation, and Orchestrator process binding. For local test execution and evaluation runs, use `uip codedagent run/eval` (which auto-detects `agent.json`).\n\n> **Do NOT stop between steps to ask \"would you like me to continue?\".** Execute the entire path automatically. Only pause when you genuinely need information from the user (auth credentials, Orchestrator folder paths, process names).\n\n### A1 \u2014 Auth\n\nAuthenticate **first** \u2014 `uip agent tool add --process-name` needs a live Orchestrator connection. Check if already logged in with `uip login status`. If not, ask:\n\n> What is your UiPath **environment** (cloud/staging/alpha), **organization name**, and **tenant name**?\n\nThen:\n```bash\n# One step (recommended):\nuip login --tenant \"MY_TENANT\" --format json\n\n# For staging/alpha:\nuip login --authority \"https://alpha.uipath.com\" --tenant \"MY_TENANT\" --format json\n```\n\nDo **not** use `--it`/`--interactive` \u2014 it hangs in Claude's Bash tool.\n\n### A2 \u2014 Create the Agent\n\nScaffold a new low-code agent project:\n```bash\nuip agent init \"My Agent\" \\\n  --model gpt-4o-2024-11-20 \\\n  --system-prompt \"You are a helpful assistant.\"\n```\n\nThis creates a project directory with `agent.json`, `project.uiproj`, default evaluators, and the full Studio Web-compatible structure.\n\n**To pull an existing agent from Studio Web instead:**\n```bash\nuip agent pull <solutionId> --extract\n```\n\n### A3 \u2014 Add Resources\n\nAdd tools, context, and escalations using the `uip agent` CLI. Each command modifies `agent.json` and writes companion resource files. Use `--path <dir>` if the project is not in the current directory.\n\n#### Tools \u2014 Bind to Orchestrator processes\n\nWhen both `--process-name` and `--folder-path` are provided, the CLI queries Orchestrator live to fetch the release metadata and auto-derives `inputSchema`/`outputSchema`.\n\n```bash\n# Process tool (robot-executed, may be long-running):\nuip agent tool add \"Send Email\" \\\n  --type process \\\n  --description \"Send an email notification to a customer\" \\\n  --process-name Send_Email \\\n  --folder-path \"Shared/Customer Support\" \\\n  --path ./my-agent\n\n# API workflow tool (synchronous return):\nuip agent tool add \"Get CRM Data\" \\\n  --type apiWorkflow \\\n  --description \"Look up customer complaints from CRM\" \\\n  --process-name GetCustomerComplaintsFromCRM \\\n  --folder-path \"Shared/Customer Support\" \\\n  --path ./my-agent\n```\n\n**Tool types:** `process`, `agent`, `apiWorkflow`, `processOrchestration`, `ixp`, `integration`.\n\n**Integration Service tools** use `--connector` instead of `--process-name`:\n```bash\nuip agent tool add \"Create Jira Ticket\" \\\n  --connector ServiceNow \\\n  --connection-id \"a1b2c3d4-...\" \\\n  --object-name CreateIncident \\\n  --path ./my-agent\n```\n\n#### Context \u2014 RAG over knowledge indexes\n\n```bash\nuip agent context add \"IT Knowledge Base\" \\\n  --index it-runbooks \\\n  --retrieval-mode semantic \\\n  --threshold 0.3 \\\n  --result-count 5 \\\n  --path ./my-agent\n```\n\nRetrieval modes: `semantic` (default), `structured`, `deeprag`, `batchtransform`.\n\n#### Escalations \u2014 Human-in-the-loop\n\n```bash\nuip agent escalation add \"Manager Approval\" \\\n  --description \"Escalate when action exceeds agent authority\" \\\n  --path ./my-agent\n```\n\n#### Configure prompts and model\n\n```bash\nuip agent config set systemPrompt \"You are an enterprise IT Service Desk agent.\" --path ./my-agent\nuip agent config set model \"gpt-4o-2024-11-20\" --path ./my-agent\n```\n\n#### Validate\n\n```bash\nuip agent validate ./my-agent\n```\n\nRead the full `agent.json` schema reference: [lowcode/agent-json-reference.md](references/lowcode/agent-json-reference.md)\nAll resource types with examples: [lowcode/resources-reference.md](references/lowcode/resources-reference.md)\n\n### A4 \u2014 Run Locally\n\nTest the agent using the Python CLI (auto-detects `agent.json`):\n```bash\nuip codedagent run agent.json '{\"input\": \"How do I reset my password?\"}'\n```\n\nThe entrypoint for low-code agents is **always `agent.json`**. Input fields must match `inputSchema` in `agent.json`.\n\nRead [lifecycle/running-agents.md](references/lifecycle/running-agents.md).\n\n### A5 \u2014 Add Evaluations\n\nAdd test cases using the CLI:\n```bash\nuip agent eval add \"password-reset-question\" \\\n  --set \"Default Evaluation Set\" \\\n  --inputs '{\"input\": \"How do I reset my corporate email password?\"}' \\\n  --expected '{\"content\": \"Visit sso.corp.com/reset or contact IT helpdesk.\"}' \\\n  --path ./my-agent\n```\n\nThen run evaluations locally:\n```bash\nuip codedagent eval agent.json evaluations/eval-sets/smoke-test.json --no-report\n```\n\nAdd `--report` (and ensure `UIPATH_PROJECT_ID` is set in `.env`) to publish results to Studio Web.\n\nRead [lifecycle/evaluate.md](references/lifecycle/evaluate.md) and the [evaluators reference](references/lifecycle/evaluations/evaluators.md).\n\n### A6 \u2014 Push to Studio Web\n\n```bash\nuip agent push ./my-agent --name \"My Agent v1\" --skip-schema-validation\n```\n\nThis imports the project into Studio Web for visual editing, sharing, and collaboration. Use `--overwrite <solutionId>` to update an existing project.\n\n### A7 \u2014 Publish and Deploy\n\n```bash\n# Publish (pack + upload to AutomationSolutions):\nuip agent publish ./my-agent\n\n# Deploy using the packageVersionKey returned by publish:\nuip agent deploy <packageVersionKey>\n```\n\n**Alternative** \u2014 deploy directly via `uip codedagent`:\n```bash\nuip codedagent deploy --my-workspace\n```\n\nRead [lifecycle/deployment.md](references/lifecycle/deployment.md).\n\n---\n\n## Path B \u2014 Coded Agent\n\nA coded agent is implemented in Python using a supported LLM framework. The agent is packaged as a `.nupkg` and deployed to Orchestrator, where it runs as a standard process.\n\n> **Do NOT stop between steps to ask \"would you like me to continue?\".** Execute the entire path automatically. Only pause when you genuinely need information from the user (auth credentials, Studio Web project ID, or framework choice if ambiguous).\n\n### B1 \u2014 Select Framework\n\nChoose the framework before writing any code. Tell the user which was selected and why.\n\n| Framework | Package | Config File | Best For |\n|---|---|---|---|\n| **Simple Function** | `uipath` | `uipath.json` | Deterministic logic, no LLM, data transformation |\n| **LangGraph** | `uipath-langchain` | `langgraph.json` | Multi-step LLM, conditional routing, HITL, complex agents |\n| **LlamaIndex** | `uipath-llamaindex` | `llama_index.json` | RAG-heavy workflows, document processing |\n| **OpenAI Agents** | `uipath-openai-agents` | `openai_agents.json` | Lightweight LLM agents with tool use and handoffs |\n\n**Inference hints:** multi-step reasoning + tools \u2192 LangGraph. RAG + document Q&A \u2192 LlamaIndex. Simple LLM chat \u2192 OpenAI Agents. No LLM \u2192 Simple Function.\n\nIf ambiguous, ask: *\"Which framework should I use: Simple Function, LangGraph, LlamaIndex, or OpenAI Agents?\"*\n\n### B2 \u2014 Setup\n\n```bash\nmkdir my-agent && cd my-agent\n# Copy pyproject.toml from assets/templates/pyproject.toml, replace {AGENT_NAME} and {AGENT_DESCRIPTION}\n\n# Add framework dependency (skip for Simple Function \u2014 uipath is already in the template)\nuv add uipath-langchain        # LangGraph\n# uv add uipath-llamaindex     # LlamaIndex\n# uv add uipath-openai-agents  # OpenAI Agents\n\nuv sync\nsource .venv/bin/activate\n\nuip codedagent new my-agent   # scaffold main.py + framework config file\nuip codedagent init           # generate entry-points.json, bindings.json, .env\n```\n\nRead [lifecycle/setup.md](references/lifecycle/setup.md) for full setup details and the `uipath.json` structure.\n\n### B3 \u2014 Build\n\nImplement agent logic in `main.py`. Load **only** the reference for the selected framework \u2014 do not preload others.\n\n| Framework | Reference |\n|---|---|\n| Simple Function | [frameworks/simple-agents.md](references/frameworks/simple-agents.md) |\n| LangGraph | [frameworks/langgraph-integration.md](references/frameworks/langgraph-integration.md) |\n| LlamaIndex | [frameworks/llamaindex-integration.md](references/frameworks/llamaindex-integration.md) |\n| OpenAI Agents | [frameworks/openai-agents-integration.md](references/frameworks/openai-agents-integration.md) |\n\nLoad these **only if the task requires the capability**:\n\n| Capability | Reference |\n|---|---|\n| Platform SDK (assets, queues, buckets, jobs\u2026) | [capabilities/sdk-services.md](references/capabilities/sdk-services.md) |\n| HITL / interrupt / Action Center | [capabilities/human-in-the-loop.md](references/capabilities/human-in-the-loop.md) \u2192 Coded Agents section |\n| RAG / Context Grounding | [capabilities/context-grounding.md](references/capabilities/context-grounding.md) \u2192 Coded Agents section |\n| Process / job invocation | [capabilities/process-invocation.md](references/capabilities/process-invocation.md) \u2192 Coded Agents section |\n| Custom tracing (`@traced()`) | [capabilities/tracing.md](references/capabilities/tracing.md) \u2192 Coded Agents section |\n\nAfter changing `Input`/`Output` models (or `StartEvent`/`StopEvent`), re-run `uip codedagent init` to regenerate schemas.\n\nIf using platform resources (assets, queues, processes, buckets, etc.), sync `bindings.json` per [lifecycle/bindings-reference.md](references/lifecycle/bindings-reference.md).\n\nRead [lifecycle/build.md](references/lifecycle/build.md) for the full build guide.\n\n### B4 \u2014 Auth\n\nCheck if `.env` already contains `UIPATH_URL` and `UIPATH_ACCESS_TOKEN`. If yes, skip this step. If not, output **only** this question and wait for the answer:\n\n> What is your UiPath **environment** (cloud/staging/alpha), **organization name**, and **tenant name**?\n\nThen authenticate (choose one approach):\n```bash\n# One step \u2014 tenant name known:\nuip login --tenant \"MY_TENANT\" --format json\n\n# Two steps \u2014 if you prefer explicit confirmation:\nuip login --format json\nuip login tenant set \"MY_TENANT\" --format json\n```\n\nDo **not** use `--it`/`--interactive` \u2014 it opens an interactive picker that hangs in Claude's Bash tool.\n\nRead [lifecycle/authentication.md](references/lifecycle/authentication.md) for all auth modes and troubleshooting.\n\n### B5 \u2014 Run\n\nTest the agent locally:\n```bash\nuip codedagent run main '{\"query\": \"test\"}'\n```\n\nThe entrypoint name comes from `entry-points.json` (e.g., `main`, `agent`). Check `entry-points.json` for the correct name \u2014 it is **not** the project name.\n\nRead [lifecycle/running-agents.md](references/lifecycle/running-agents.md).\n\n### B6 \u2014 Push\n\nTell the user to open Studio Web at `https://cloud.uipath.com/{orgName}/studio_/projects`, create a new **Coded Agent** project, and share the project ID. Add `UIPATH_PROJECT_ID=<id>` to `.env`, then:\n\n```bash\nuip codedagent push\n```\n\nIf the push is rejected due to a version conflict, use `uip codedagent push --overwrite`.\n\n### B7 \u2014 Evaluate\n\nCreate the evaluator config and a smoke eval set, then run:\n\n`evaluations/evaluators/llm-judge-trajectory.json`:\n```json\n{\n  \"version\": \"1.0\",\n  \"id\": \"LLMJudgeTrajectoryEvaluator\",\n  \"evaluatorTypeId\": \"uipath-llm-judge-trajectory-similarity\",\n  \"evaluatorConfig\": {\n    \"name\": \"LLMJudgeTrajectoryEvaluator\",\n    \"defaultEvaluationCriteria\": {\n      \"expectedAgentBehavior\": \"Agent should process the input and return a response.\"\n    }\n  }\n}\n```\n\n`evaluations/eval-sets/smoke-test.json` (adapt `inputs` to match the agent's input schema):\n```json\n{\n  \"version\": \"1.0\",\n  \"id\": \"smoke-test\",\n  \"name\": \"Smoke Test\",\n  \"evaluatorRefs\": [\"LLMJudgeTrajectoryEvaluator\"],\n  \"evaluations\": [\n    {\n      \"id\": \"test-1\",\n      \"name\": \"Basic test\",\n      \"inputs\": {\"field\": \"value\"},\n      \"evaluationCriterias\": {\n        \"LLMJudgeTrajectoryEvaluator\": {\n          \"expectedAgentBehavior\": \"Agent should process the input and return a response.\"\n        }\n      }\n    }\n  ]\n}\n```\n\n```bash\nuip codedagent eval main evaluations/eval-sets/smoke-test.json --no-report\n```\n\nAdd `--report` (and ensure `UIPATH_PROJECT_ID` is set in `.env`) to publish results to Studio Web.\n\nRead [lifecycle/evaluate.md](references/lifecycle/evaluate.md) and the [evaluators reference](references/lifecycle/evaluations/evaluators.md).\n\n### B8 \u2014 Deploy\n\nBump the patch version in `pyproject.toml` if re-deploying (publishing the same version returns a 409 error):\n\n```bash\nuip codedagent deploy --my-workspace\n```\n\nTo invoke the deployed agent asynchronously from the CLI and get a monitoring URL:\n```bash\nuip codedagent invoke main '{\"query\": \"test\"}'\n```\n`invoke` always returns immediately \u2014 it starts a cloud job and prints a URL. There is no `--wait` flag.\n\nRead [lifecycle/deployment.md](references/lifecycle/deployment.md).\n\n---\n\n## Shared Rules\n\n### Both Agent Types\n\n- **Never use `--it` / `--interactive` on `uip login` from Claude's Bash tool** \u2014 it opens an interactive terminal picker that hangs indefinitely. Use one of these instead:\n  - **One step** (when tenant name is known): `uip login --tenant \"MY_TENANT\" --format json`\n  - **Two step** (explicit): `uip login --format json` \u2192 `uip login tenant set \"MY_TENANT\" --format json`\n  - **Discovery** (tenant unknown): `uip login --format json` (auto-selects first tenant) \u2192 `uip login tenant list --format json` \u2192 present names to user \u2192 `uip login tenant set \"NAME\" --format json`\n  - Note: `uip login` without `--tenant` auto-selects the **first** tenant silently when multiple exist.\n- **Skip auth if already authenticated.** Check if `.env` contains `UIPATH_URL` and `UIPATH_ACCESS_TOKEN`. If yes, skip auth.\n- **Auth MUST be an interactive question (when needed).** Output ONLY this question as your entire response \u2014 no bullets, no status summaries, no \"next steps\":\n  > What is your UiPath **environment** (cloud/staging/alpha), **organization name**, and **tenant name**?\n- **Always create a smoke evaluation set.** Every agent must include `evaluations/eval-sets/smoke-test.json` with 2\u20133 basic test cases before deploying.\n\n### Coded Agents Only\n\n- **NEVER add a `[build-system]` section to `pyproject.toml`**. No `hatchling`, no `setuptools`. Only `[project]`, `[dependency-groups]`, and `[tool.*]` sections are valid.\n- **Select a framework before writing any code.** If ambiguous, ask the user to choose from: Simple Function, LangGraph, LlamaIndex, or OpenAI Agents.\n- **Correct SDK import: `from uipath.platform import UiPath`** \u2014 not `from uipath import UiPath` (that does not exist).\n- **Correct HITL imports: `from uipath.platform.common import CreateTask, WaitTask, InvokeProcess, WaitJob`** \u2014 the old `CreateAction`/`WaitAction` names and `uipath.models` module no longer exist.\n- **Correct `@mockable()` import: `from uipath.eval.mocks import mockable`** \u2014 not `from uipath.testing import mockable`.\n- **Always use lazy LLM initialization.** Never instantiate LLM clients or `UiPath()` at module level \u2014 `uip codedagent init` imports the file at scaffold time and module-level clients will fail because auth has not run yet.\n- **`uip codedagent pack` and `uip codedagent publish` as standalone commands are blocked** by the CLI wrapper. Use `uip codedagent deploy` (which runs them internally) instead.\n\n### Low-Code Agents Only\n\n- **No `pyproject.toml` needed.** Low-code agents do not use Python packaging.\n- **No framework selection.** Low-code uses UiPath's built-in ReAct engine (`basic-v2`), powered by LangGraph under the hood. The developer never interacts with LangGraph directly.\n- **The entrypoint is always `agent.json`.** Use it wherever a coded agent would use `main` or another named entrypoint.\n- **`entry-points.json` is generated automatically.** Studio Web creates it on pull; `uip codedagent init` regenerates it from `agent.json`. Required for `push`/`deploy` but not for local `run`. Do not hand-edit it.\n- **`bindings.json` maps resource names to Orchestrator paths.** Same format as coded agents \u2014 generated by `uip codedagent init` and used for environment-specific resource overrides at deploy time.\n\n---\n\n## Troubleshooting\n\n| Error | Agent Type | Cause | Solution |\n|-------|-----------|-------|----------|\n| `Project authors cannot be empty` | Coded | Missing `authors` in `pyproject.toml` | Add `authors = [{ name = \"Your Name\" }]` to `[project]` |\n| `Version already exists` on deploy | Coded | Same version already published | Bump patch version in `pyproject.toml` (e.g. `0.0.1` \u2192 `0.0.2`) |\n| `Your local version is behind...Aborted!` | Both | Push rejected without confirmation | Use `uip codedagent push --overwrite` |\n| `agent.json not found` | Low-code | Missing agent definition file | Create `agent.json` per [lowcode/setup.md](references/lowcode/setup.md) |\n| `agent.json failed schema validation` | Low-code | Invalid JSON structure | Check against [lowcode/agent-json-reference.md](references/lowcode/agent-json-reference.md) |\n| `No entrypoints found` | Coded | Framework package not installed or config file missing | Run `uv sync`, check that `langgraph.json` / `llama_index.json` / `openai_agents.json` exists |\n| `UIPATH_PROJECT_ID not found` | Both | Agent not pushed to Studio Web yet | Create a project in Studio Web, add `UIPATH_PROJECT_ID=<id>` to `.env`, then `uip codedagent push` |\n| `401 Unauthorized` | Both | Auth token expired | Re-run `uip login --format json` then `uip login tenant set \"<TENANT>\" --format json` |\n\n---\n\n## Resources\n\n- **UiPath Python SDK docs**: https://uipath.github.io/uipath-python/\n- **UiPath Evaluations docs**: https://uipath.github.io/uipath-python/eval/\n- **`agent.json` schema reference**: [references/lowcode/agent-json-reference.md](references/lowcode/agent-json-reference.md)\n- **Low-code resources reference**: [references/lowcode/resources-reference.md](references/lowcode/resources-reference.md)\n- **Coded agent patterns**: [references/frameworks/agent-patterns.md](references/frameworks/agent-patterns.md)\n", "assets/templates/agent.json": "{\n  \"version\": \"1.1.0\",\n  \"name\": \"{AGENT_NAME}\",\n  \"metadata\": {\n    \"storageVersion\": \"44.0.0\",\n    \"isConversational\": false\n  },\n  \"messages\": [\n    {\n      \"role\": \"system\",\n      \"content\": \"You are a helpful assistant. Complete the user's task accurately and concisely. If you are missing information required to complete the task, ask a clarifying question before proceeding.\",\n      \"contentTokens\": [\n        { \"type\": \"simpleText\", \"rawString\": \"You are a helpful assistant. Complete the user's task accurately and concisely. If you are missing information required to complete the task, ask a clarifying question before proceeding.\" }\n      ]\n    },\n    {\n      \"role\": \"user\",\n      \"content\": \"{{task}}\",\n      \"contentTokens\": [\n        { \"type\": \"variable\", \"rawString\": \"input.task\" }\n      ]\n    }\n  ],\n  \"inputSchema\": {\n    \"type\": \"object\",\n    \"properties\": {\n      \"task\": {\n        \"type\": \"string\",\n        \"description\": \"The task or question for the agent to complete.\"\n      }\n    },\n    \"required\": [\"task\"]\n  },\n  \"outputSchema\": {\n    \"type\": \"object\",\n    \"properties\": {\n      \"result\": {\n        \"type\": \"string\",\n        \"description\": \"The agent's response or the outcome of the completed task.\"\n      }\n    }\n  },\n  \"settings\": {\n    \"model\": \"gpt-4.1-2025-04-14\",\n    \"maxTokens\": 16384,\n    \"temperature\": 0,\n    \"engine\": \"basic-v2\",\n    \"maxIterations\": 25\n  },\n  \"resources\": [],\n  \"features\": []\n}\n", "assets/templates/pyproject.toml": "[project]\nname = \"{AGENT_NAME}\"\nversion = \"0.0.1\"\ndescription = \"{AGENT_DESCRIPTION}\"\nauthors = [{ name = \"Agent Developer\" }]\nrequires-python = \">=3.11\"\ndependencies = [\n    \"uipath\",\n]\n\n[dependency-groups]\ndev = [\n    \"uipath-dev\",\n]\n\n[tool.ruff]\ntarget-version = \"py311\"\nline-length = 88\nselect = [\"E\", \"F\", \"W\", \"I\", \"UP\"]\n\n[tool.mypy]\npython_version = \"3.11\"\nwarn_return_any = true\nwarn_unused_configs = true\nignore_missing_imports = true\n", "references/capabilities/context-grounding.md": "# Context Grounding Guide\n\n> **Agent type: Both coded and low-code agents.** Coded agents use the Python SDK (`ContextGroundingRetriever`, `ContextGroundingVectorStore`) \u2014 see the [Coded Agents](#coded-agents) sections below. Low-code agents declare a `context` resource in `agent.json` \u2014 see the [Low-Code Agents](#low-code-agents) section.\n\nHow to use UiPath's Context Grounding Service to ground LLM responses in your organization's specific information through semantic document search.\n\n## Coded Agents\n\n## Overview\n\n**Context Grounding** enables you to search through indexed documents using natural language queries and ground LLM responses in your organization's specific knowledge. This is essential for building accurate, information-rich agents that reference real organizational data.\n\n## Index Creation\n\nBefore using context grounding, you must first create an index in your Orchestrator organization:\n\n1. Navigate to the desired folder in Orchestrator\n2. Select **Indexes** from the sidebar\n3. Create a **new index** from a storage bucket containing your documents\n4. Documents will be indexed and made searchable via semantic search\n\nOnce indexed, you can reference the index by name in your agent code.\n\n## Core Components\n\n### ContextGroundingRetriever\n\nA document retrieval system using vector search to find relevant information based on natural language queries.\n\n```python\nfrom uipath_langchain.agent.tools import ContextGroundingRetriever\n\nretriever = ContextGroundingRetriever(index_name=\"my_index\")\ndocuments = await retriever.ainvoke(\"What is our return policy?\")\n```\n\n**Features:**\n- Vector search for semantic relevance\n- Async operations for performance\n- Integration with LangChain chains and agents\n- Returns document results with relevance scores\n\n### ContextGroundingVectorStore\n\nA vector store enabling semantic searches and retrieval chains with language models.\n\n```python\nfrom uipath_langchain.agent.tools import ContextGroundingVectorStore\n\nvector_store = ContextGroundingVectorStore(index_name=\"my_index\")\nresults = await vector_store.asimilarity_search(query=\"company policies\", k=5)\n```\n\n**Search Methods:**\n- `similarity_search()` - Find similar documents\n- `similarity_search_with_score()` - Get documents with similarity scores\n- `asimilarity_search()` - Async similarity search\n\n> **Bindings:** `ContextGroundingVectorStore(index_name=\"...\", folder_path=\"...\")` creates an `index` binding in `bindings.json` \u2014 the same format as `sdk.context_grounding.retrieve_async`. Add an `index` entry to `bindings.json` so the index name can be overridden per environment in Orchestrator. See [lifecycle/bindings-reference.md](../lifecycle/bindings-reference.md).\n\n## LangGraph Integration\n\n### Using Retriever as an Agent Tool\n\nIncorporate context grounding into your LangGraph agent by adding it as a tool that nodes can invoke:\n\n```python\nfrom langgraph.graph import START, END, StateGraph, MessagesState\nfrom langgraph.types import Command\nfrom langchain_core.messages import HumanMessage, SystemMessage, ToolMessage\nfrom uipath_langchain.chat.models import UiPathAzureChatOpenAI\nfrom uipath_langchain.agent.tools import ContextGroundingRetriever\n\nclass GraphState(MessagesState):\n    query: str\n    answer: str | None = None\n\nasync def retrieve_context(state: GraphState) -> Command:\n    \"\"\"Retrieve relevant documents from context grounding.\"\"\"\n    retriever = ContextGroundingRetriever(index_name=\"company_docs\")\n    documents = await retriever.ainvoke(state[\"query\"])\n    context = \"\\n\".join([doc.page_content for doc in documents])\n    return Command(update={\n        \"messages\": state[\"messages\"] + [\n            ToolMessage(content=f\"Retrieved context: {context}\", tool_call_id=\"retrieve\")\n        ]\n    })\n\nasync def respond_with_context(state: GraphState) -> Command:\n    \"\"\"Generate response using retrieved context.\"\"\"\n    llm = UiPathAzureChatOpenAI()\n    messages = [\n        SystemMessage(content=\"Answer based on the provided context.\"),\n        *state[\"messages\"],\n    ]\n    response = await llm.ainvoke(messages)\n    return Command(update={\"answer\": response.content})\n\nbuilder = StateGraph(GraphState)\nbuilder.add_node(\"retrieve\", retrieve_context)\nbuilder.add_node(\"respond\", respond_with_context)\nbuilder.add_edge(START, \"retrieve\")\nbuilder.add_edge(\"retrieve\", \"respond\")\nbuilder.add_edge(\"respond\", END)\n\ngraph = builder.compile()\n```\n\n### Retrieval-Augmented Generation (RAG) Pattern\n\nCombine context grounding with an LLM for more accurate responses:\n\n```python\nfrom langchain.chains import RetrievalQA\nfrom uipath_langchain.chat.models import UiPathAzureChatOpenAI\nfrom uipath_langchain.agent.tools import ContextGroundingVectorStore\n\nasync def run_rag(query: str) -> str:\n    llm = UiPathAzureChatOpenAI()\n    vector_store = ContextGroundingVectorStore(index_name=\"company_docs\")\n    retriever = vector_store.as_retriever(search_kwargs={\"k\": 5})\n\n    rag_chain = RetrievalQA.from_chain_type(\n        llm=llm,\n        chain_type=\"stuff\",\n        retriever=retriever\n    )\n\n    result = await rag_chain.ainvoke(query)\n    return result[\"result\"]\n```\n\n## Agent Integration\n\nAdd context grounding as a tool to agents for autonomous document-based reasoning:\n\n```python\nfrom uipath_langchain.agent.tools import ContextGroundingRetriever\nfrom langchain_core.tools import tool\n\n@tool\nasync def search_company_docs(query: str) -> str:\n    \"\"\"Search company documentation for relevant information.\n\n    Args:\n        query: Natural language question to search for in company docs\n\n    Returns:\n        Relevant documents matching the query\n    \"\"\"\n    retriever = ContextGroundingRetriever(index_name=\"company_docs\")\n    documents = await retriever.ainvoke(query)\n    return \"\\n\".join([doc.page_content for doc in documents])\n\n# Use with agent tools\ntools = [search_company_docs]\n```\n\n## Best Practices\n\n### Document Preparation\n\n- **Clear Structure**: Organize documents with clear titles, sections, and metadata\n- **Chunking**: Keep document chunks focused on single topics for better relevance\n- **Metadata**: Add metadata fields to help with filtering and relevance scoring\n- **Updates**: Regularly update indexes when documents change\n\n### Query Optimization\n\n- **Specific Queries**: Use specific, natural language questions for better results\n- **Context Setting**: Include context in your query (\"according to company policy...\")\n- **Multiple Searches**: Use multiple queries to cover different aspects\n\n### Response Grounding\n\n- **Include Sources**: Always mention which documents the response references\n- **Confidence Scores**: Check similarity scores to gauge result confidence\n- **Fallback Handling**: Handle cases where no relevant documents are found\n\n## Common Patterns\n\n### Question-Answer System\n\n```python\nasync def qa_system(question: str) -> dict:\n    retriever = ContextGroundingRetriever(index_name=\"faq_docs\")\n    docs = await retriever.ainvoke(question)\n\n    if not docs:\n        return {\"answer\": \"No relevant documents found.\", \"sources\": []}\n\n    context = \"\\n\".join([doc.page_content for doc in docs])\n\n    llm = UiPathAzureChatOpenAI()\n    response = await llm.ainvoke([\n        SystemMessage(content=f\"Answer this question using the provided context: {context}\"),\n        HumanMessage(content=question)\n    ])\n\n    return {\n        \"answer\": response.content,\n        \"sources\": [doc.metadata.get(\"source\", \"Unknown\") for doc in docs]\n    }\n```\n\n### Document Summarization\n\n```python\nasync def summarize_documents(topic: str) -> str:\n    vector_store = ContextGroundingVectorStore(index_name=\"docs\")\n    results = await vector_store.asimilarity_search(topic, k=10)\n\n    combined_content = \"\\n\\n\".join([doc.page_content for doc in results])\n\n    llm = UiPathAzureChatOpenAI()\n    summary = await llm.ainvoke([\n        SystemMessage(content=\"Summarize these documents concisely.\"),\n        HumanMessage(content=combined_content)\n    ])\n\n    return summary.content\n```\n\n## Performance Considerations\n\n- **Async Operations**: Use async methods (`asimilarity_search`, `ainvoke`) for better performance\n- **Result Limit**: Set appropriate `k` values to limit returned documents\n- **Caching**: Cache retriever results when the same query is used multiple times\n- **Index Selection**: Use specific index names to avoid unnecessary searches across all data\n\n## Low-Code Agents\n\nFor low-code agents, context grounding is configured declaratively by adding a `context` resource to the `\"resources\"` array in `agent.json`. No Python SDK or code is required \u2014 the runtime performs retrieval automatically before each reasoning step.\n\n```json\n{\n  \"$resourceType\": \"context\",\n  \"name\": \"Company Knowledge Base\",\n  \"description\": \"Search company documentation for relevant information. Query this whenever the user asks about products, policies, or internal procedures.\",\n  \"contextType\": \"index\",\n  \"folderPath\": \"MyFolder\",\n  \"indexName\": \"company-docs-index\",\n  \"settings\": {\n    \"resultCount\": 5,\n    \"retrievalMode\": \"Semantic\",\n    \"threshold\": 0.7,\n    \"query\": { \"variant\": \"dynamic\" }\n  }\n}\n```\n\n**`contextType` options:** `\"index\"` (vector/keyword search), `\"attachments\"` (runtime file attachments), `\"datafabricentityset\"` (Data Fabric structured data).\n\n**`retrievalMode` options:** `Semantic` (vector similarity), `Structured` (keyword/filter), `DeepRAG` (multi-step re-ranking), `BatchTransform` (bulk transform), `DataFabric` (structured query).\n\nFor the full `context` resource schema and all options, see [lowcode/resources-reference.md](../lowcode/resources-reference.md).\n\n---\n\n## Troubleshooting\n\n**\"Index not found\" errors:**\n- Verify the index name matches exactly what's in Orchestrator\n- Ensure the index has been fully indexed (check Orchestrator UI)\n- Confirm you have access to the index in your organization\n\n**\"No results found\":**\n- Try rephrasing your query with different keywords\n- Check if documents are properly uploaded and indexed\n- Verify document content is searchable (not just images/binary)\n\n**Low relevance results:**\n- Use more specific, natural language queries\n- Check document chunking and quality\n- Consider using multiple search queries to broaden coverage\n- Review metadata to ensure proper categorization\n\n## Reference\n\nFor detailed API documentation, see the [UiPath Context Grounding documentation](https://uipath.github.io/uipath-python/langchain/context_grounding/).", "references/capabilities/human-in-the-loop.md": "# Human-in-the-Loop & Interrupt/Resume\n\n> **Agent type: Both coded and low-code agents.** Coded agents use LangGraph's `interrupt()` with UiPath platform models (`CreateTask`, `WaitTask`, `InvokeProcess`, `WaitJob`) \u2014 see the [Coded Agents](#coded-agents) sections below. Low-code agents declare an `escalation` resource in `agent.json` \u2014 see the [Low-Code Agents](#low-code-agents) section.\n\nPause agent execution for human approval, external processes, or job monitoring using LangGraph's `interrupt()` function.\n\n## Coded Agents\n\n## How Interrupts Work\n\n> **Required: compile the graph with a `checkpointer`.** Without a checkpointer, `interrupt()` will pause execution but the graph cannot resume \u2014 the state is lost. Use `MemorySaver` for local development and testing:\n> ```python\n> from langgraph.checkpoint.memory import MemorySaver\n> graph = builder.compile(checkpointer=MemorySaver())\n> ```\n> UiPath's managed runtime provides a production checkpointer automatically when the agent is deployed \u2014 `MemorySaver` is for local `uip codedagent run` only.\n\n```\nAgent Running \u2192 interrupt(model) \u2192 Pause \u2192 External Work \u2192 Resume with Result\n```\n\n```python\nfrom langgraph.types import interrupt\nresult = interrupt(SomeModel(...))  # Agent pauses here, resumes with result\n```\n\n## Interrupt Models\n\n| Model | Import | Purpose |\n|-------|--------|---------|\n| `CreateTask` | `uipath.platform.common` | Create escalation in Action Center |\n| `WaitTask` | `uipath.platform.common` | Wait for existing task completion |\n| `InvokeProcess` | `uipath.platform.common` | Call RPA process and wait |\n| `WaitJob` | `uipath.platform.common` | Monitor existing job |\n\n## CreateTask \u2014 Escalate to Human\n\n```python\nfrom langgraph.graph import START, END, StateGraph, MessagesState\nfrom langgraph.types import Command, interrupt\nfrom langchain_core.messages import ToolMessage\nfrom uipath.platform.common import CreateTask\n\nclass GraphState(MessagesState):\n    request: str\n    approval_status: str | None = None\n\nasync def escalate_to_human(state: GraphState) -> Command:\n    task_output = interrupt(CreateTask(\n        app_name=\"RequestReview\",\n        app_folder_path=\"MyFolderPath\",\n        title=f\"Review Request: {state['request'][:50]}\",\n        data={\n            \"request\": state[\"request\"],\n            \"timestamp\": str(datetime.now())\n        },\n        assignee=\"approver@example.com\"\n    ))\n    return Command(update={\n        \"approval_status\": task_output.get(\"status\", \"pending\"),\n    })\n```\n\n**CreateTask fields:** `app_name`, `app_folder_path`, `title`, `data` (dict), `assignee` (email, optional)\n\n**Return value:**\n```python\n{\"status\": \"approved|rejected|pending\", \"assigned_to\": \"user@example.com\", \"completed_at\": \"...\", ...}\n```\n\n## WaitTask \u2014 Monitor Existing Task\n\n```python\nfrom uipath.platform.common import WaitTask\n\nasync def monitor_task(state: GraphState) -> Command:\n    task_output = interrupt(WaitTask(task_id=state[\"existing_task_id\"]))\n    return Command(update={\"task_result\": task_output})\n```\n\n## InvokeProcess \u2014 Call RPA Automation\n\n```python\nfrom uipath.platform.common import InvokeProcess\n\nresult = interrupt(InvokeProcess(\n    name=\"MyProcess\",\n    process_folder_path=\"Workflows\",\n    input_arguments={\"data\": request_data}\n))\n```\n\n## WaitJob \u2014 Monitor Existing Job\n\n```python\nfrom uipath.platform.common import WaitJob\n\noutput = interrupt(WaitJob(job_id=background_job_id))\n```\n\n## Patterns\n\n### Conditional Interrupt\n\n```python\nasync def conditional_workflow(state: GraphState) -> Command:\n    if state[\"amount\"] > 10000:\n        result = interrupt(CreateTask(\n            assignee=\"finance-director@example.com\",\n            title=\"Approve Large Request\",\n            app_name=\"ApprovalProcess\",\n            app_folder_path=\"Finance\",\n            data={\"amount\": state[\"amount\"]}\n        ))\n    else:\n        result = interrupt(InvokeProcess(name=\"AutoApprovalProcess\"))\n    return Command(update={\"approval\": result})\n```\n\n### Chained Interrupts\n\n```python\nasync def multi_step_workflow(state: GraphState) -> Command:\n    task1 = interrupt(CreateTask(...))  # Step 1: human input\n    process_result = interrupt(InvokeProcess(\n        input_arguments={\"decision\": task1.get(\"decision\")}\n    ))  # Step 2: RPA based on input\n    task2 = interrupt(CreateTask(...))  # Step 3: final approval\n    return Command(update={\"result\": task2})\n```\n\n### Error Handling\n\n```python\nresult = interrupt(InvokeProcess(...))\nif result.get(\"status\") != \"success\":\n    return Command(update={\"error\": result.get(\"error\")})\n```\n\n## State Management\n\nTrack interrupt context in graph state:\n\n```python\nclass GraphState(MessagesState):\n    request: str\n    task_id: str | None = None\n    task_result: dict | None = None\n    final_response: str | None = None\n```\n\n## Best Practices\n\n- Pass complete context in `data` to avoid human back-and-forth\n- Use specific, actionable task titles\n- Provide structured choices (approve/reject), not open-ended questions\n- Handle all possible return statuses in resumption logic\n- Route to appropriate assignees based on task type\n\n## Low-Code Agents\n\nFor low-code agents, human-in-the-loop is configured declaratively by adding an `escalation` resource to the `\"resources\"` array in `agent.json`. No Python code or `interrupt()` is required \u2014 the agent runtime handles pausing and resuming automatically when it decides to escalate.\n\n```json\n{\n  \"$resourceType\": \"escalation\",\n  \"name\": \"Manager Approval\",\n  \"description\": \"Escalate to a human manager when the action exceeds the agent's authority or confidence. Provide a summary of what you are asking to approve.\",\n  \"escalationType\": 0,\n  \"isAgentMemoryEnabled\": false,\n  \"channels\": [\n    {\n      \"name\": \"Channel\",\n      \"type\": \"actionCenter\",\n      \"description\": \"Approval channel for sensitive actions.\",\n      \"inputSchema\": {\n        \"type\": \"object\",\n        \"properties\": {\n          \"Content\": { \"type\": \"string\" },\n          \"Comment\": { \"type\": \"string\", \"description\": \"Context for the reviewer\" }\n        }\n      },\n      \"outputSchema\": {\n        \"type\": \"object\",\n        \"properties\": {\n          \"Comment\": { \"type\": \"string\", \"description\": \"Reviewer's response or decision\" }\n        }\n      },\n      \"outcomeMapping\": { \"approve\": \"continue\", \"reject\": \"continue\" },\n      \"recipients\": [\n        { \"type\": 1, \"value\": \"user-or-group-uuid\", \"displayName\": \"Review Team\" }\n      ],\n      \"properties\": {\n        \"appName\": \"HITL App\",\n        \"appVersion\": 1,\n        \"resourceKey\": \"action-center-app-uuid\",\n        \"isActionableMessageEnabled\": false\n      }\n    }\n  ]\n}\n```\n\n**`isAgentMemoryEnabled`:** Set to `true` to have the agent learn from resolved escalations and auto-resolve similar cases in the future. Keep `false` for privacy-sensitive workflows.\n\n**`recipients[].type`:** `1` = User ID, `2` = Group ID, `3` = User email.\n\nFor the full `escalation` resource schema and all options, see [lowcode/resources-reference.md](../lowcode/resources-reference.md).\n\n---\n\n## Troubleshooting\n\n- **\"Task not found\"**: Verify `app_name` and `app_folder_path` match Action Center config\n- **\"Assignee not found\"**: Check email exists in UiPath org with Action Center access\n- **Tasks not completing**: Check Action Center UI; verify assignee can see the task\n- **Agent doesn't resume**: Ensure resumption logic handles all return values\n\n## Reference\n\n- [UiPath Human-in-the-Loop docs](https://uipath.github.io/uipath-python/langchain/human_in_the_loop/)\n", "references/capabilities/process-invocation.md": "# Process and Job Invocation Guide\n\n> **Agent type: Both coded and low-code agents.** Coded agents use `interrupt(InvokeProcess(...))` / `interrupt(WaitJob(...))` \u2014 see the [Coded Agents](#coded-agents) sections below. Low-code agents declare a `tool` resource (`type: \"Process\"`) in `agent.json` \u2014 see the [Low-Code Agents](#low-code-agents) section.\n\nHow to invoke external processes and monitor job execution in LangGraph agents using UiPath automation capabilities.\n\n> **First time here?** Read [Interrupt and Resume Patterns](human-in-the-loop.md) for a conceptual overview of how agent pausing and resumption works.\n\n## Coded Agents\n\n## Overview\n\n**Process Invocation** enables agents to delegate work to external RPA processes, API calls, or other agents, then resume automatically.\n\n## Core Models\n\n1. **InvokeProcess** \u2014 Calls external processes and waits for completion\n2. **WaitJob** \u2014 Monitors already-created job execution\n\n## InvokeProcess\n\n```python\nfrom langgraph.graph import START, END, StateGraph, MessagesState\nfrom langgraph.types import Command, interrupt\nfrom uipath.platform.common import InvokeProcess\n\nclass GraphState(MessagesState):\n    request: str\n    process_result: dict | None = None\n\nasync def invoke_automation(state: GraphState) -> Command:\n    process_output = interrupt(InvokeProcess(\n        name=\"MyProcess\",\n        process_folder_path=\"MyFolderPath\",\n        input_arguments={\n            \"argument1\": \"value1\",\n            \"argument2\": state.get(\"request\")\n        }\n    ))\n    return Command(update={\"process_result\": process_output})\n\nbuilder = StateGraph(GraphState)\nbuilder.add_node(\"invoke\", invoke_automation)\nbuilder.add_edge(START, \"invoke\")\nbuilder.add_edge(\"invoke\", END)\ngraph = builder.compile()\n```\n\n### Parameters\n\n```python\nInvokeProcess(\n    name=\"ProcessName\",                    # Required: Exact process name in Orchestrator\n    process_folder_path=\"FolderPath\",      # Required: Folder path in Orchestrator\n    input_arguments={\"arg1\": \"value1\"}     # Required: Input arguments dict\n)\n```\n\n### Return Values\n\n```python\n{\"status\": \"success|failed|faulted\", \"output_argument_1\": \"result_value\", \"error\": \"...\"}\n```\n\n## WaitJob\n\nWait for a previously-created job to complete:\n\n```python\nfrom uipath.platform.common import WaitJob\n\nasync def wait_for_job(state: GraphState) -> Command:\n    job_output = interrupt(WaitJob(job_id=state.get(\"external_job_id\")))\n    return Command(update={\"job_result\": job_output})\n```\n\n## Common Patterns\n\n### Conditional Process Invocation\n\n```python\nasync def conditional_automation(state: GraphState) -> Command:\n    if state[\"request_type\"] == \"urgent\":\n        process_name, folder = \"UrgentProcess\", \"SpecialHandling\"\n    else:\n        process_name, folder = \"StandardProcess\", \"StandardWorkflows\"\n\n    result = interrupt(InvokeProcess(\n        name=process_name,\n        process_folder_path=folder,\n        input_arguments={\"request_data\": state[\"request_data\"]}\n    ))\n    return Command(update={\"automation_result\": result})\n```\n\n### Agent-in-the-Loop\n\n```python\nasync def delegate_to_process(state: GraphState) -> Command:\n    llm = UiPathAzureChatOpenAI()\n    analysis = await llm.ainvoke([\n        SystemMessage(content=\"Analyze this request and extract parameters.\"),\n        HumanMessage(content=state[\"request\"])\n    ])\n\n    process_result = interrupt(InvokeProcess(\n        name=\"RequestProcessor\",\n        process_folder_path=\"AutomationWorkflows\",\n        input_arguments={\"analysis\": analysis.content}\n    ))\n\n    final_response = await llm.ainvoke(state[\"messages\"] + [\n        ToolMessage(content=f\"Process result: {process_result}\", tool_call_id=\"process\")\n    ])\n    return Command(update={\"response\": final_response.content})\n```\n\n## Best Practices\n\n- **Atomic Processes**: Keep invoked processes focused on single tasks\n- **Input Validation**: Validate arguments before invocation\n- **Error Handling**: Handle process failures gracefully with try/except\n- **Timeout Management**: Consider process execution time in agent flow\n- **Result Validation**: Verify process results before continuing\n\n## Low-Code Agents\n\nFor low-code agents, process invocation is configured declaratively by adding a `tool` resource (`type: \"Process\"` or `type: \"Api\"`) to the `\"resources\"` array in `agent.json`. No Python code or `interrupt()` is required \u2014 the agent calls the process automatically when it decides the tool is needed.\n\n```json\n{\n  \"$resourceType\": \"tool\",\n  \"type\": \"Process\",\n  \"name\": \"Generate Invoice\",\n  \"description\": \"Runs the invoice generation RPA process. Use this after all invoice line items have been confirmed by the user. Returns the PDF URL and invoice number.\",\n  \"isEnabled\": true,\n  \"location\": \"solution\",\n  \"guardrail\": { \"policies\": [] },\n  \"settings\": {},\n  \"argumentProperties\": {},\n  \"properties\": {\n    \"folderPath\": \"Finance/Invoicing\",\n    \"processName\": \"GenerateInvoicePDF\"\n  },\n  \"inputSchema\": {\n    \"type\": \"object\",\n    \"properties\": {\n      \"orderId\": { \"type\": \"string\", \"description\": \"Order ID for which to generate the invoice.\" },\n      \"recipientEmail\": { \"type\": \"string\", \"description\": \"Email address to send the invoice to.\" }\n    },\n    \"required\": [\"orderId\", \"recipientEmail\"]\n  },\n  \"outputSchema\": {\n    \"type\": \"object\",\n    \"properties\": {\n      \"invoiceUrl\": { \"type\": \"string\" },\n      \"invoiceNumber\": { \"type\": \"string\" }\n    }\n  }\n}\n```\n\n**`type: \"Process\"`** \u2014 triggers a job-based RPA process (robot-executed, may be long-running).  \n**`type: \"Api\"`** \u2014 calls an API-triggered workflow that returns a result synchronously.\n\nFor the full tool resource schema and all subtypes, see [lowcode/resources-reference.md](../lowcode/resources-reference.md).\n\n---\n\n## Troubleshooting\n\n- **\"Process not found\"**: Verify process name and `process_folder_path` match Orchestrator exactly\n- **\"Invalid input arguments\"**: Check argument names and types match process expectations\n- **Job timeouts**: Check process execution time; consider using WaitJob pattern\n- **Output parsing errors**: Verify process return types; add logging for debugging\n\n## Reference\n\nFor detailed API documentation, see the [UiPath Process Invocation documentation](https://uipath.github.io/uipath-python/langchain/human_in_the_loop/).\n", "references/capabilities/sdk-services.md": "# UiPath SDK Services Reference\n\n> **Agent type: Coded agents only.** Low-code agents configure platform services declaratively via `agent.json` resources \u2014 no Python SDK needed. See [lowcode/resources-reference.md](../lowcode/resources-reference.md).\n\nComplete reference for all platform services available through the UiPath Python SDK.\n\n## SDK Initialization\n\n```python\nfrom uipath.platform import UiPath\n\nsdk = UiPath()  # Reads credentials from environment variables\n\n# Or with explicit credentials\nsdk = UiPath(base_url=\"https://cloud.uipath.com/...\", secret=\"your_token\")\nsdk = UiPath(client_id=\"id\", client_secret=\"secret\", scope=\"scope\", base_url=\"url\")\n```\n\n> **CRITICAL: Never import or instantiate `UiPath()` at module level.** It requires auth credentials at construction time. Always create the instance inside a function or graph node \u2014 never at the top of the file. `uip codedagent init` imports your module to introspect it, and module-level `UiPath()` will fail.\n\n## Available Services\n\n| Service | Property | Purpose |\n|---------|----------|---------|\n| Processes | `sdk.processes` | Start process executions |\n| Jobs | `sdk.jobs` | Manage job lifecycle, attachments, output |\n| Assets | `sdk.assets` | Retrieve and update assets and credentials |\n| Attachments | `sdk.attachments` | Upload, download, delete attachments |\n| Buckets | `sdk.buckets` | Cloud storage file operations |\n| Queues | `sdk.queues` | Queue item and transaction management |\n| Actions | `sdk.actions` | Create and retrieve human-in-the-loop actions |\n| Context Grounding | `sdk.context_grounding` | RAG index management and search |\n| Documents | `sdk.documents` | Document extraction and validation |\n| Entities | `sdk.entities` | Data Service entity and record management |\n| Connections | `sdk.connections` | Integration Service connections |\n| LLM | `sdk.llm` | Chat completions via normalized LLM Gateway |\n| LLM OpenAI | `sdk.llm_openai` | OpenAI-compatible chat and embeddings |\n| Guardrails | `sdk.guardrails` | Evaluate guardrails on data |\n| Folders | `sdk.folders` | Folder key resolution |\n| Tasks | `sdk.tasks` | Action Center task management |\n| AgentHub | `sdk.agenthub` | LLM model listing and system agent invocation |\n| MCP | `sdk.mcp` | List and retrieve MCP servers |\n| Resource Catalog | `sdk.resource_catalog` | Search and list tenant/folder resources |\n\nAll services support **synchronous** and **asynchronous** methods (async methods have an `_async` suffix).\n\n---\n\n## Processes\n\n```python\njob = sdk.processes.invoke(name=\"MyProcess\", input_arguments={\"param1\": \"value1\"}, folder_path=\"MyFolder\")\njob = await sdk.processes.invoke_async(name=\"MyProcess\", input_arguments={\"param1\": \"value1\"})\n```\n\n## Jobs\n\n```python\njob = sdk.jobs.retrieve(job_key=\"abc-123\", folder_path=\"MyFolder\")\noutput = sdk.jobs.extract_output(job)\nsdk.jobs.resume(job_id=\"abc-123\", payload={\"approved\": True})\nattachment_key = sdk.jobs.create_attachment(name=\"report.pdf\", source_path=\"/path/to/report.pdf\", job_key=\"abc-123\")\nattachments = sdk.jobs.list_attachments(job_key=uuid.UUID(\"abc-123\"))\npayload = sdk.jobs.retrieve_api_payload(inbox_id=\"inbox-123\")\n```\n\n## Assets\n\n```python\nasset = sdk.assets.retrieve(name=\"MyAsset\", folder_path=\"MyFolder\")\ncredential = sdk.assets.retrieve_credential(name=\"MyCredential\")\nsdk.assets.update(robot_asset=asset, folder_path=\"MyFolder\")\n```\n\n## Attachments\n\n```python\nkey = sdk.attachments.upload(name=\"data.csv\", source_path=\"/path/to/data.csv\")\nkey = sdk.attachments.upload(name=\"notes.txt\", content=\"Hello, world!\")\npath = sdk.attachments.download(key=uuid.UUID(\"abc-123\"), destination_path=\"/path/to/download/\")\nsdk.attachments.delete(key=uuid.UUID(\"abc-123\"))\n```\n\n## Buckets\n\n```python\nbucket = sdk.buckets.retrieve(name=\"MyBucket\")\nsdk.buckets.upload(name=\"MyBucket\", blob_file_path=\"reports/output.csv\", source_path=\"/local/path/output.csv\")\nsdk.buckets.upload(name=\"MyBucket\", blob_file_path=\"data/result.json\", content='{\"status\": \"done\"}', content_type=\"application/json\")\nsdk.buckets.download(name=\"MyBucket\", blob_file_path=\"reports/output.csv\", destination_path=\"/local/download/\")\n```\n\n## Queues\n\n```python\nsdk.queues.create_item(item={\"Name\": \"MyQueue\", \"SpecificContent\": {\"order_id\": \"12345\"}})\nsdk.queues.create_items(queue_name=\"MyQueue\", items=[{\"SpecificContent\": {\"order_id\": \"001\"}}], commit_type=\"AllOrNothing\")\nsdk.queues.create_transaction_item(item={\"Name\": \"MyQueue\", \"SpecificContent\": {\"task\": \"process_order\"}})\nsdk.queues.complete_transaction_item(transaction_key=\"txn-123\", result={\"IsSuccessful\": True, \"Output\": {\"status\": \"done\"}})\nsdk.queues.update_progress_of_transaction_item(transaction_key=\"txn-123\", progress=\"Processing step 3 of 5\")\nitems = sdk.queues.list_items()\n```\n\n## Actions\n\n```python\naction = sdk.actions.create(title=\"Review Invoice\", data={\"invoice_id\": \"1234\"}, app_name=\"InvoiceReview\", assignee=\"user@example.com\")\naction = sdk.actions.retrieve(action_key=\"action-key-123\")\n```\n\n## Context Grounding\n\n```python\nindex = sdk.context_grounding.retrieve(name=\"KnowledgeBase\")\nresults = sdk.context_grounding.search(name=\"KnowledgeBase\", query=\"How do I reset my password?\", number_of_results=5)\nindex = sdk.context_grounding.create_index(name=\"MyIndex\", source={\"type\": \"bucket\", \"bucketName\": \"docs-bucket\"})\nsdk.context_grounding.add_to_index(name=\"MyIndex\", blob_file_path=\"docs/guide.pdf\", source_path=\"/local/guide.pdf\")\nsdk.context_grounding.ingest_data(index=index)\nsdk.context_grounding.delete_index(index=index)\n```\n\n## Documents\n\n```python\nextraction = sdk.documents.extract(project_name=\"InvoiceExtraction\", tag=\"invoice\", file_path=\"/path/to/invoice.pdf\")\nvalidation = sdk.documents.create_validation_action(\n    action_title=\"Validate Invoice\", action_priority=\"Normal\", action_catalog=\"InvoiceValidation\",\n    action_folder=\"Invoices\", storage_bucket_name=\"doc-storage\",\n    storage_bucket_directory_path=\"validations/\", extraction_response=extraction\n)\nresult = sdk.documents.get_validation_result(validation_action=validation)\n```\n\n## Entities\n\n```python\nentities = sdk.entities.list_entities()\nentity = sdk.entities.retrieve(entity_key=\"Customers\")\nrecords = sdk.entities.list_records(entity_key=\"Customers\", start=0, limit=50)\nsdk.entities.insert_records(entity_key=\"Customers\", records=[{\"Name\": \"Acme\", \"Email\": \"info@acme.com\"}])\nsdk.entities.update_records(entity_key=\"Customers\", records=[{\"Id\": \"rec-123\", \"Email\": \"new@acme.com\"}])\nsdk.entities.delete_records(entity_key=\"Customers\", record_ids=[\"rec-123\"])\n```\n\n## Connections\n\n```python\nconnections = sdk.connections.list(name=\"Salesforce\")\nconnection = sdk.connections.retrieve(key=\"conn-key-123\")\ntoken = sdk.connections.retrieve_token(key=\"conn-key-123\", token_type=\"direct\")\nmetadata = sdk.connections.metadata(element_instance_id=123, tool_path=\"/contacts\")\npayload = sdk.connections.retrieve_event_payload(event_args=event_args)\n```\n\n## LLM\n\n```python\nresponse = sdk.llm.chat_completions(\n    messages=[{\"role\": \"system\", \"content\": \"You are helpful.\"}, {\"role\": \"user\", \"content\": \"Summarize this.\"}],\n    model=\"gpt-4o-mini-2024-07-18\", max_tokens=4096, temperature=0\n)\n\n# Structured output with Pydantic\nresponse = sdk.llm.chat_completions(messages=[...], model=\"gpt-4o-mini-2024-07-18\", response_format=MyPydanticModel)\n\n# With tools\nresponse = sdk.llm.chat_completions(messages=[...], model=\"gpt-4o-mini-2024-07-18\", tools=[tool_def], tool_choice=\"auto\")\n```\n\n## LLM OpenAI\n\n```python\nresponse = sdk.llm_openai.chat_completions(messages=[{\"role\": \"user\", \"content\": \"Hello!\"}], model=\"gpt-4o-mini-2024-07-18\")\nembeddings = sdk.llm_openai.embeddings(input=\"The quick brown fox\", embedding_model=\"text-embedding-ada-002\")\n```\n\n## Guardrails\n\n```python\nresult = sdk.guardrails.evaluate(guardrail_name=\"ContentSafety\", data={\"prompt\": \"User message\"}, folder_path=\"MyFolder\")\n```\n\n## Tasks\n\n```python\ntask = sdk.tasks.create(title=\"Review document\", data={\"document_id\": \"doc-123\"}, app_name=\"DocumentReview\", assignee=\"reviewer@company.com\")\ntask = sdk.tasks.retrieve(task_key=\"task-key-123\")\n```\n\n## AgentHub\n\n```python\nmodels = sdk.agenthub.list_models()\nresult = sdk.agenthub.invoke(agent_name=\"system-agent\", input_data={\"query\": \"Help me\"})\n```\n\n## MCP\n\n```python\nservers = sdk.mcp.list()\nserver = sdk.mcp.retrieve(slug=\"my-mcp-server\", folder_path=\"MyFolder\")\nserver = await sdk.mcp.retrieve_async(slug=\"my-mcp-server\", folder_path=\"MyFolder\")\n```\n\n## Resource Catalog\n\n```python\nresources = sdk.resource_catalog.search(query=\"invoice processing\")\nresources = sdk.resource_catalog.list(folder_path=\"Finance\")\n```\n\n## Folders\n\n```python\nfolder_key = sdk.folders.retrieve_key(folder_path=\"Finance/Invoices\")\n```\n\n---\n\n## Common Patterns\n\n### Folder Targeting\n\nMost services accept `folder_key` or `folder_path`:\n```python\nasset = sdk.assets.retrieve(name=\"MyAsset\", folder_path=\"Finance/Invoices\")\nasset = sdk.assets.retrieve(name=\"MyAsset\", folder_key=\"abc-123-def\")\n```\n\n### Async Usage\n\nAll services have async variants with `_async` suffix:\n```python\nasset = await sdk.assets.retrieve_async(name=\"MyAsset\")\n```\n", "references/capabilities/tracing.md": "# UiPath Tracing Guide\n\n> **Agent type: Both coded and low-code agents.** Coded agents use the `@traced()` decorator (see [Coded Agents](#coded-agents) below). Low-code agents get full automatic tracing with no configuration required (see [Low-Code Agents](#low-code-agents) below).\n\nUnderstand and implement tracing in your agents for monitoring, debugging, and auditing.\n\n## What is Tracing?\n\nTracing is a monitoring feature that automatically captures function execution details. With the `@traced()` decorator, you can:\n- \ud83d\udcca Record function arguments and return values\n- \ud83d\udd0d Track execution flow for debugging\n- \ud83d\udccb Audit code behavior in Orchestrator\n- \ud83d\udd12 Redact sensitive data before logging\n\nTrace data appears in:\n- **UiPath Orchestrator**: Jobs page \u2192 Trace tab\n- **UiPath Maestro**: For larger process orchestrations\n\n## Coded Agents\n\n## How Tracing Works\n\nThe `@traced()` decorator automatically monitors your functions. Apply it to any function:\n\n```python\nfrom uipath.tracing import traced\n\n@traced()\ndef my_function(input_data):\n    \"\"\"This function's execution will be traced.\"\"\"\n    return process_data(input_data)\n```\n\n**Supported Function Types:**\n- Regular synchronous functions\n- Async functions (`async def`)\n- Generator functions (`yield`)\n- Async generators (`async yield`)\n\n## Basic Usage\n\n### Simple Tracing\n\n```python\nfrom pydantic import BaseModel\nfrom uipath.tracing import traced\n\nclass Input(BaseModel):\n    user_id: int\n    action: str\n\n@traced()\nasync def main(input: Input) -> dict:\n    \"\"\"Main agent function with tracing enabled.\"\"\"\n    result = process_user_action(input.user_id, input.action)\n    return {\"status\": \"success\", \"result\": result}\n```\n\n### Custom Span Names\n\nOrganize traces by giving them meaningful names:\n\n```python\n@traced(name=\"validate_user_input\")\ndef validate_input(user_id: int, action: str) -> bool:\n    \"\"\"Custom span name for better trace organization.\"\"\"\n    return user_id > 0 and action in [\"create\", \"update\", \"delete\"]\n```\n\n### Custom Run Types\n\nCategorize traces by function purpose:\n\n```python\n@traced(run_type=\"data_processing\")\ndef process_csv_file(file_path: str) -> list:\n    \"\"\"Mark this as a data processing operation.\"\"\"\n    # Processing logic\n    return processed_data\n```\n\n## Data Protection & Privacy\n\n### Redacting Sensitive Data\n\nUse input/output processors to mask sensitive information before logging:\n\n```python\n@traced(\n    input_processor=lambda x: {**x, \"password\": \"***\"},\n    output_processor=lambda x: {**x, \"token\": \"***\"}\n)\ndef authenticate_user(username: str, password: str) -> dict:\n    \"\"\"Password is redacted before tracing.\"\"\"\n    token = generate_token(username, password)\n    return {\"username\": username, \"token\": token}\n```\n\n### Hide Input/Output\n\nCompletely hide sensitive parameters from traces:\n\n```python\n@traced(hide_input=True, hide_output=True)\ndef process_api_key(api_key: str) -> bool:\n    \"\"\"API key is not recorded in traces at all.\"\"\"\n    return validate_api_key(api_key)\n```\n\n## Advanced Configuration\n\n### Combining Parameters\n\nCreate comprehensive tracing for complex operations:\n\n```python\n@traced(\n    name=\"payment_processing\",\n    run_type=\"financial_transaction\",\n    input_processor=lambda x: {\n        \"amount\": x[\"amount\"],\n        \"currency\": x[\"currency\"],\n        \"customer_id\": \"***\"\n    },\n    hide_output=False  # Show output but redact sensitive input\n)\nasync def process_payment(customer_id: str, amount: float, currency: str) -> dict:\n    \"\"\"Process payment with full tracing and privacy.\"\"\"\n    result = call_payment_api(customer_id, amount, currency)\n    return result\n```\n\n## Integration Patterns\n\n### With LangChain Agents\n\nLangChain agents handle tracing automatically\u2014no additional configuration needed.\n\n## Common Use Cases\n\n### 1. Production Monitoring\n\nTrack function execution in production agents to monitor performance and catch errors.\n\n```python\n@traced(name=\"user_lookup\")\nasync def get_user_details(user_id: int) -> dict:\n    \"\"\"Monitor user lookup operations.\"\"\"\n    return await database.find_user(user_id)\n```\n\n### 2. Data Pipeline Auditing\n\nRecord all transformations for compliance and debugging.\n\n```python\n@traced(\n    name=\"data_transformation\",\n    input_processor=lambda x: {\"record_count\": len(x), \"schema_version\": \"1.0\"}\n)\ndef transform_batch(records: list) -> list:\n    \"\"\"Audit data transformation without logging raw data.\"\"\"\n    return [transform_record(r) for r in records]\n```\n\n### 3. API Integration Debugging\n\nTrack external API calls for troubleshooting.\n\n```python\n@traced(name=\"call_external_api\", run_type=\"integration\")\nasync def fetch_from_third_party(endpoint: str, params: dict) -> dict:\n    \"\"\"Monitor third-party API interactions.\"\"\"\n    response = await call_api(endpoint, params)\n    return response\n```\n\n### 4. Security & Compliance\n\nTrace actions while protecting sensitive data for audit logs.\n\n```python\n@traced(\n    hide_input=True,\n    hide_output=True,\n    name=\"sensitive_operation\"\n)\ndef verify_credentials(username: str, password: str) -> bool:\n    \"\"\"Audit sensitive operations without logging credentials.\"\"\"\n    return authenticate(username, password)\n```\n\n## Viewing Traces\n\n### In Orchestrator\n\n1. Go to **Jobs** page\n2. Select a completed job\n3. Click **Trace** tab to view captured data\n4. Expand trace spans to see details\n\n### Trace Information Available\n\n- Function name and custom span name\n- Input arguments (or \"hidden\" if redacted)\n- Return value (or \"hidden\" if redacted)\n- Execution time\n- Exceptions and errors\n\n## Best Practices\n\n\u2705 **Do:**\n- Use meaningful `name` values for organization\n- Apply `@traced()` to all public functions\n- Use processors for sensitive data instead of `hide_*` flags (you get partial visibility)\n- Test tracing locally before deploying to production\n- Combine with logging for comprehensive observability\n\n\u274c **Don't:**\n- Log raw passwords or API keys\n- Use `hide_*` for all sensitive data if you need partial visibility\n- Assume tracing adds no performance overhead (it's minimal but measurable)\n\n## Low-Code Agents\n\nTracing is **automatic** for low-code agents. No `@traced()` decorator or any configuration is needed \u2014 the runtime automatically traces all LLM calls, tool calls, and agent reasoning steps.\n\nTrace data appears in the same places as coded agents:\n- **UiPath Orchestrator**: Jobs page \u2192 Trace tab\n- **UiPath Maestro**: For larger process orchestrations\n\nThere is no per-agent tracing configuration in `agent.json`. If you need to inspect a low-code agent's execution in detail, use the Execution Trail view in Studio Web or the job trace in Orchestrator.\n\n---\n\n## Troubleshooting\n\n### Traces Not Appearing\n\n1. Verify agent ran to completion\n2. Check that `@traced()` decorator is applied\n3. Confirm Orchestrator has the job data\n\n### Performance Concerns\n\nTracing has minimal overhead. If performance is critical:\n- Use `name` parameter for cleaner traces\n- Apply `@traced()` only to key functions (not every small helper)\n- Use `input_processor` to reduce data volume in traces\n\n## Documentation\n\nFor more details, visit: https://uipath.github.io/uipath-python/core/traced/\n", "references/frameworks/agent-patterns.md": "# Agent Patterns\n\n> **Agent type: Coded agents only.** Low-code agents use the built-in ReAct engine (`basic-v2`) configured declaratively via `agent.json` \u2014 no framework or Python code needed. For low-code resource patterns (tools, context, escalation), see [lowcode/resources-reference.md](../lowcode/resources-reference.md).\n\nCommon implementation patterns for building UiPath coded agents, from simple functions to multi-agent orchestrations.\n\n> **Note:** These patterns are general architectural concepts. The code examples use **LangGraph** and the **UiPath Python SDK**. The same patterns apply to LlamaIndex and OpenAI Agents \u2014 see their respective integration references.\n\n## \u26a0\ufe0f Before You Start: Setup Required\n\n**IMPORTANT:** Before implementing any agent pattern, you must first set up your project directory and install dependencies. This is a prerequisite for all agent types.\n\nSee the **[Project Setup Guide](setup.md)** for:\n- Creating a new project directory\n- Scaffolding with `uip codedagent new`\n- Installing dependencies with `uv sync`\n- Defining Input/Output Pydantic models\n- Configuring your agent with `uip codedagent init`\n- Testing your agent with `uip codedagent run`\n\n## Pattern Overview\n\n| Pattern | When to Use | Key Components |\n|---------|-------------|----------------|\n| [Simple Direct](#simple-direct-agent) | Deterministic logic, no external calls | `@traced()`, Pydantic models |\n| [SDK Integration](#sdk-integration-agent) | Platform service calls (assets, queues, jobs) | `UiPath()` client, service methods |\n| [LangGraph Workflow](#langgraph-workflow-agent) | Multi-step LLM reasoning with routing | `StateGraph`, conditional edges, LLM chains |\n| [Human-in-the-Loop](#human-in-the-loop-agent) | Requires human approval or review | `interrupt()`, `CreateTask`, Action Center |\n| [RAG](#rag-agent) | Knowledge retrieval and Q&A | `ContextGroundingVectorStore`, retrieval chains |\n| [Chat](#chat-agent) | Conversational agents with tools | `create_agent()`, tool bindings |\n| [Multi-Agent Supervisor](#multi-agent-supervisor) | Complex tasks needing specialized sub-agents | Supervisor node, worker agents, routing |\n\n---\n\n## Simple Direct Agent\n\nMinimal agent with synchronous or async logic, no LLM calls or external services. Best for deterministic transformations, calculations, and data processing.\n\n**When to use:** Pure computation, data validation, format conversion, rule-based decisions.\n\n```python\nfrom pydantic import BaseModel\nfrom uipath.tracing import traced\n\nclass Input(BaseModel):\n    a: float\n    b: float\n    operator: str\n\nclass Output(BaseModel):\n    result: float\n\n@traced(name=\"calculate\", span_type=\"tool\")\ndef calculate(operator: str, a: float, b: float) -> float:\n    match operator:\n        case \"+\": return a + b\n        case \"-\": return a - b\n        case \"*\": return a * b\n        case \"/\": return a / b if b != 0 else 0.0\n        case _: raise ValueError(f\"Unknown operator: {operator}\")\n\n@traced()\nasync def main(input: Input) -> Output:\n    result = calculate(input.operator, input.a, input.b)\n    return Output(result=result)\n```\n\n**Key points:**\n- `@traced()` on `main` is required for Orchestrator visibility\n- Use `@traced(name=..., span_type=\"tool\")` on helper functions for granular traces\n- Use `@mockable()` on functions calling external services to enable evaluation mocking\n\n---\n\n## SDK Integration Agent\n\nUses the `UiPath()` client to interact with platform services like assets, queues, jobs, and buckets.\n\n**When to use:** Reading/writing Orchestrator assets, managing queues, triggering processes, uploading attachments.\n\n```python\nimport os\nfrom pydantic import BaseModel\nfrom uipath.platform import UiPath\nfrom uipath.tracing import traced\n\nclass Input(BaseModel):\n    asset_name: str\n    folder_path: str\n\nclass Output(BaseModel):\n    value: str\n    status: str\n\n@traced()\nasync def main(input: Input) -> Output:\n    client = UiPath()\n\n    asset = client.assets.retrieve(\n        name=input.asset_name,\n        folder_path=input.folder_path,\n    )\n\n    return Output(\n        value=str(asset.value),\n        status=\"retrieved\",\n    )\n```\n\n**Key points:**\n- `UiPath()` reads credentials from environment variables by default\n- All services support `folder_path` and `folder_key` for folder targeting\n- Every service method has an async variant with `_async` suffix\n- See [SDK Services](sdk-services.md) for the full API reference\n\n---\n\n## LangGraph Workflow Agent\n\nMulti-step agent using LangGraph's `StateGraph` with nodes, edges, and conditional routing. Supports LLM-powered decisions.\n\n> **Important:** LangGraph agents require `uipath-langchain` as a dependency and use a different project structure than simple agents. See the LangGraph integration reference for project setup, `langgraph.json` configuration, and troubleshooting.\n\n**When to use:** Classification workflows, multi-step reasoning, conditional branching based on LLM output.\n\n```python\nfrom pydantic import BaseModel\nfrom langgraph.graph import START, END, StateGraph, MessagesState\nfrom langgraph.types import Command\nfrom langchain_core.messages import HumanMessage, SystemMessage\nfrom uipath_langchain.chat.models import UiPathAzureChatOpenAI\n\nclass GraphInput(BaseModel):\n    message: str\n\nclass GraphOutput(BaseModel):\n    label: str\n    confidence: float\n\nclass GraphState(MessagesState):\n    message: str\n    label: str | None = None\n    confidence: float | None = None\n\nasync def classify(state: GraphState) -> Command:\n    llm = UiPathAzureChatOpenAI(max_retries=3)\n    result = await llm.ainvoke(state[\"messages\"])\n    return Command(update={\"label\": \"urgent\", \"confidence\": 0.95})\n\ndef route(state: GraphState) -> str:\n    if (state.get(\"confidence\") or 0) >= 0.8:\n        return END\n    return \"review\"\n\nbuilder = StateGraph(GraphState, input=GraphInput, output=GraphOutput)\nbuilder.add_node(\"classify\", classify)\nbuilder.add_edge(START, \"classify\")\nbuilder.add_conditional_edges(\"classify\", route)\ngraph = builder.compile()\n```\n\n**Key points:**\n- Use `MessagesState` for agents that need conversation history\n- `Command(update={...})` to update state from nodes\n- Conditional edges for routing based on state values\n- LangGraph agents get tracing automatically \u2014 no `@traced()` needed on graph nodes\n\n---\n\n## Human-in-the-Loop Agent\n\nExtends a LangGraph workflow with `interrupt()` to pause execution and create an Action Center task for human review.\n\n**When to use:** Approval workflows, escalation paths, human review of LLM output, compliance checks.\n\n```python\nfrom pydantic import BaseModel\nfrom langgraph.graph import START, END, StateGraph, MessagesState\nfrom langgraph.checkpoint.memory import MemorySaver\nfrom langgraph.types import interrupt, Command\nfrom uipath.platform.common import CreateTask\n\nclass GraphState(MessagesState):\n    label: str | None = None\n    approved: bool = False\n\nasync def wait_for_human(state: GraphState) -> Command:\n    action_data = interrupt(\n        CreateTask(\n            app_name=\"review_app\",\n            title=\"Review classification result\",\n            data={\"label\": state[\"label\"]},\n            assignee=\"reviewer@company.com\",\n        )\n    )\n    approved = isinstance(action_data.get(\"Answer\"), bool) and action_data[\"Answer\"]\n    return Command(update={\"approved\": approved})\n\ndef route_after_review(state: GraphState) -> str:\n    return END if state[\"approved\"] else \"escalate\"\n\nbuilder = StateGraph(GraphState)\nbuilder.add_node(\"classify\", classify_node)\nbuilder.add_node(\"human_review\", wait_for_human)\nbuilder.add_node(\"escalate\", escalate_node)\nbuilder.add_edge(START, \"classify\")\nbuilder.add_edge(\"classify\", \"human_review\")\nbuilder.add_conditional_edges(\"human_review\", route_after_review)\ngraph = builder.compile(checkpointer=MemorySaver())\n```\n\n**Key points:**\n- `interrupt()` pauses the graph and creates an Action Center task via `CreateTask`\n- A `checkpointer` (e.g., `MemorySaver()`) is required for interrupt/resume to work\n- `CreateTask` fields: `app_name`, `title`, `data` (dict shown to reviewer), `assignee` (optional)\n- The graph resumes when the human completes the action \u
